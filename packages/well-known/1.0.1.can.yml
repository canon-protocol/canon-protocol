# Canon Protocol — Well-Known Package
#
# Reference implementation of a publisher's well-known package.
# The package header IS the publisher identity (publisher: canon-protocol.org).
# Content is just signing keys. The active key is the one without notAfter.
#
# Convention: every publisher has a {publisher}/well-known package that is
# public, containing their Ed25519 signing keys for signature verification.

well-known:
  type: Package
  publisher: canon-protocol.org
  version: 1.0.1
  license: MIT
  imports:
    - publisher: canon-protocol.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
        - package: core-xsd
          match: ^
          version: 1.0.0
        - package: canon-trust
          match: ^
          version: 1.0.0

# Active signing key (no notAfter = currently active)
key-2026-03:
  type: SigningKey
  kid: "2026-03"
  keyType: "OKP"
  curve: "Ed25519"
  publicKey: "PLACEHOLDER-base64url-encoded-public-key"
  use: "sig"
  notBefore: 1740787200
