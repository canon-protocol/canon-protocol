# ========================================
# CLASS VS PROPERTY PATTERN
# ========================================

ClassVsPropertyPattern:
  type: ModelingPattern
  title: When to Use Class vs Property
  problem: |
    You have a concept to model and aren't sure whether it should be a Class or a Property.

    Common scenarios:
    - Should "Address" be a class or a property?
    - Should "Status" be a class or a string property?
    - Should "Category" be a class hierarchy or an enum property?
  solution: |
    **Use a Class when:**
    - The concept has its own attributes (properties)
    - Multiple entities might reference it
    - It could exist independently of other entities
    - You might create subclasses (specializations) later
    - It represents a "thing" or "entity" in your domain

    **Use a Property when:**
    - It's a simple attribute of another entity
    - It's a primitive value (string, number, boolean, date)
    - It doesn't need its own structure or attributes
    - It only makes sense in the context of its parent entity
  consequences: |
    **Choosing Class:**
    ✅ More flexible and reusable across entities
    ✅ Can add properties later without breaking changes
    ✅ Supports inheritance and specialization
    ✅ Can be referenced by multiple entities
    ❌ More verbose to define and use
    ❌ More entities to manage
    ❌ Requires object properties instead of simple datatypes

    **Choosing Property:**
    ✅ Simpler and more concise
    ✅ Easier to query and filter
    ✅ Direct access without joins
    ❌ Hard to extend with additional attributes later (breaking change)
    ❌ Can't be reused independently across entities
    ❌ No support for specialization
  whenToUse: |
    Use the **Class approach** when modeling domain concepts that:
    - Have identity and lifecycle
    - Need to be reused across entities
    - Will likely evolve with more attributes

    Examples: Address, PhoneNumber, Organization, Event, Location
  whenNotToUse: |
    Don't use Class for simple atomic values that:
    - Are just labels or identifiers
    - Don't need additional context
    - Won't evolve beyond a single value

    Examples: firstName, age, quantity, color (as simple string)
  hasExample:
    - AddressAsClassExample
    - AddressAsPropertyExample

AddressAsClassExample:
  type: CodeExample
  title: Address as Class (Rich Structure)
  language: yaml
  codeSnippet: |
    # When Address needs its own properties and might be reused

    Address:
      type: rdfs.Class
      label: Address
      comment: A physical mailing address

    street:
      type: DatatypeProperty
      label: Street
      domain: Address
      range: string

    city:
      type: DatatypeProperty
      label: City
      domain: Address
      range: string

    postalCode:
      type: DatatypeProperty
      label: Postal Code
      domain: Address
      range: string

    country:
      type: DatatypeProperty
      label: Country
      domain: Address
      range: string

    Person:
      type: rdfs.Class
      label: Person

    homeAddress:
      type: ObjectProperty
      label: Home Address
      domain: Person
      range: Address

    # Instance
    alice-person:
      type: Person
      name: Alice Smith
      homeAddress: alice-address

    alice-address:
      type: Address
      street: 123 Main St
      city: Springfield
      postalCode: 12345
      country: USA

AddressAsPropertyExample:
  type: CodeExample
  title: Address as Property (Simple String)
  language: yaml
  codeSnippet: |
    # When Address is just a simple formatted string

    Person:
      type: rdfs.Class
      label: Person

    address:
      type: DatatypeProperty
      label: Address
      comment: Mailing address as formatted string
      domain: Person
      range: string

    # Instance
    alice-person:
      type: Person
      name: Alice Smith
      address: "123 Main St, Springfield, 12345, USA"

# ========================================
# ENUMERATION PATTERN
# ========================================

EnumerationPattern:
  type: ModelingPattern
  title: Modeling Enumerations (Closed/Sealed Sets of Values)
  problem: |
    You need to model a property that can only have specific predefined values
    and the set of allowed values is intentionally fixed (sealed).

    Common scenarios where oneOf is appropriate:
    - Days of week (Monday, Tuesday, etc.) — fixed by nature
    - Boolean-like states (active, expired, revoked) — small sealed set
    - Visibility levels (public, private) — unlikely to change

    🚨 **IMPORTANT: Prefer subClassOf over oneOf in most cases.**

    If the set of values might grow, or if consumers should be able to add
    their own specializations, use the Class Hierarchy pattern (subClassOf)
    instead. oneOf creates a sealed/closed set that cannot be extended
    without modifying the original package.

    **Rule of thumb:** If you're unsure whether to use oneOf or subClassOf,
    use subClassOf. Open, extensible designs are almost always preferable.
  solution: |
    **Use Named Individuals with oneOf (for sealed enumerations only)**

    Define:
    1. A class for the enumeration type
    2. Named individuals for each allowed value
    3. Use oneOf to restrict the class to exactly those individuals

    This approach provides:
    - Type safety at the semantic level
    - Self-documenting allowed values
    - Ability to add properties to enum values
    - Language-agnostic code generation to enums

    **When to use subClassOf instead (the default choice):**

    If the set of values could grow, use class hierarchy:
    ```yaml
    # ✅ PREFERRED: Open, extensible with subClassOf
    PaymentMethod:
      type: Class

    CreditCardPayment:
      type: Class
      subClassOf: PaymentMethod

    BankTransferPayment:
      type: Class
      subClassOf: PaymentMethod

    # Consumers can add their own:
    CryptoPayment:
      type: Class
      subClassOf: PaymentMethod
    ```

    vs.

    ```yaml
    # ⚠️ SEALED: Only use when set is truly fixed
    DayOfWeek:
      type: Class
      oneOf:
        - monday
        - tuesday
        # ... consumers CANNOT add new days
    ```
  consequences: |
    ✅ Type-safe: Invalid values are caught during validation
    ✅ Self-documenting: All allowed values are explicit in schema
    ✅ Code generation: Transpiles to native enums in target languages
    ❌ SEALED: Consumers cannot add new values without modifying the package
    ❌ More verbose than simple string property
    ❌ Not extensible across packages (unlike subClassOf)
  whenToUse: |
    Use this pattern ONLY when:
    - The set of values is truly fixed and will not grow
    - Adding new values would be semantically incorrect
    - You intentionally want to prevent extension

    Examples: Days of week, boolean-like lifecycle states (active/expired/revoked),
    visibility levels (public/private)
  whenNotToUse: |
    Don't use this pattern when:
    - The set of values might grow over time
    - Consumers should be able to add their own specializations
    - Values represent conceptual categories or types
    - You're modeling status codes, priority levels, or categories
      (use subClassOf instead — these often grow)

    **Default to subClassOf** for extensible type hierarchies.
    Use string property for: Tags, user-entered labels, free-form text
  relatedPattern: HierarchyVsStringPattern
  hasExample: EnumerationExample

EnumerationExample:
  type: CodeExample
  language: yaml
  codeSnippet: |
    # Define enumeration class
    OrderStatus:
      type: rdfs.Class
      label: Order Status
      comment: The status of an order in the fulfillment pipeline
      oneOf:
        - order-status-pending
        - order-status-processing
        - order-status-shipped
        - order-status-delivered

    # Define each enum value as a named individual
    order-status-pending:
      type: OrderStatus
      label: Pending
      comment: Order has been placed but not yet processed

    order-status-processing:
      type: OrderStatus
      label: Processing
      comment: Order is being prepared for shipment

    order-status-shipped:
      type: OrderStatus
      label: Shipped
      comment: Order has been shipped to customer

    order-status-delivered:
      type: OrderStatus
      label: Delivered
      comment: Order has been delivered to customer

    # Use the enumeration in a property
    Order:
      type: rdfs.Class
      label: Order

    status:
      type: ObjectProperty
      label: Status
      comment: Current status of the order
      domain: Order
      range: OrderStatus

    # Instance
    order-123:
      type: Order
      orderId: 123
      status: order-status-shipped

# ========================================
# HIERARCHY VS STRING PROPERTY PATTERN
# ========================================

HierarchyVsStringPattern:
  type: ModelingPattern
  title: Class Hierarchy vs String Property (CRITICAL ANTI-PATTERN)
  alternativePattern: EnumerationPattern
  problem: |
    You need to model different "types" or "kinds" of an entity.

    🚨 **COMMON MISTAKE:** Creating a string property called "type", "kind", or "category"

    Example:
    ```yaml
    Vehicle:
      type: Class

    vehicleType:  # ❌ ANTI-PATTERN
      type: DatatypeProperty
      domain: Vehicle
      range: string  # Values: "car", "boat", "motorcycle"
    ```

    Why is this wrong?
    - No type safety
    - Can't add type-specific properties
    - Can't leverage inheritance
    - Loses semantic richness
  solution: |
    **Use Class Hierarchy with subClassOf**

    Instead of a string property, create specialized subclasses:

    ```yaml
    Vehicle:
      type: Class
      # Base class with common properties

    Car:
      type: Class
      subClassOf: Vehicle
      # Car-specific properties

    Boat:
      type: Class
      subClassOf: Vehicle
      # Boat-specific properties
    ```

    This approach provides:
    - Type-safe specialization
    - Type-specific properties
    - Inheritance of common properties
    - Semantic reasoning capabilities
  consequences: |
    **Using Class Hierarchy (CORRECT):**
    ✅ Type safety: Each specialization is a distinct type
    ✅ Can add type-specific properties (Car.wheelCount, Boat.hullType)
    ✅ Supports semantic reasoning (all Cars ARE Vehicles)
    ✅ Enables polymorphic queries
    ✅ Better code generation (inheritance in target language)

    **Using String Property (ANTI-PATTERN):**
    ❌ No compile-time safety
    ❌ Can't add type-specific properties without conditionals
    ❌ Loses semantic meaning
    ❌ Requires manual validation
    ❌ Harder to query (string matching vs type checking)
  whenToUse: |
    **ALWAYS use class hierarchy (subClassOf) when:**
    - Different "types" have different properties
    - You need type-safe specialization
    - Types represent fundamentally different concepts
    - You want to query by type
    - The set of specializations might grow over time
    - Consumers should be able to add their own subtypes

    This is the DEFAULT choice for modeling categories, statuses,
    and type hierarchies. Prefer subClassOf over oneOf unless you
    are certain the set of values is fixed and sealed.

    Red flags that signal you need hierarchy:
    - Property named "type", "kind", "category"
    - String values representing conceptual categories
    - Conditional logic based on type strings
    - Type-specific behavior or attributes
  whenNotToUse: |
    Only use string properties for:
    - User-defined tags or labels
    - Free-form categorization
    - Display-only metadata that doesn't affect structure

    Example: "displayCategory" for UI grouping (not semantic type)
  hasExample:
    - HierarchyCorrectExample
    - StringPropertyAntiPattern

HierarchyCorrectExample:
  type: CodeExample
  title: "✅ CORRECT: Class Hierarchy"
  language: yaml
  codeSnippet: |
    # Base class with common properties
    Vehicle:
      type: rdfs.Class
      label: Vehicle
      comment: A means of transportation

    manufacturer:
      type: DatatypeProperty
      label: Manufacturer
      domain: Vehicle
      range: string

    yearMade:
      type: DatatypeProperty
      label: Year Made
      domain: Vehicle
      range: integer

    # Specialized subclasses
    Car:
      type: rdfs.Class
      label: Car
      comment: A road vehicle with wheels
      subClassOf: Vehicle

    wheelCount:
      type: DatatypeProperty
      label: Wheel Count
      domain: Car
      range: integer

    Boat:
      type: rdfs.Class
      label: Boat
      comment: A water vehicle
      subClassOf: Vehicle

    hullType:
      type: DatatypeProperty
      label: Hull Type
      domain: Boat
      range: string

    # Instances with proper types
    my-car:
      type: Car  # Type-safe!
      manufacturer: Toyota
      yearMade: 2020
      wheelCount: 4

    my-boat:
      type: Boat  # Type-safe!
      manufacturer: SeaRay
      yearMade: 2019
      hullType: Monohull

StringPropertyAntiPattern:
  type: CodeExample
  title: "❌ ANTI-PATTERN: String Property"
  language: yaml
  codeSnippet: |
    # ❌ DON'T DO THIS
    Vehicle:
      type: rdfs.Class
      label: Vehicle

    vehicleType:  # ❌ WRONG - should be subclasses!
      type: DatatypeProperty
      domain: Vehicle
      range: string  # "car", "boat", "motorcycle"

    wheelCount:  # ❌ Only applies to cars, but defined on Vehicle
      type: DatatypeProperty
      domain: Vehicle
      range: integer

    hullType:  # ❌ Only applies to boats, but defined on Vehicle
      type: DatatypeProperty
      domain: Vehicle
      range: string

    # Instance - no type safety!
    my-car:
      type: Vehicle
      vehicleType: "car"  # ❌ Just a string - no validation!
      wheelCount: 4
      hullType: null  # ❌ Boat property on a car?

    # Typos aren't caught!
    my-boat:
      type: Vehicle
      vehicleType: "baot"  # ❌ Typo - not caught!
      hullType: Monohull

# ========================================
# EMBEDDED OBJECT PATTERN (CRITICAL)
# ========================================

EmbeddedObjectPattern:
  type: ModelingPattern
  title: Embedded Objects - Type Inference Rule (CRITICAL)
  problem: |
    🚨 **THE #1 ERROR NEW USERS MAKE**

    You need to include structured nested data within an entity (like an address,
    coordinates, or configuration object). You try to add a 'type' property to
    the nested object and get a validation error.

    Error message:
    "Embedded objects cannot have explicit 'type' property.
    Type is automatically inferred from the containing property's range."

    Why does this happen? What's the correct pattern?
  solution: |
    **Embedded objects (nested dictionaries) automatically inherit their type
    from the parent property's range. You CANNOT specify type explicitly.**

    ## The Pattern

    1. Define a class for the nested structure:
       ```yaml
       Address:
         type: Class
       ```

    2. Define an ObjectProperty with that class as range:
       ```yaml
       hasAddress:
         type: ObjectProperty
         range: Address  # ← This declares embedded type!
       ```

    3. Use embedded object WITHOUT explicit type:
       ```yaml
       person:
         hasAddress:  # Type = Address (inferred from hasAddress.range)
           street: "123 Main St"  # NO type property here!
       ```

    ## Why This Design?

    1. **Prevents conflicts**: If you could specify type explicitly, it might
       conflict with the property's range declaration

    2. **DRY principle**: The range already declares the type - no need to repeat

    3. **Type safety**: The property's range is the single source of truth

    ## When to Use Embedded vs Reference

    **Use Embedded Object when:**
    - Data is specific to this parent entity
    - Data doesn't need global identity
    - Data won't be referenced elsewhere

    **Use Named Entity + Reference when:**
    - Data needs to be shared/reused
    - Data needs global identity
    - Data should be referenceable from multiple places
  consequences: |
    **Using Embedded Objects (Pattern):**
    ✅ Compact YAML - data inline with parent
    ✅ Type automatically enforced via range
    ✅ No need to create separate named entities
    ✅ Clear parent-child relationship
    ❌ Cannot be referenced from multiple places
    ❌ No global identity/URI
    ❌ Cannot add type-specific metadata

    **Using Named Entity + Reference (Alternative):**
    ✅ Can be referenced from multiple entities
    ✅ Has global identity (URI)
    ✅ Can have its own icon, label, metadata
    ❌ More verbose YAML
    ❌ Requires creating separate entity
    ❌ Less obvious parent-child relationship
  whenToUse: |
    **Use embedded objects for:**
    - Addresses in contact records
    - Coordinates in location data
    - Configuration objects
    - Composite values (date ranges, measurements)
    - One-off nested structures

    **Indicators you should use embedded:**
    - Nested data is unique to this parent
    - You'd never reference this data separately
    - Data has no meaning outside parent context
  whenNotToUse: |
    **Don't use embedded objects for:**
    - Data that multiple entities share
    - Data that needs to be updated in one place
    - Data that needs global search/indexing
    - Data with its own lifecycle

    **Use named entity + reference instead when:**
    - Multiple entities reference same data
    - Data needs to be managed independently
    - Data needs its own URI for linking
  hasExample:
    - EmbeddedObjectCorrectExample
    - EmbeddedObjectWrongExample
    - EmbeddedVsReferenceComparison

EmbeddedObjectCorrectExample:
  type: CodeExample
  title: "✅ CORRECT: Embedded Object with Type Inference"
  language: yaml
  codeSnippet: |
    # Define the nested structure class
    Address:
      type: rdfs.Class
      label: Address
      comment: Physical mailing address

    # Define properties for Address
    street:
      type: DatatypeProperty
      label: Street
      domain: Address
      range: string

    city:
      type: DatatypeProperty
      label: City
      domain: Address
      range: string

    # Define ObjectProperty with Address as range
    hasAddress:
      type: ObjectProperty
      label: Has Address
      comment: The person's mailing address
      domain: Person
      range: Address  # ← THIS defines embedded type!

    # Use embedded object - NO type property!
    alice-person:
      type: Person
      name: Alice Smith
      hasAddress:     # ← Type = Address (inferred from hasAddress.range)
        street: "123 Main St"
        city: "Springfield"
        # NO 'type: Address' here! It's automatic!

EmbeddedObjectWrongExample:
  type: CodeExample
  title: "❌ WRONG: Attempting Explicit Type on Embedded Object"
  language: yaml
  codeSnippet: |
    # Same setup as correct example...
    Address:
      type: rdfs.Class

    hasAddress:
      type: ObjectProperty
      range: Address

    # ❌ THIS WILL FAIL VALIDATION
    alice-person:
      type: Person
      hasAddress:
        type: Address  # ❌ ERROR! Embedded objects can't have explicit type!
        street: "123 Main St"

    # Error message:
    # "Embedded objects cannot have explicit 'type' property.
    #  Type is automatically inferred from the containing property's range.
    #  If you need a different type, modify the 'range' of the parent property
    #  and version it appropriately."

EmbeddedVsReferenceComparison:
  type: CodeExample
  title: "Embedded vs Reference - When to Use Each"
  language: yaml
  codeSnippet: |
    # SCENARIO 1: Embedded (each person has unique address)
    alice-person:
      type: Person
      hasAddress:  # Embedded - unique to Alice
        street: "123 Main St"
        city: "Springfield"

    bob-person:
      type: Person
      hasAddress:  # Embedded - unique to Bob
        street: "456 Oak Ave"
        city: "Portland"

    # SCENARIO 2: Reference (multiple people share address)
    shared-office-address:
      type: Address
      street: "789 Corporate Blvd"
      city: "New York"

    alice-employee:
      type: Person
      workAddress: shared-office-address  # Reference

    bob-employee:
      type: Person
      workAddress: shared-office-address  # Same reference

    # Key difference:
    # - Embedded: Data copied inline, unique per entity
    # - Reference: Data shared, single source of truth
