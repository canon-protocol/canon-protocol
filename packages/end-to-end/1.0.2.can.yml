# Package declaration
end-to-end:
  type: Package
  publisher: canon-protocol.org
  version: 1.0.2
  imports:
    - publisher: canon-protocol.org
      packages:
        - package: education
          match: ^
          version: 1.0.1
        - package: core-rdf
          match: ^
          version: 1.0.1
          alias: rdfs

# ========================================
# END-TO-END TUTORIAL OVERVIEW
# ========================================

EndToEndTutorialOverview:
  type: Tutorial
  title: Complete Canon Tutorial - Blog System
  difficulty: Beginner
  content: |
    # Complete Canon Tutorial: Building a Blog System

    This tutorial walks you through building a complete blog system with Canon,
    from initial design to deployed TypeScript application.

    ## What We'll Build

    A blog platform with:
    - **Authors** - People who write posts
    - **Blog Posts** - Articles with title, content, tags
    - **Comments** - Reader feedback on posts
    - **Categories** - Organization for posts

    ## What You'll Learn

    1. Designing an ontology from business requirements
    2. Modeling classes and properties
    3. Creating instance data
    4. Validating your ontology
    5. Generating TypeScript code
    6. Using generated types in a Node.js app
    7. Evolving the schema (adding features)
    8. Publishing and sharing packages

    ## Prerequisites

    - Canon CLI installed
    - Basic understanding of YAML
    - Node.js and TypeScript basics

    ## Time Estimate

    60-90 minutes for complete tutorial.

# ========================================
# STEP 1: DESIGN THE ONTOLOGY
# ========================================

Step1DesignOntology:
  type: Tutorial
  title: "Step 1: Design the Ontology"
  difficulty: Beginner
  prerequisite: EndToEndTutorialOverview
  nextInPath: Step2CreatePackage
  content: |
    # Step 1: Design the Ontology

    ## Business Requirements

    Our blog system needs:

    1. **Authors write blog posts**
       - Authors have: name, email, bio
       - Authors can write multiple posts

    2. **Posts belong to categories**
       - Posts have: title, content, published date
       - Posts can have multiple tags
       - Posts belong to one category

    3. **Readers leave comments**
       - Comments have: author name, text, timestamp
       - Comments are attached to posts

    4. **Categories organize content**
       - Categories have: name, description
       - Categories can have subcategories

    ## Domain Model Analysis

    Let's identify our core entities:

    ### Classes (Nouns)

    - `Author` - Person who writes posts
    - `BlogPost` - Article content
    - `Comment` - Reader feedback
    - `Category` - Content organization

    ### Properties (Relationships & Attributes)

    **Author properties:**
    - name (string)
    - email (string)
    - bio (string)
    - posts → BlogPost (relationship)

    **BlogPost properties:**
    - title (string)
    - content (string)
    - publishedDate (dateTime)
    - author → Author (relationship)
    - category → Category (relationship)
    - tags (list of strings)
    - comments → Comment (relationship)

    **Comment properties:**
    - authorName (string)
    - text (string)
    - timestamp (dateTime)
    - post → BlogPost (relationship)

    **Category properties:**
    - name (string)
    - description (string)
    - parentCategory → Category (relationship)

    ## Ontology Design Decisions

    ### 1. Class Hierarchy

    ```
    rdfs.Resource
    └── Content
        ├── BlogPost
        └── Comment
    └── Person
        └── Author
    └── Category
    ```

    We'll create a `Content` base class for BlogPost and Comment
    since they share similar characteristics (text, timestamp).

    ### 2. Property Types

    - **DatatypeProperty** for literals (string, dateTime, etc.)
    - **ObjectProperty** for entity references (author, category)

    ### 3. Cardinality

    - Author → Posts: One-to-many (one author, many posts)
    - Post → Category: Many-to-one (many posts, one category)
    - Post → Comments: One-to-many (one post, many comments)

    Next: We'll implement this design in Canon YAML format.

# ========================================
# STEP 2: CREATE THE PACKAGE
# ========================================

Step2CreatePackage:
  type: Tutorial
  title: "Step 2: Create the Canon Package"
  difficulty: Beginner
  prerequisite: Step1DesignOntology
  nextInPath: Step3DefineClasses
  content: |
    # Step 2: Create the Canon Package

    ## Create Workspace

    ```bash
    mkdir blog-canon-tutorial
    cd blog-canon-tutorial
    mkdir -p specs/myblog.com
    ```

    ## Create Package File

    Create `specs/myblog.com/blog@1.0.0.can.yml`:

    ```yaml
    blog:
      type: Package
      publisher: myblog.com
      version: 1.0.0
      imports:
        - publisher: canon-protocol.org
          packages:
            - package: core-rdf
              match: ^
              version: 1.0.1
              alias: rdfs
            - package: core-xsd
              match: ^
              version: 1.0.1

    # Entities will go here
    ```

    ## Initial Validation

    ```bash
    cd specs
    canon validate
    ```

    Expected output:
    ```
    ✓ All documents in the repository are valid!
    ```

    Even with no entities, the package structure validates!

    ## Package Metadata Explained

    - **root key** (`blog`): Package name (becomes the root key)
    - **type**: Must be `Package`
    - **publisher**: Your domain name (myblog.com)
    - **version**: Semantic version (1.0.0)
    - **imports**: Dependencies we'll use
      - `rdfs` - Core RDF vocabulary (Class, Resource, etc.)
      - `xsd` - XML Schema datatypes (string, dateTime, etc.)

    Next: We'll define our classes.

# ========================================
# STEP 3: DEFINE CLASSES
# ========================================

Step3DefineClasses:
  type: Tutorial
  title: "Step 3: Define Classes"
  difficulty: Beginner
  prerequisite: Step2CreatePackage
  nextInPath: Step4DefineProperties
  content: |
    # Step 3: Define Classes

    Add these class definitions to `blog@1.0.0.can.yml`:

    ```yaml
    # Base Classes

    Person:
      type: rdfs.Class
      subClassOf: rdfs.Resource
      label: Person
      comment: Represents a person in the system

    Content:
      type: rdfs.Class
      subClassOf: rdfs.Resource
      label: Content
      comment: Base class for all content types

    # Domain Classes

    Author:
      type: rdfs.Class
      subClassOf: Person
      label: Author
      comment: A person who writes blog posts

    BlogPost:
      type: rdfs.Class
      subClassOf: Content
      label: Blog Post
      comment: An article written by an author

    Comment:
      type: rdfs.Class
      subClassOf: Content
      label: Comment
      comment: A reader comment on a blog post

    Category:
      type: rdfs.Class
      subClassOf: rdfs.Resource
      label: Category
      comment: A category for organizing blog posts
    ```

    ## Validate Classes

    ```bash
    canon validate
    ```

    Should still pass! We've defined the class hierarchy.

    ## Class Hierarchy Explained

    ```
    rdfs.Resource (from core-rdf)
    ├── Person
    │   └── Author
    ├── Content
    │   ├── BlogPost
    │   └── Comment
    └── Category
    ```

    **Why this hierarchy?**

    - `Person` → `Author`: Authors are people (could add `Reader` later)
    - `Content` → `BlogPost`, `Comment`: Shared attributes (text, dates)
    - `Category`: Standalone organizational concept

    ## Labels and Comments

    - **label**: Human-readable name (used in UI)
    - **comment**: Documentation (used in tooltips, docs)

    Always add these! They help both humans and AI understand your ontology.

    Next: We'll define properties for these classes.

# ========================================
# STEP 4: DEFINE PROPERTIES
# ========================================

Step4DefineProperties:
  type: Tutorial
  title: "Step 4: Define Properties"
  difficulty: Intermediate
  prerequisite: Step3DefineClasses
  nextInPath: Step5CreateInstances
  content: |
    # Step 4: Define Properties

    Add these property definitions to `blog@1.0.0.can.yml`:

    ```yaml
    # Person Properties

    name:
      type: DatatypeProperty
      domain: Person
      range: xsd.string
      label: Name
      comment: The person's full name

    email:
      type: DatatypeProperty
      domain: Person
      range: xsd.string
      label: Email
      comment: The person's email address

    # Author Properties

    bio:
      type: DatatypeProperty
      domain: Author
      range: xsd.string
      label: Biography
      comment: A short biography of the author

    # BlogPost Properties

    title:
      type: DatatypeProperty
      domain: BlogPost
      range: xsd.string
      label: Title
      comment: The title of the blog post

    content:
      type: DatatypeProperty
      domain: BlogPost
      range: xsd.string
      label: Content
      comment: The main text content of the blog post

    publishedDate:
      type: DatatypeProperty
      domain: BlogPost
      range: xsd.dateTime
      label: Published Date
      comment: When the post was published

    tags:
      type: DatatypeProperty
      domain: BlogPost
      range: xsd.string
      label: Tags
      comment: Keywords associated with the post (can be multiple)

    author:
      type: ObjectProperty
      domain: BlogPost
      range: Author
      label: Author
      comment: The author who wrote this post

    category:
      type: ObjectProperty
      domain: BlogPost
      range: Category
      label: Category
      comment: The category this post belongs to

    # Comment Properties

    authorName:
      type: DatatypeProperty
      domain: Comment
      range: xsd.string
      label: Author Name
      comment: Name of the person who wrote the comment

    text:
      type: DatatypeProperty
      domain: Comment
      range: xsd.string
      label: Text
      comment: The comment text content

    timestamp:
      type: DatatypeProperty
      domain: Comment
      range: xsd.dateTime
      label: Timestamp
      comment: When the comment was posted

    post:
      type: ObjectProperty
      domain: Comment
      range: BlogPost
      label: Post
      comment: The blog post this comment is attached to

    # Category Properties

    categoryName:
      type: DatatypeProperty
      domain: Category
      range: xsd.string
      label: Category Name
      comment: The name of the category

    description:
      type: DatatypeProperty
      domain: Category
      range: xsd.string
      label: Description
      comment: Description of what this category contains

    parentCategory:
      type: ObjectProperty
      domain: Category
      range: Category
      label: Parent Category
      comment: The parent category (for hierarchical categories)
    ```

    ## Validate Properties

    ```bash
    canon validate
    ```

    ## Property Types Explained

    ### DatatypeProperty

    For literal values (strings, numbers, dates):
    - `name`, `email`, `bio` → strings
    - `publishedDate`, `timestamp` → dates

    ### ObjectProperty

    For references to other entities:
    - `author` → points to Author entity
    - `category` → points to Category entity
    - `post` → points to BlogPost entity
    - `parentCategory` → points to another Category (self-reference!)

    ## Domain and Range

    - **domain**: Which class this property belongs to
      - `title` has domain `BlogPost` → only BlogPosts have titles
    - **range**: What type of values this property holds
      - `title` has range `xsd.string` → title values are strings
      - `author` has range `Author` → author values are Author entities

    Next: We'll create actual instances (data).

# ========================================
# STEP 5: CREATE INSTANCES
# ========================================

Step5CreateInstances:
  type: Tutorial
  title: "Step 5: Create Instance Data"
  difficulty: Intermediate
  prerequisite: Step4DefineProperties
  nextInPath: Step6Validate
  content: |
    # Step 5: Create Instance Data

    Add sample data to `blog@1.0.0.can.yml`:

    ```yaml
    # Categories

    technology:
      type: Category
      categoryName: Technology
      description: Posts about technology and programming

    web-development:
      type: Category
      categoryName: Web Development
      description: Web development tutorials and tips
      parentCategory: technology

    # Authors

    alice-johnson:
      type: Author
      name: Alice Johnson
      email: alice@myblog.com
      bio: Full-stack developer with 10 years of experience

    bob-smith:
      type: Author
      name: Bob Smith
      email: bob@myblog.com
      bio: Frontend specialist and UI/UX enthusiast

    # Blog Posts

    intro-to-canon:
      type: BlogPost
      title: Introduction to Canon Protocol
      content: |
        Canon Protocol is a powerful semantic data modeling system
        that combines the expressiveness of RDF with the simplicity of YAML.

        In this post, we'll explore the basics...
      publishedDate: "2024-01-15T10:00:00Z"
      author: alice-johnson
      category: web-development
      tags:
        - canon
        - semantic-web
        - yaml

    typescript-tips:
      type: BlogPost
      title: 10 TypeScript Tips for Better Code
      content: |
        TypeScript has become the go-to language for building robust
        web applications. Here are 10 tips to improve your TypeScript code...
      publishedDate: "2024-01-20T14:30:00Z"
      author: bob-smith
      category: web-development
      tags:
        - typescript
        - javascript
        - web-development

    # Comments

    comment-1:
      type: Comment
      authorName: Charlie Reader
      text: Great introduction! Looking forward to learning more about Canon.
      timestamp: "2024-01-15T11:30:00Z"
      post: intro-to-canon

    comment-2:
      type: Comment
      authorName: Diana Developer
      text: These TypeScript tips are excellent. Especially #7!
      timestamp: "2024-01-20T16:00:00Z"
      post: typescript-tips
    ```

    ## Instance Data Explained

    ### Top-Level Entities

    Instances use kebab-case names:
    - `alice-johnson` - Instance of Author
    - `intro-to-canon` - Instance of BlogPost
    - `technology` - Instance of Category

    ### Type Declaration

    Every top-level instance MUST have `type`:
    ```yaml
    alice-johnson:
      type: Author  # Required!
      name: Alice Johnson
    ```

    ### Entity References

    ObjectProperty values reference other instances by name:
    ```yaml
    intro-to-canon:
      author: alice-johnson  # Reference to author instance
      category: web-development  # Reference to category instance
    ```

    ### Literal Values

    DatatypeProperty values are literals:
    ```yaml
    title: Introduction to Canon Protocol  # String
    publishedDate: "2024-01-15T10:00:00Z"  # DateTime (ISO 8601)
    tags:                                   # Array of strings
      - canon
      - semantic-web
    ```

    ### Multi-Line Strings

    Use YAML `|` for multi-line content:
    ```yaml
    content: |
      First paragraph...

      Second paragraph...
    ```

    Next: We'll validate everything!

# ========================================
# STEP 6: VALIDATE
# ========================================

Step6Validate:
  type: Tutorial
  title: "Step 6: Validate the Ontology"
  difficulty: Beginner
  prerequisite: Step5CreateInstances
  nextInPath: Step7GenerateTypeScript
  content: |
    # Step 6: Validate the Ontology

    ## Run Validation

    ```bash
    canon validate --verbose
    ```

    ## Expected Output

    ```
    ── Repository Validation Results ──────────────────────────

    +-------------------------+
    | Metric          | Value |
    |-----------------+-------|
    | Total Documents |     1 |
    | Valid           |     1 |
    | Invalid         |     0 |
    +-------------------------+

    ✓ All documents in the repository are valid!
    ```

    ## What Validation Checks

    ### 1. Type Resolution

    Every `type` reference must exist:
    ```yaml
    alice-johnson:
      type: Author  # ✓ Author class is defined
    ```

    ### 2. Property Resolution

    Every property must be defined:
    ```yaml
    alice-johnson:
      name: Alice Johnson  # ✓ 'name' property is defined
    ```

    ### 3. Reference Resolution

    ObjectProperty values must reference existing entities:
    ```yaml
    intro-to-canon:
      author: alice-johnson  # ✓ alice-johnson exists
    ```

    ### 4. Type Compatibility

    Property values must match range:
    ```yaml
    # ✓ VALID - publishedDate expects xsd.dateTime
    publishedDate: "2024-01-15T10:00:00Z"

    # ✗ ERROR - publishedDate expects dateTime, not Author
    publishedDate: alice-johnson
    ```

    ### 5. No Embedded Type Declaration

    Embedded objects can't have explicit type:
    ```yaml
    # ✗ ERROR - Embedded object can't have type
    alice-johnson:
      address:
        type: Address  # ERROR!
        street: "123 Main"
    ```

    ## Common Validation Errors

    ### Error: "Entity not found"

    ```
    Error: BlogPost 'intro-to-canon' references 'alice-johnson' which is not defined
    ```

    **Fix**: Define the entity or check spelling
    ```yaml
    alice-johnson:  # Make sure this exists
      type: Author
    ```

    ### Error: "Property not defined"

    ```
    Error: Property 'title' is not defined or imported
    ```

    **Fix**: Define the property
    ```yaml
    title:
      type: DatatypeProperty
      domain: BlogPost
      range: xsd.string
    ```

    ### Error: "Embedded object has type"

    ```
    Error: Embedded objects cannot have explicit 'type' property
    ```

    **Fix**: Remove type from nested object
    ```yaml
    # WRONG
    author:
      type: Author
      name: Alice

    # RIGHT - use reference instead
    author: alice-johnson
    ```

    ## Verbose Output

    Use `--verbose` to see detailed validation progress:

    ```bash
    canon validate --verbose
    ```

    Shows:
    - Which documents are being loaded
    - Import resolution steps
    - Entity resolution details
    - Property validation progress

    Next: We'll generate TypeScript code!

# ========================================
# STEP 7: GENERATE TYPESCRIPT
# ========================================

Step7GenerateTypeScript:
  type: Tutorial
  title: "Step 7: Generate TypeScript Code"
  difficulty: Intermediate
  prerequisite: Step6Validate
  nextInPath: Step8UseInApp
  content: |
    # Step 7: Generate TypeScript Code

    ## Export to TypeScript

    ```bash
    canon generate \
      --output generated/typescript
    ```

    ## Generated Code

    File: `generated/typescript/blog.ts`

    ```typescript
    /**
     * Auto-generated from Canon ontology
     * Package: myblog.com/blog@1.0.0
     * DO NOT EDIT - Regenerate with: canon generate
     */

    // Base Interfaces

    export interface Person {
      readonly name: string;
      readonly email: string;
    }

    export namespace Person {
      export const __canon = {
        package: 'myblog.com/blog@1.0.0',
        class: 'Person',
      };
    }

    export interface Content {
      // Base class for content types
    }

    export namespace Content {
      export const __canon = {
        package: 'myblog.com/blog@1.0.0',
        class: 'Content',
      };
    }

    // Domain Interfaces

    export interface Author extends Person {
      readonly bio: string;
    }

    export namespace Author {
      export const __canon = {
        package: 'myblog.com/blog@1.0.0',
        class: 'Author',
      };
    }

    export interface BlogPost extends Content {
      readonly title: string;
      readonly content: string;
      readonly publishedDate: Date;
      readonly author: Author;
      readonly category: Category;
      readonly tags: string;
    }

    export namespace BlogPost {
      export const __canon = {
        package: 'myblog.com/blog@1.0.0',
        class: 'BlogPost',
      };
    }

    export interface Comment extends Content {
      readonly authorName: string;
      readonly text: string;
      readonly timestamp: Date;
      readonly post: BlogPost;
    }

    export namespace Comment {
      export const __canon = {
        package: 'myblog.com/blog@1.0.0',
        class: 'Comment',
      };
    }

    export interface Category {
      readonly categoryName: string;
      readonly description: string;
      readonly parentCategory: Category;
    }

    export namespace Category {
      export const __canon = {
        package: 'myblog.com/blog@1.0.0',
        class: 'Category',
      };
    }

    // Instance Data

    export const technology: Category = {
      categoryName: "Technology",
      description: "Posts about technology and programming"
    };

    export const webDevelopment: Category = {
      categoryName: "Web Development",
      description: "Web development tutorials and tips",
      parentCategory: technology
    };

    export const aliceJohnson: Author = {
      name: "Alice Johnson",
      email: "alice@myblog.com",
      bio: "Full-stack developer with 10 years of experience"
    };

    export const bobSmith: Author = {
      name: "Bob Smith",
      email: "bob@myblog.com",
      bio: "Frontend specialist and UI/UX enthusiast"
    };

    export const introToCanon: BlogPost = {
      title: "Introduction to Canon Protocol",
      content: "Canon Protocol is a powerful semantic data modeling system...",
      publishedDate: new Date("2024-01-15T10:00:00Z"),
      author: aliceJohnson,
      category: webDevelopment,
      tags: ["canon", "semantic-web", "yaml"]
    };

    export const typescriptTips: BlogPost = {
      title: "10 TypeScript Tips for Better Code",
      content: "TypeScript has become the go-to language...",
      publishedDate: new Date("2024-01-20T14:30:00Z"),
      author: bobSmith,
      category: webDevelopment,
      tags: ["typescript", "javascript", "web-development"]
    };

    export const comment1: Comment = {
      authorName: "Charlie Reader",
      text: "Great introduction! Looking forward to learning more about Canon.",
      timestamp: new Date("2024-01-15T11:30:00Z"),
      post: introToCanon
    };

    export const comment2: Comment = {
      authorName: "Diana Developer",
      text: "These TypeScript tips are excellent. Especially #7!",
      timestamp: new Date("2024-01-20T16:00:00Z"),
      post: typescriptTips
    };
    ```

    ## Code Generation Highlights

    ### 1. Type-Safe Interfaces

    Each Canon class becomes a TypeScript interface:
    ```typescript
    export interface BlogPost extends Content {
      title: string;
      content: string;
      // ...
    }
    ```

    ### 2. Inheritance

    `subClassOf` becomes `extends`:
    ```typescript
    export interface Author extends Person { ... }
    ```

    ### 3. Type Mapping

    Canon types → TypeScript types:
    - `xsd.string` → `string`
    - `xsd.dateTime` → `Date`
    - `xsd.integer` → `number`
    - `xsd.boolean` → `boolean`

    ### 4. References

    ObjectProperty → interface reference:
    ```typescript
    author: Author;  // Not 'string', but Author interface!
    ```

    ### 5. All Properties Required

    All properties are generated as required (non-optional) by default:
    ```typescript
    readonly parentCategory: Category;
    ```

    ### 6. Instance Data

    Canon instances → TypeScript constants:
    ```typescript
    export const aliceJohnson: Author = { ... };
    ```

    ## Naming Conventions

    Canon uses kebab-case, TypeScript uses camelCase:
    - `alice-johnson` → `aliceJohnson`
    - `web-development` → `webDevelopment`
    - `intro-to-canon` → `introToCanon`

    Next: We'll use the generated code in a Node.js app!

# ========================================
# STEP 8: USE IN APPLICATION
# ========================================

Step8UseInApp:
  type: Tutorial
  title: "Step 8: Use Generated Code in Application"
  difficulty: Intermediate
  prerequisite: Step7GenerateTypeScript
  nextInPath: Step9EvolveSchema
  content: |
    # Step 8: Use Generated Code in Application

    ## Setup Node.js Project

    ```bash
    # Create app directory
    mkdir blog-app
    cd blog-app

    # Initialize Node.js project
    npm init -y

    # Install TypeScript
    npm install --save-dev typescript @types/node

    # Create tsconfig.json
    npx tsc --init
    ```

    ## Copy Generated Code

    ```bash
    cp ../generated/typescript/blog.ts ./src/models/
    ```

    ## Create Application Code

    File: `src/index.ts`

    ```typescript
    import {
      BlogPost,
      Author,
      Category,
      aliceJohnson,
      introToCanon,
      typescriptTips
    } from './models/blog';

    // Function to display blog post
    function displayPost(post: BlogPost): void {
      console.log(`
    ═══════════════════════════════════════
    ${post.title}
    ═══════════════════════════════════════
    By: ${post.author.name}
    Published: ${post.publishedDate.toLocaleDateString()}
    Category: ${post.category.categoryName}
    Tags: ${post.tags.join(', ')}

    ${post.content.substring(0, 200)}...
      `);
    }

    // Function to get posts by author
    function getPostsByAuthor(author: Author, posts: BlogPost[]): BlogPost[] {
      return posts.filter(post => post.author === author);
    }

    // Function to get posts by category
    function getPostsByCategory(category: Category, posts: BlogPost[]): BlogPost[] {
      return posts.filter(post => post.category === category);
    }

    // Main application
    console.log('📝 My Blog Application\n');

    // Display all posts
    const allPosts = [introToCanon, typescriptTips];
    allPosts.forEach(displayPost);

    // Get Alice's posts
    console.log('\n📚 Posts by Alice Johnson:');
    const alicePosts = getPostsByAuthor(aliceJohnson, allPosts);
    console.log(`Found ${alicePosts.length} post(s)`);
    ```

    ## Run the Application

    ```bash
    npx ts-node src/index.ts
    ```

    ## Output

    ```
    📝 My Blog Application

    ═══════════════════════════════════════
    Introduction to Canon Protocol
    ═══════════════════════════════════════
    By: Alice Johnson
    Published: 1/15/2024
    Category: Web Development
    Tags: canon, semantic-web, yaml

    Canon Protocol is a powerful semantic data modeling system
    that combines the expressiveness of RDF with the simplicity of YAML...

    ═══════════════════════════════════════
    10 TypeScript Tips for Better Code
    ═══════════════════════════════════════
    By: Bob Smith
    Published: 1/20/2024
    Category: Web Development
    Tags: typescript, javascript, web-development

    TypeScript has become the go-to language for building robust
    web applications. Here are 10 tips to improve your TypeScript...

    📚 Posts by Alice Johnson:
    Found 1 post(s)
    ```

    ## Type Safety Benefits

    The TypeScript compiler catches errors:

    ```typescript
    // ✗ ERROR - Type mismatch
    const post: BlogPost = {
      title: "Test",
      content: 123,  // Error: number not assignable to string
      // ... missing required fields
    };

    // ✗ ERROR - Wrong type
    displayPost(aliceJohnson);  // Error: Author not assignable to BlogPost

    // ✓ VALID
    displayPost(introToCanon);
    ```

    ## Adding Runtime Logic

    Create helper functions using generated types:

    ```typescript
    // Get most recent post
    function getMostRecentPost(posts: BlogPost[]): BlogPost | undefined {
      return posts.sort((a, b) =>
        b.publishedDate.getTime() - a.publishedDate.getTime()
      )[0];
    }

    // Calculate reading time (words per minute)
    function getReadingTime(post: BlogPost, wpm: number = 200): number {
      const words = post.content.split(/\s+/).length;
      return Math.ceil(words / wpm);
    }

    // Get all tags from posts
    function getAllTags(posts: BlogPost[]): string[] {
      const tags = new Set<string>();
      posts.forEach(post => post.tags.forEach(tag => tags.add(tag)));
      return Array.from(tags).sort();
    }
    ```

    Next: We'll evolve the schema by adding new features!

# ========================================
# STEP 9: EVOLVE THE SCHEMA
# ========================================

Step9EvolveSchema:
  type: Tutorial
  title: "Step 9: Evolve the Schema"
  difficulty: Intermediate
  prerequisite: Step8UseInApp
  nextInPath: Step10Publish
  content: |
    # Step 9: Evolve the Schema

    ## Adding New Features

    Let's add a "view count" feature to blog posts.

    ## Step 9.1: Add Property to Ontology

    Edit `blog@1.0.0.can.yml` and add:

    ```yaml
    viewCount:
      type: DatatypeProperty
      domain: BlogPost
      range: xsd.integer
      label: View Count
      comment: Number of times this post has been viewed
    ```

    ## Step 9.2: Update Instances

    Add view counts to existing posts:

    ```yaml
    intro-to-canon:
      type: BlogPost
      title: Introduction to Canon Protocol
      # ... existing properties ...
      viewCount: 1523  # NEW!

    typescript-tips:
      type: BlogPost
      title: 10 TypeScript Tips for Better Code
      # ... existing properties ...
      viewCount: 2847  # NEW!
    ```

    ## Step 9.3: Validate Changes

    ```bash
    canon validate
    ```

    Still validates! This is a **backward-compatible** change (minor version).

    ## Step 9.4: Regenerate TypeScript

    ```bash
    canon generate \
      --output generated/typescript
    ```

    ## Step 9.5: Review Updated Interface

    ```typescript
    export interface BlogPost extends Content {
      title: string;
      content: string;
      publishedDate: Date;
      author: Author;
      category: Category;
      tags: string[];
      viewCount: number;  // NEW! Required field
    }

    export const introToCanon: BlogPost = {
      // ... existing fields ...
      viewCount: 1523
    };
    ```

    ## Step 9.6: Update Application Code

    Add view count display:

    ```typescript
    function displayPost(post: BlogPost): void {
      console.log(`
    ═══════════════════════════════════════
    ${post.title}
    ═══════════════════════════════════════
    By: ${post.author.name}
    Published: ${post.publishedDate.toLocaleDateString()}
    Views: ${post.viewCount.toLocaleString()}  // NEW!
    // ...
      `);
    }

    // Get most popular post
    function getMostPopularPost(posts: BlogPost[]): BlogPost | undefined {
      return posts.sort((a, b) => b.viewCount - a.viewCount)[0];
    }
    ```

    ## Version Bumping Strategy

    ### Minor Version (1.0.0 → 1.1.0)

    Backward-compatible additions:
    - ✅ Add new property
    - ✅ Add new class
    - ✅ Add new instance

    ### Major Version (1.0.0 → 2.0.0)

    Breaking changes:
    - ❌ Remove property
    - ❌ Change property type
    - ❌ Remove class
    - ❌ Change class hierarchy

    ### Patch Version (1.0.0 → 1.0.1)

    Non-breaking fixes:
    - ✅ Fix typos in labels/comments
    - ✅ Add missing documentation
    - ✅ Fix validation errors

    ## Making a Breaking Change

    Let's say we want to change `authorName` in Comment to an Author reference.

    ### Current (1.0.0):

    ```yaml
    Comment:
      type: rdfs.Class
      # ...

    authorName:
      type: DatatypeProperty
      domain: Comment
      range: xsd.string  # String - just a name
    ```

    ### New (2.0.0):

    ```yaml
    commentAuthor:
      type: ObjectProperty
      domain: Comment
      range: Author  # BREAKING: Changed from string to Author reference
    ```

    This requires:
    1. Bump to `2.0.0`
    2. Update all instances
    3. Document migration in CHANGELOG

    Next: We'll publish the package!

# ========================================
# STEP 10: PUBLISH PACKAGE
# ========================================

Step10Publish:
  type: Tutorial
  title: "Step 10: Publish the Package"
  difficulty: Advanced
  prerequisite: Step9EvolveSchema
  content: |
    # Step 10: Publish the Package

    ## Prepare for Publishing

    ### 1. Final Validation

    ```bash
    canon validate --verbose
    ```

    Ensure everything passes!

    ### 2. Update Version

    Since we added `viewCount` property, bump minor version:

    Edit `blog@1.0.0.can.yml`:

    ```yaml
    blog:
      type: Package
      publisher: myblog.com
      version: 1.1.0  # Was 1.0.0, now 1.1.0
    ```

    Rename file:
    ```bash
    mv specs/myblog.com/blog@1.0.0.can.yml \
       specs/myblog.com/blog@1.1.0.can.yml
    ```

    ### 3. Create CHANGELOG

    Create `CHANGELOG.md`:

    ```markdown
    # Changelog

    ## [1.1.0] - 2024-01-25

    ### Added
    - Added `viewCount` property to BlogPost class
    - Added view count data to sample posts

    ## [1.0.0] - 2024-01-15

    ### Added
    - Initial release
    - Author, BlogPost, Comment, Category classes
    - Sample blog data
    ```

    ## Publish to Registry

    ### Option 1: GitHub Container Registry

    ```bash
    # Login to GitHub Container Registry
    echo $GITHUB_TOKEN | canon auth login ghcr.io \
      -u YOUR_GITHUB_USERNAME \
      --password-stdin

    # Publish package
    canon package publish specs/myblog.com/blog@1.1.0.can.yml
    ```

    ### Option 2: Local Registry (Testing)

    ```bash
    # Start local OCI registry
    docker run -d -p 5000:5000 --name canon-registry registry:2

    # Publish to local registry
    canon package publish specs/myblog.com/blog@1.1.0.can.yml
    ```

    ## Verify Publication

    ```bash
    # List package versions
    canon package list ghcr.io/YOUR_USERNAME/canon/myblog.com/blog

    # Install package to verify
    canon package install ghcr.io/YOUR_USERNAME/canon/myblog.com/blog:1.1.0
    ```

    ## Use Published Package

    Other projects can now import your package:

    ```yaml
    # other-project@1.0.0.can.yml
    myblog-client:
      type: Package
      publisher: otherapp.com
      version: 1.0.0
      imports:
        - publisher: myblog.com
          packages:
            - package: blog
              match: ^
              version: 1.1.0

    # Use entities from imported package
    my-favorite-post:
      type: blog.BlogPost
      title: "My Post"
      author: blog.aliceJohnson  # Reference from imported package
    ```

    ## Git Tagging

    Tag your release in Git:

    ```bash
    git add .
    git commit -m "Release v1.1.0 - Add viewCount property"
    git tag -a v1.1.0 -m "Release version 1.1.0"
    git push origin main --tags
    ```

    ## Congratulations!

    You've completed the full Canon workflow:

    ✅ Designed an ontology from business requirements
    ✅ Created classes and properties
    ✅ Added instance data
    ✅ Validated your ontology
    ✅ Generated TypeScript code
    ✅ Used generated types in a Node.js application
    ✅ Evolved the schema with new features
    ✅ Published the package to a registry

    ## Next Steps

    - Explore more advanced patterns (patterns-modeling@1.0.0)
    - Learn about validation rules (validation@1.0.0)
    - Understand type system (type-system@1.0.0)
    - Study entity resolution (resolution@1.0.0)

TutorialSummary:
  type: ConceptualModel
  title: Tutorial Summary and Key Takeaways
  difficulty: Beginner
  content: |
    # Tutorial Summary

    ## What We Built

    A complete blog system with:
    - 4 classes (Author, BlogPost, Comment, Category)
    - 15 properties (name, email, title, content, etc.)
    - 8 instances (2 authors, 2 posts, 2 comments, 2 categories)
    - Generated TypeScript interfaces
    - Working Node.js application
    - Published package

    ## Key Concepts Learned

    ### 1. Ontology Design
    - Identify entities (classes) from business requirements
    - Define relationships (properties) between entities
    - Create class hierarchies (subClassOf)

    ### 2. Canon YAML Syntax
    - Package metadata (publisher, package, version)
    - Class definitions (type: rdfs.Class)
    - Property definitions (DatatypeProperty, ObjectProperty)
    - Instance data (type + property values)

    ### 3. Validation
    - Type resolution
    - Property resolution
    - Reference resolution
    - Type compatibility

    ### 4. Code Generation
    - Canon → TypeScript transformation
    - Type-safe interfaces
    - Instance data as constants
    - Naming conventions (kebab-case → camelCase)

    ### 5. Evolution
    - Backward-compatible changes (minor version)
    - Breaking changes (major version)
    - Regenerating code after schema changes

    ### 6. Publishing
    - Versioning strategy (semver)
    - Publishing to OCI registries
    - Importing published packages

    ## Design Patterns Used

    - **Class Hierarchy**: Person → Author, Content → BlogPost/Comment
    - **Entity References**: BlogPost.author → Author
    - **Self-References**: Category.parentCategory → Category
    - **Multi-Value Properties**: BlogPost.tags (array)

    ## Common Pitfalls Avoided

    - ❌ Embedded objects with explicit type
    - ❌ Missing imports
    - ❌ Undefined properties
    - ❌ Broken entity references
    - ❌ Type mismatches

    ## Production Considerations

    For real-world use, consider:
    - **Validation**: Add cardinality constraints (min/max values)
    - **Security**: Add authentication/authorization properties
    - **Performance**: Index frequently queried properties
    - **Internationalization**: Add multi-language labels
    - **Versioning**: Plan migration paths for breaking changes

    ## Complete File Structure

    ```
    blog-canon-tutorial/
    ├── specs/
    │   └── myblog.com/
    │       └── blog@1.1.0.can.yml    # Ontology
    ├── generated/
    │   └── typescript/
    │       └── blog.ts                 # Generated code
    ├── blog-app/
    │   ├── src/
    │   │   ├── models/
    │   │   │   └── blog.ts            # Copied generated code
    │   │   └── index.ts                # Application
    │   ├── package.json
    │   └── tsconfig.json
    ├── CHANGELOG.md
    └── README.md
    ```

    ## Time Investment vs Value

    - Initial setup: 10 minutes
    - Ontology design: 20 minutes
    - Implementation: 30 minutes
    - Code generation: 5 minutes
    - Application code: 20 minutes
    - **Total: ~90 minutes**

    **Value delivered:**
    - Type-safe data model
    - Auto-generated code
    - Semantic validation
    - Evolvable schema
    - Publishable/shareable package
    - Documentation built-in

    ## Continue Learning

    - **Patterns**: See `patterns-modeling@1.0.0` for advanced modeling
    - **Validation**: See `validation@1.0.0` for all validation rules
    - **Resolution**: See `resolution@1.0.0` for import mechanics
    - **Type System**: See `type-system@1.0.0` for type classification
