# Package declaration
type-system:
  type: Package
  publisher: canon-protocol.org
  version: 1.0.2
  imports:
    - publisher: canon-protocol.org
      packages:
        - package: education
          match: ^
          version: 1.0.1
        - package: core-rdf
          match: ^
          version: 1.0.1
          alias: rdfs

# ========================================
# TYPE SYSTEM OVERVIEW
# ========================================

TypeSystemOverview:
  type: ConceptualModel
  title: Canon Type System
  difficulty: Intermediate
  content: |
    # Understanding Canon's Type System

    Canon uses a sophisticated type classification system that distinguishes
    between declared types and effective types based on property ranges.

    ## Two Dimensions of Typing

    ### 1. Declared Type (Explicit)
    What you write in the `type` property:
    - `DatatypeProperty` - Explicitly declared as datatype
    - `ObjectProperty` - Explicitly declared as object
    - `Property` - Generic base type (rarely used)

    ### 2. Effective Type (Inferred)
    What Canon determines from the `range` property:
    - If range is XSD datatype → Effectively a DatatypeProperty
    - If range is rdfs:Literal → Effectively a DatatypeProperty
    - If range is a Class → Effectively an ObjectProperty

    ## Why This Matters

    This dual classification allows:
    - Flexible property declarations (use generic Property if needed)
    - Automatic type inference from ranges
    - Backward compatibility with simple RDF Property
    - Smart validation based on effective type

    ## The Classification Algorithm

    ```
    IsEffectiveDatatypeProperty:
      1. Explicit DatatypeProperty? → TRUE
      2. Property with XSD range? → TRUE
      3. Property with rdfs:Literal range? → TRUE
      4. Otherwise → FALSE

    IsEffectiveObjectProperty:
      1. Explicit ObjectProperty? → TRUE
      2. Property with non-XSD, non-Literal range? → TRUE
      3. Otherwise → FALSE
    ```

# ========================================
# PROPERTY TYPE CLASSIFICATION
# ========================================

PropertyTypeClassification:
  type: TechnicalExplanation
  title: Property Type Classification Logic
  difficulty: Advanced
  prerequisite: TypeSystemOverview
  content: |
    # How Canon Classifies Properties

    Canon uses the **TypeResolver** component to determine a property's
    classification.

    ## Classification Categories

    ### 1. Declared Type
    From the `type` property value:
    - `DatatypeProperty` - Holds literal values
    - `ObjectProperty` - References other entities
    - `Property` - Generic (RDF base class)
    - `AnnotationProperty` - Metadata/documentation
    - `FunctionalProperty` - At most one value
    - Other OWL property types

    ### 2. Effective Datatype Property
    A property is an effective datatype property if:

    **Condition A**: Explicitly declared as DatatypeProperty
    ```yaml
    name:
      type: DatatypeProperty
      range: string
    ```

    **Condition B**: Declared as Property with XSD datatype range
    ```yaml
    name:
      type: Property  # Generic type
      range: xsd.string  # XSD datatype → effectively datatype property
    ```

    **Condition C**: Declared as Property with rdfs:Literal range
    ```yaml
    value:
      type: Property
      range: rdfs.Literal  # Literal → effectively datatype property
    ```

    ### 3. Effective Object Property
    A property is an effective object property if:

    **Condition A**: Explicitly declared as ObjectProperty
    ```yaml
    author:
      type: ObjectProperty
      range: Person
    ```

    **Condition B**: Declared as Property with non-XSD, non-Literal range
    ```yaml
    author:
      type: Property  # Generic type
      range: Person  # Class reference → effectively object property
    ```

    ## Algorithm Implementation

    ```csharp
    IsEffectiveDatatypeProperty(propertyType, rangeUri):
      // Explicit datatype property
      if propertyType == "DatatypeProperty":
        return true

      // Property with XSD datatype range
      if IsXsdDatatype(rangeUri):
        return true

      // Property with rdfs:Literal range
      if IsRdfsLiteral(rangeUri):
        return true

      return false

    IsEffectiveObjectProperty(propertyType, rangeUri):
      // Explicit object property
      if propertyType == "ObjectProperty":
        return true

      // Generic Property with non-XSD range
      if propertyType == "Property" &&
         rangeUri != null &&
         !IsXsdDatatype(rangeUri) &&
         !IsRdfsLiteral(rangeUri):
        return true

      return false
    ```

    ## Why Both Classifications?

    1. **Backward Compatibility**: Supports simple RDF Property
    2. **Flexibility**: Can use generic Property + range for typing
    3. **Validation**: Can validate based on effective type
    4. **Code Generation**: Uses effective type for target language

# ========================================
# XSD DATATYPE DETECTION
# ========================================

XsdDatatypeDetection:
  type: TechnicalExplanation
  title: XSD Datatype Recognition
  difficulty: Intermediate
  prerequisite: PropertyTypeClassification
  content: |
    # Recognizing XML Schema Datatypes

    Canon automatically recognizes 26 XSD datatypes by their URI pattern.

    ## Detection Algorithm

    A CanonUri is an XSD datatype if ALL conditions are met:

    1. **Publisher**: `canon-protocol.org`
    2. **Package**: `core-xsd`
    3. **Name**: One of the known XSD datatype names

    ## Known XSD Datatypes (26 total)

    ### Numeric Types
    - `integer`, `int` (alias for integer), `long`, `short`, `byte`
    - `nonNegativeInteger`, `positiveInteger`, `negativeInteger`, `nonPositiveInteger`
    - `unsignedInt`, `unsignedLong`, `unsignedShort`, `unsignedByte`
    - `decimal`, `float`, `double`

    ### String Types
    - `string`

    ### Date/Time Types
    - `date`, `time`, `dateTime`
    - `duration`

    ### Binary Types
    - `hexBinary`, `base64Binary`

    ### Boolean
    - `boolean`, `bool` (alias for boolean)

    ### URI Types
    - `anyURI`

    ## Why This Matters

    XSD datatype detection determines:
    - Whether property is effective DatatypeProperty
    - How values are parsed (string, number, boolean)
    - How code is generated (which primitive type to use)

    ## Example

    ```yaml
    # These are all XSD datatypes:
    name:
      range: xsd.string  # → canon-protocol.org/core-xsd/string@1.0.0

    age:
      range: xsd.integer  # → canon-protocol.org/core-xsd/integer@1.0.0

    isActive:
      range: xsd.boolean  # → canon-protocol.org/core-xsd/boolean@1.0.0

    # This is NOT an XSD datatype:
    category:
      range: Category  # → Custom class, not XSD
    ```

# ========================================
# RDFS LITERAL DETECTION
# ========================================

RdfsLiteralDetection:
  type: TechnicalExplanation
  title: Literal Type as Datatype Superclass
  difficulty: Intermediate
  prerequisite: XsdDatatypeDetection
  content: |
    # Understanding rdfs.Literal

    In RDF semantics, **rdfs.Literal** is the superclass of all literal datatypes.

    ## Detection Algorithm

    A CanonUri represents rdfs:Literal if ALL conditions are met:

    1. **Publisher**: `canon-protocol.org`
    2. **Package**: `core-rdf`
    3. **Name**: `Literal`

    ## Semantic Meaning

    rdfs:Literal represents any literal value:
    - Strings
    - Numbers
    - Booleans
    - Dates
    - Any XSD datatype

    It's the broadest possible datatype range.

    ## Usage

    ```yaml
    # Using rdfs:Literal as range
    value:
      type: DatatypeProperty
      domain: Setting
      range: rdfs.Literal  # Can be any literal type

    # Instances can use any literal
    maxRetries:
      type: Setting
      value: 5  # Integer literal

    appName:
      type: Setting
      value: "My App"  # String literal
    ```

    ## Type Classification Impact

    Properties with rdfs:Literal range are treated as **effective datatype
    properties**, even if declared as generic Property:

    ```yaml
    value:
      type: Property  # Generic type
      range: rdfs.Literal  # → Effective DatatypeProperty!
    ```

# ========================================
# TYPE INFERENCE IN PRACTICE
# ========================================

TypeInferenceExample1:
  type: CodeExample
  title: Declared vs Effective Types
  language: yaml
  codeSnippet: |
    # Example 1: Explicit DatatypeProperty
    name:
      type: DatatypeProperty  # Declared: DatatypeProperty
      range: string           # Effective: DatatypeProperty
    # Classification: Both declared and effective are datatype

    # Example 2: Generic Property with XSD range
    age:
      type: Property          # Declared: Property (generic)
      range: xsd.integer      # Effective: DatatypeProperty (XSD range)
    # Classification: Declared generic, but effective datatype

    # Example 3: Explicit ObjectProperty
    author:
      type: ObjectProperty    # Declared: ObjectProperty
      range: Person           # Effective: ObjectProperty
    # Classification: Both declared and effective are object

    # Example 4: Generic Property with Class range
    category:
      type: Property          # Declared: Property (generic)
      range: Category         # Effective: ObjectProperty (Class range)
    # Classification: Declared generic, but effective object

    # Example 5: Property with rdfs:Literal
    setting:
      type: Property          # Declared: Property (generic)
      range: rdfs.Literal     # Effective: DatatypeProperty (Literal)
    # Classification: Declared generic, but effective datatype

TypeInferenceExample2:
  type: CodeExample
  title: Value Parsing Based on Effective Type
  language: yaml
  codeSnippet: |
    # When parsing values, Canon uses EFFECTIVE type

    # Effective DatatypeProperty → Parse as literal
    person:
      name: "Alice"      # Parsed as StringStatement
      age: 30            # Parsed as NumberStatement
      isActive: true     # Parsed as BooleanStatement

    # Effective ObjectProperty → Parse as reference
    person:
      employer: acme-organization  # Parsed as ReferenceStatement
      # Looks up acme-organization entity

    # The effective type determines the statement type created,
    # which affects code generation and validation

TypeInferenceBestPractices:
  type: ConceptualModel
  title: Type Classification Best Practices
  difficulty: Intermediate
  content: |
    # Best Practices for Property Typing

    ## 1. Use Specific Types When Possible

    **Recommended:**
    ```yaml
    name:
      type: DatatypeProperty
      range: string
    ```

    **Acceptable but less clear:**
    ```yaml
    name:
      type: Property  # Generic - relies on range inference
      range: string
    ```

    ## 2. Always Declare Range

    Range is critical for type inference:

    ```yaml
    # ❌ BAD - No way to infer type
    name:
      type: Property
      # Missing range!

    # ✅ GOOD - Clear type from range
    name:
      type: Property
      range: string
    ```

    ## 3. Use XSD Datatypes Consistently

    Import xsd and use standard datatypes:

    ```yaml
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-xsd
            match: ^
            version: 1.0.1

    # Use xsd types
    count:
      type: DatatypeProperty
      range: xsd.integer  # Standard, well-known

    # Avoid custom literal types unless necessary
    ```

    ## 4. Understand Effective Type for Validation

    Validation uses EFFECTIVE type:

    ```yaml
    # This property is effectively a DatatypeProperty
    value:
      type: Property
      range: xsd.string

    # So this instance is valid:
    setting:
      value: "text"  # String literal

    # But this would be invalid:
    setting:
      value: SomeEntity  # ❌ ERROR: Expected literal, got reference
    ```

    ## 5. Code Generation Uses Effective Type

    When generating TypeScript/C#/Rust code:

    - Effective DatatypeProperty → Primitive type field
    - Effective ObjectProperty → Reference/navigation property

    ```csharp
    // Generated C#: interface + class pattern with attributes
    [CanonType("MyEntity", Package = "example.com/myapp@1.0.0")]
    public interface IMyEntity
    {
        string? Name { get; }         // DatatypeProperty → nullable
        IPerson? Author { get; }      // ObjectProperty → interface reference
    }

    [CanonType("MyEntity", Package = "example.com/myapp@1.0.0")]
    public class MyEntity : IMyEntity
    {
        [CanonProperty("name")]
        public string? Name { get; set; }

        [CanonProperty("author")]
        public Person? Author { get; set; }
        IPerson? IMyEntity.Author => Author;
    }
    ```

    Choose your property types based on how you want code generated!
