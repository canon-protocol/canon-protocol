# Package declaration
yaml-to-rdf:
  type: Package
  publisher: canon-protocol.org
  version: 1.0.1
  imports:
    - publisher: canon-protocol.org
      packages:
        - package: education
          match: ^
          version: 1.0.1
        - package: core-rdf
          match: ^
          version: 1.0.1
          alias: rdfs

# ========================================
# YAML TO RDF MAPPING OVERVIEW
# ========================================

YamlToRdfOverview:
  type: ConceptualModel
  title: Understanding YAML to RDF Transformation
  difficulty: Intermediate
  content: |
    # Understanding YAML to RDF Transformation

    Canon Protocol bridges the gap between YAML (human-friendly) and
    RDF (machine-semantic) by transforming Canon YAML documents into
    RDF triples.

    ## The Core Concept

    Every Canon YAML structure maps to RDF triples:

    ```yaml
    # YAML
    alice:
      type: Person
      name: "Alice Johnson"
    ```

    Becomes RDF triples:

    ```turtle
    # RDF (Turtle syntax)
    <myblog.com/blog@1.0.0/alice> a <...Person> .
    <myblog.com/blog@1.0.0/alice> <...name> "Alice Johnson" .
    ```

    ## Why This Matters

    Understanding the YAML→RDF mapping helps you:
    - Debug semantic issues
    - Understand validation errors
    - Design better ontologies
    - Reason about data semantics
    - Integrate with RDF tools

    ## RDF Primer

    RDF represents knowledge as **triples**:
    - **Subject** - What we're talking about (alice)
    - **Predicate** - Property or relationship (name)
    - **Object** - Value or target entity ("Alice Johnson")

    Canon YAML is syntactic sugar for creating these triples.

# ========================================
# ENTITY TO URI MAPPING
# ========================================

EntityToUriMapping:
  type: TechnicalExplanation
  title: Entity Names to URIs
  difficulty: Intermediate
  prerequisite: YamlToRdfOverview
  content: |
    # Entity Names to URIs

    Every Canon entity name becomes a fully qualified URI.

    ## Mapping Algorithm

    ```
    Entity Name → URI Construction:

    1. Publisher: From package publisher
    2. Package: Package key name
    3. Name: Entity key in YAML
    4. Version: From package version

    URI = publisher/package@version/name
    ```

    ## Examples

    ### Package Metadata

    ```yaml
    blog:
      type: Package
      publisher: myblog.com
      version: 1.0.0
    ```

    ### Entity Mapping

    ```yaml
    # YAML entity name
    alice-johnson:
      type: Person

    # Becomes URI
    <myblog.com/blog@1.0.0/alice-johnson>
    ```

    ### Class Mapping

    ```yaml
    # Class definition
    Person:
      type: rdfs.Class

    # URI
    <myblog.com/blog@1.0.0/Person>
    ```

    ### Property Mapping

    ```yaml
    # Property definition
    name:
      type: DatatypeProperty

    # URI
    <myblog.com/blog@1.0.0/name>
    ```

    ## Qualified References

    When you use qualified references (alias.name), they resolve to
    the imported package's URI:

    ```yaml
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-rdf
            match: ^
            version: 1.0.1
            alias: rdfs

    # Reference: rdfs.Class
    # Resolves to: <canon-protocol.org/core-rdf@1.0.0/Class>
    ```

    ## URI Format

    Canon uses this URI scheme:
    ```
    {publisher}/{package}@{version}/{name}
    ```

    When converted to HTTP URIs for RDF:
    ```
    https://{publisher}/{package}?v={version}/{name}
    ```

# ========================================
# YAML STRUCTURE TO TRIPLES
# ========================================

YamlStructureToTriples:
  type: TechnicalExplanation
  title: YAML Structure to RDF Triples
  difficulty: Intermediate
  prerequisite: EntityToUriMapping
  content: |
    # YAML Structure to RDF Triples

    ## Metadata Section

    The package section generates package metadata triples:

    ```yaml
    blog:
      type: Package
      publisher: myblog.com
      version: 1.0.0
      description: Blog system ontology
    ```

    Becomes:

    ```turtle
    <myblog.com/blog@1.0.0> a canon:Package .
    <myblog.com/blog@1.0.0> canon:publisher "myblog.com" .
    <myblog.com/blog@1.0.0> canon:package "blog" .
    <myblog.com/blog@1.0.0> canon:version "1.0.0" .
    <myblog.com/blog@1.0.0> rdfs:comment "Blog system ontology" .
    ```

    ## Class Definitions

    Class definitions become type and metadata triples:

    ```yaml
    Person:
      type: rdfs.Class
      label: Person
      comment: Represents a person
      subClassOf: rdfs.Resource
    ```

    Becomes:

    ```turtle
    <myblog.com/blog@1.0.0/Person> a rdfs:Class .
    <myblog.com/blog@1.0.0/Person> rdfs:label "Person" .
    <myblog.com/blog@1.0.0/Person> rdfs:comment "Represents a person" .
    <myblog.com/blog@1.0.0/Person> rdfs:subClassOf <.../rdfs@1.0.0/Resource> .
    ```

    ## Property Definitions

    Properties generate type, domain, and range triples:

    ```yaml
    name:
      type: DatatypeProperty
      domain: Person
      range: xsd.string
      label: Name
    ```

    Becomes:

    ```turtle
    <myblog.com/blog@1.0.0/name> a owl:DatatypeProperty .
    <myblog.com/blog@1.0.0/name> rdfs:domain <.../Person> .
    <myblog.com/blog@1.0.0/name> rdfs:range <canon-protocol.org/core-xsd@1.0.0/string> .
    <myblog.com/blog@1.0.0/name> rdfs:label "Name" .
    ```

    ## Instance Data

    Instances become subject-predicate-object triples:

    ```yaml
    alice-johnson:
      type: Person
      name: "Alice Johnson"
      email: "alice@myblog.com"
    ```

    Becomes:

    ```turtle
    <myblog.com/blog@1.0.0/alice-johnson> a <.../Person> .
    <myblog.com/blog@1.0.0/alice-johnson> <.../name> "Alice Johnson" .
    <myblog.com/blog@1.0.0/alice-johnson> <.../email> "alice@myblog.com" .
    ```

    ## Key-Value Pair Mapping

    Every YAML key-value pair → RDF triple:

    ```
    YAML:      subject: { predicate: object }
    RDF:       <subject> <predicate> "object" .
    ```

# ========================================
# LITERAL VALUES TO RDF OBJECTS
# ========================================

LiteralValuesToRdfObjects:
  type: TechnicalExplanation
  title: Literal Values in RDF
  difficulty: Intermediate
  prerequisite: YamlStructureToTriples
  content: |
    # Literal Values in RDF

    DatatypeProperty values become RDF literals with datatypes.

    ## String Literals

    ```yaml
    # YAML
    alice:
      name: "Alice Johnson"
    ```

    ```turtle
    # RDF
    <...@1.0.0/alice> <...@1.0.0/name> "Alice Johnson"^^xsd:string .
    ```

    The `^^xsd:string` suffix indicates datatype.

    ## Number Literals

    ```yaml
    # YAML
    post:
      viewCount: 1523
    ```

    ```turtle
    # RDF
    <...@1.0.0/post> <...@1.0.0/viewCount> "1523"^^xsd:integer .
    ```

    Numbers are stored as typed literals.

    ## Boolean Literals

    ```yaml
    # YAML
    post:
      isPublished: true
    ```

    ```turtle
    # RDF
    <...@1.0.0/post> <...@1.0.0/isPublished> "true"^^xsd:boolean .
    ```

    ## DateTime Literals

    ```yaml
    # YAML
    post:
      publishedDate: "2024-01-15T10:00:00Z"
    ```

    ```turtle
    # RDF
    <...@1.0.0/post> <...@1.0.0/publishedDate>
      "2024-01-15T10:00:00Z"^^xsd:dateTime .
    ```

    ## Type Preservation

    Canon preserves YAML types through to RDF datatypes:

    | YAML Type | RDF Datatype |
    |-----------|--------------|
    | string | xsd:string |
    | integer | xsd:integer |
    | float | xsd:decimal |
    | boolean | xsd:boolean |
    | ISO 8601 date | xsd:dateTime |

# ========================================
# ENTITY REFERENCES TO RDF RESOURCES
# ========================================

EntityReferencesToRdfResources:
  type: TechnicalExplanation
  title: Entity References in RDF
  difficulty: Intermediate
  prerequisite: LiteralValuesToRdfObjects
  content: |
    # Entity References in RDF

    ObjectProperty values become RDF resource references (URIs, not literals).

    ## Direct Reference

    ```yaml
    # YAML
    intro-to-canon:
      type: BlogPost
      author: alice-johnson  # Reference to entity
    ```

    ```turtle
    # RDF
    <...@1.0.0/intro-to-canon> a <...@1.0.0/BlogPost> .
    <...@1.0.0/intro-to-canon> <...@1.0.0/author> <...@1.0.0/alice-johnson> .
    ```

    Note: `author` triple's object is a URI, not a string literal.

    ## Qualified Reference

    ```yaml
    # YAML
    imports:
      - publisher: pkg.com
        packages:
          - package: people
            match: ^
            version: 1.0.1

    my-post:
      author: people.alice
    ```

    ```turtle
    # RDF
    <.../my-post> <.../author> <pkg.com/people@1.0.0/alice> .
    ```

    Qualified reference resolves to imported package's URI.

    ## Self-Reference

    ```yaml
    # YAML
    web-development:
      type: Category
      parentCategory: technology
    ```

    ```turtle
    # RDF
    <...@1.0.0/web-development> <...@1.0.0/parentCategory> <...@1.0.0/technology> .
    ```

    Self-references work the same way.

    ## Multiple References (Lists)

    ```yaml
    # YAML
    author:
      posts:
        - post-1
        - post-2
        - post-3
    ```

    ```turtle
    # RDF (multiple triples with same predicate)
    <...@1.0.0/author> <...@1.0.0/posts> <...@1.0.0/post-1> .
    <...@1.0.0/author> <...@1.0.0/posts> <...@1.0.0/post-2> .
    <...@1.0.0/author> <...@1.0.0/posts> <...@1.0.0/post-3> .
    ```

    Arrays become multiple triples with same subject and predicate.

# ========================================
# EMBEDDED OBJECTS TO RDF
# ========================================

EmbeddedObjectsToRdf:
  type: TechnicalExplanation
  title: Embedded Objects in RDF
  difficulty: Advanced
  prerequisite: EntityReferencesToRdfResources
  content: |
    # Embedded Objects in RDF

    Canon supports embedded objects (objects without explicit names).
    These become RDF blank nodes.

    ## Blank Node Generation

    ```yaml
    # YAML
    alice:
      type: Person
      hasAddress:  # Embedded object
        street: "123 Main St"
        city: "Springfield"
    ```

    ```turtle
    # RDF
    <...@1.0.0/alice> a <...@1.0.0/Person> .
    <...@1.0.0/alice> <...@1.0.0/hasAddress> _:b1 .

    _:b1 a <...@1.0.0/Address> .  # Type inferred from property range
    _:b1 <...@1.0.0/street> "123 Main St"^^xsd:string .
    _:b1 <...@1.0.0/city> "Springfield"^^xsd:string .
    ```

    The `_:b1` is a blank node identifier (anonymous resource).

    ## Type Inference

    Embedded object type is inferred from parent property's range:

    ```yaml
    # Property definition
    hasAddress:
      type: ObjectProperty
      domain: Person
      range: Address  # Type for embedded objects

    # Embedded object gets type Address
    alice:
      hasAddress:
        # Implicitly type: Address
        street: "..."
    ```

    ## Why No Explicit Type?

    Embedded objects CANNOT have explicit `type` because:

    1. Type is already determined by property range
    2. Explicit type could conflict with range
    3. RDF blank nodes get type from property semantics

    This is THE #1 error new users make!

    ## Embedded vs Named

    ```yaml
    # EMBEDDED - becomes blank node
    alice:
      hasAddress:
        street: "123 Main"

    # NAMED - becomes named resource
    alice-address:
      type: Address
      street: "123 Main"

    alice:
      hasAddress: alice-address  # Reference
    ```

    Use embedded for data that:
    - Doesn't need to be referenced elsewhere
    - Is tightly coupled to parent
    - Won't be shared

    Use named for data that:
    - Needs to be referenced by multiple entities
    - Has independent lifecycle
    - Represents a significant concept

# ========================================
# IMPORTS TO RDF
# ========================================

ImportsToRdf:
  type: TechnicalExplanation
  title: Import Declarations in RDF
  difficulty: Intermediate
  prerequisite: EmbeddedObjectsToRdf
  content: |
    # Import Declarations in RDF

    The `imports` section generates OWL import triples.

    ## Import Mapping

    ```yaml
    # YAML
    blog:
      type: Package
      publisher: myblog.com
      version: 1.0.0
      imports:
        - publisher: canon-protocol.org
          packages:
            - package: core-rdf
              match: ^
              version: 1.0.1
              alias: rdfs
            - package: core-xsd
              match: ^
              version: 1.0.1
    ```

    ```turtle
    # RDF
    <myblog.com/blog@1.0.0> a owl:Ontology .
    <myblog.com/blog@1.0.0> owl:imports <canon-protocol.org/core-rdf@1.0.0> .
    <myblog.com/blog@1.0.0> owl:imports <canon-protocol.org/core-xsd@1.0.0> .
    ```

    ## Import Resolution

    When Canon resolves a qualified reference:

    ```yaml
    Person:
      type: rdfs.Class
    ```

    It follows the import chain:

    1. `rdfs` is alias for `core-rdf`
    2. Look up `Class` in `core-rdf@1.0.0`
    3. Resolve to `<canon-protocol.org/core-rdf@1.0.0/Class>`
    4. Generate triple with resolved URI

    ## Transitive Imports

    If Package A imports B, and B imports C, then A can use C's entities.

    This is represented as transitive owl:imports in RDF:

    ```turtle
    <A@1.0.0> owl:imports <B@1.0.0> .
    <B@1.0.0> owl:imports <C@1.0.0> .
    # Reasoner infers: A can use entities from C
    ```

# ========================================
# ARRAYS TO RDF
# ========================================

ArraysToRdf:
  type: TechnicalExplanation
  title: Arrays and Multi-Value Properties
  difficulty: Intermediate
  prerequisite: ImportsToRdf
  content: |
    # Arrays and Multi-Value Properties

    YAML arrays become multiple RDF triples with the same predicate.

    ## Array of Literals

    ```yaml
    # YAML
    post:
      tags:
        - canon
        - yaml
        - semantic-web
    ```

    ```turtle
    # RDF - Multiple triples
    <...@1.0.0/post> <...@1.0.0/tags> "canon"^^xsd:string .
    <...@1.0.0/post> <...@1.0.0/tags> "yaml"^^xsd:string .
    <...@1.0.0/post> <...@1.0.0/tags> "semantic-web"^^xsd:string .
    ```

    ## Array of References

    ```yaml
    # YAML
    author:
      posts:
        - intro-to-canon
        - typescript-tips
        - debugging-guide
    ```

    ```turtle
    # RDF
    <...@1.0.0/author> <...@1.0.0/posts> <...@1.0.0/intro-to-canon> .
    <...@1.0.0/author> <...@1.0.0/posts> <...@1.0.0/typescript-tips> .
    <...@1.0.0/author> <...@1.0.0/posts> <...@1.0.0/debugging-guide> .
    ```

    ## Order Preservation

    RDF triples are unordered sets, but Canon can preserve order using
    RDF lists (rdf:List):

    ```yaml
    # YAML - ordered list
    tutorial:
      steps:
        - step-1
        - step-2
        - step-3
    ```

    ```turtle
    # RDF with order preservation
    <...@1.0.0/tutorial> <...@1.0.0/steps> (
      <...@1.0.0/step-1>
      <...@1.0.0/step-2>
      <...@1.0.0/step-3>
    ) .
    ```

    The `( ... )` notation creates an rdf:List with order preserved.

# ========================================
# COMPLETE EXAMPLE
# ========================================

CompleteYamlToRdfExample:
  type: CodeExample
  title: Complete YAML to RDF Example
  language: yaml
  codeSnippet: |
    # ============================================
    # CANON YAML
    # ============================================

    blog:
      type: Package
      publisher: myblog.com
      version: 1.0.0
      imports:
        - publisher: canon-protocol.org
          packages:
            - package: core-rdf
              match: ^
              version: 1.0.1
              alias: rdfs
            - package: core-xsd
              match: ^
              version: 1.0.1

    # Class definition
    Person:
      type: rdfs.Class
      label: Person
      comment: Represents a person

    # Property definition
    name:
      type: DatatypeProperty
      domain: Person
      range: xsd.string
      label: Name

    # Instance
    alice:
      type: Person
      name: "Alice Johnson"

    # ============================================
    # EQUIVALENT RDF (Turtle syntax)
    # ============================================

    # Package metadata
    <myblog.com/blog@1.0.0> a owl:Ontology .
    <myblog.com/blog@1.0.0> owl:imports <canon-protocol.org/core-rdf@1.0.0> .
    <myblog.com/blog@1.0.0> owl:imports <canon-protocol.org/core-xsd@1.0.0> .

    # Class definition
    <myblog.com/blog@1.0.0/Person> a rdfs:Class .
    <myblog.com/blog@1.0.0/Person> rdfs:label "Person" .
    <myblog.com/blog@1.0.0/Person> rdfs:comment "Represents a person" .

    # Property definition
    <myblog.com/blog@1.0.0/name> a owl:DatatypeProperty .
    <myblog.com/blog@1.0.0/name> rdfs:domain <myblog.com/blog@1.0.0/Person> .
    <myblog.com/blog@1.0.0/name> rdfs:range <canon-protocol.org/core-xsd@1.0.0/string> .
    <myblog.com/blog@1.0.0/name> rdfs:label "Name" .

    # Instance
    <myblog.com/blog@1.0.0/alice> a <myblog.com/blog@1.0.0/Person> .
    <myblog.com/blog@1.0.0/alice> <myblog.com/blog@1.0.0/name> "Alice Johnson"^^xsd:string .

RdfRoundTrip:
  type: ConceptualModel
  title: Round-Trip Preservation
  difficulty: Advanced
  content: |
    # Round-Trip Preservation

    ## YAML → RDF → YAML

    Canon aims for round-trip preservation:

    ```
    Original YAML → RDF Triples → Reconstructed YAML
    ```

    ## What's Preserved

    ✅ **Fully Preserved:**
    - Entity types
    - Property values
    - Relationships (references)
    - Datatypes
    - Semantic meaning

    ⚠️ **Normalized:**
    - Comments (may be reordered)
    - Whitespace
    - YAML structure (dictionaries may be reordered)

    ❌ **Not Preserved:**
    - YAML comments (non-semantic)
    - Entity order in file
    - Formatting/indentation

    ## Example

    ```yaml
    # Original YAML
    alice:  # This is Alice
      name: "Alice"
      age: 30

    # After round-trip
    alice:
      age: 30
      name: "Alice"  # Order may change, comment gone
    ```

    Semantic equivalence is preserved, syntactic details may change.

    ## Why This Matters

    Canon guarantees semantic fidelity, not syntactic fidelity.
    The *meaning* is preserved through RDF, even if the YAML looks different.

MappingSummary:
  type: ConceptualModel
  title: YAML to RDF Mapping Summary
  difficulty: Intermediate
  content: |
    # YAML to RDF Mapping Summary

    ## Core Mappings

    | YAML Element | RDF Equivalent |
    |--------------|----------------|
    | Entity name | Subject URI |
    | Property key | Predicate URI |
    | String value | String literal |
    | Number value | Typed literal (integer/decimal) |
    | Boolean value | Boolean literal |
    | Date string | DateTime literal |
    | Entity reference | Resource URI |
    | Embedded object | Blank node |
    | Array | Multiple triples |
    | type property | rdf:type triple |
    | label property | rdfs:label triple |
    | comment property | rdfs:comment triple |
    | subClassOf | rdfs:subClassOf triple |
    | domain | rdfs:domain triple |
    | range | rdfs:range triple |
    | imports | owl:imports triple |

    ## URI Construction

    ```
    Entity: {publisher}/{package}@{version}/{name}
    ```

    ## Triple Pattern

    ```
    <subject-uri> <predicate-uri> "literal"^^datatype .
    <subject-uri> <predicate-uri> <object-uri> .
    ```

    ## Key Principles

    1. **Everything is a triple** - All YAML structure becomes triples
    2. **URIs are global** - Entity names become fully qualified URIs
    3. **Types are explicit** - Both entities and literals have types
    4. **Imports are transitive** - Dependencies form owl:imports chains
    5. **Blank nodes for embedded** - Unnamed objects use blank nodes
    6. **Arrays are multi-valued** - Multiple triples with same predicate
    7. **Semantics preserved** - Meaning preserved, not syntax

    ## Practical Implications

    - Canon YAML is human-friendly syntax for RDF
    - All RDF tools can consume Canon-generated RDF
    - Canon validation is RDF semantic validation
    - Understanding RDF helps debug Canon issues
    - Canon can export to Turtle, N-Triples, JSON-LD, etc.
