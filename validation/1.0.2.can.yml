# Package declaration
validation:
  type: Package
  publisher: canon-protocol.org
  version: 1.0.2
  imports:
    - publisher: canon-protocol.org
      packages:
        - package: education
          match: ^
          version: 1.0.1
        - package: core-rdf
          match: ^
          version: 1.0.1
          alias: rdfs
        - package: protocol
          match: ^
          version: 1.0.1

# ========================================
# VALIDATION OVERVIEW
# ========================================

ValidationOverview:
  type: ConceptualModel
  title: Canon Validation System
  difficulty: Beginner
  content: |
    # Understanding Canon Validation

    Canon validates your ontology at multiple levels to ensure semantic correctness.

    ## Validation Levels

    ### 1. Document-Level Validation
    - Runs on single documents without needing imports
    - Fast, immediate feedback
    - Examples: Naming conventions, embedded object rules

    ### 2. Repository-Level Validation
    - Requires loading imports and cross-document references
    - Comprehensive semantic checking
    - Examples: Type resolution, circular dependency detection

    ## Severity Levels

    - **Error**: Breaks ontology semantics, MUST fix
    - **Warning**: Best practice violation, SHOULD fix
    - **Info**: Educational suggestion, optional improvement

    ## Common Validation Workflow

    ```bash
    # Validate entire repository
    canon validate

    # Validate with verbose output (shows all rules)
    canon validate --verbose

    # Get JSON output (for tooling)
    canon validate --json
    ```

# ========================================
# CRITICAL RULES (TOP ERRORS)
# ========================================

EmbeddedCanonTypeRule:
  type: RequiredRule
  text: Embedded objects MUST NOT have explicit 'type' property - type is inferred from parent property's range
  rationale: The parent property's range already declares the type. Adding explicit type could create conflicts and is redundant. This enforces the type inference model where embedded objects automatically inherit type from their container property.
  hasConventionExamples:
    - EmbeddedTypeError
    - EmbeddedTypeCorrect

EmbeddedTypeError:
  type: InvalidExample
  value: |
    hasAddress:
      type: Address  # ❌ ERROR!
      street: "123 Main St"
  description: Embedded objects cannot have type property - it's inferred from hasAddress.range

EmbeddedTypeCorrect:
  type: ValidExample
  value: |
    hasAddress:  # Type inferred from property's range
      street: "123 Main St"
  description: Correct - no explicit type, inferred automatically

SubjectTypeRequiredRule:
  type: RequiredRule
  text: Top-level entities (SubjectCanons) MUST have a 'type' property declaring what kind of entity they are
  rationale: Top-level entities need explicit type declaration to enable type checking, validation, and code generation. Unlike embedded objects, top-level entities don't have a parent property to infer type from.
  hasConventionExamples:
    - SubjectTypeError
    - SubjectTypeCorrect

SubjectTypeError:
  type: InvalidExample
  value: |
    romeo-montague:
      # ❌ ERROR: No type property!
      characterName: "Romeo"
  description: Top-level entities must declare their type

SubjectTypeCorrect:
  type: ValidExample
  value: |
    romeo-montague:
      type: Character  # ✅ Type declared
      characterName: "Romeo"
  description: Correct - type explicitly declared

UnresolvedReferenceRule:
  type: RequiredRule
  text: ObjectProperty values MUST reference entities that exist in current namespace or imports
  rationale: Broken references create semantic gaps where data points to non-existent entities. This prevents typos, missing imports, and data integrity issues. All references must resolve to actual entities.
  hasConventionExamples:
    - UnresolvedReferenceError
    - UnresolvedReferenceFix

UnresolvedReferenceError:
  type: InvalidExample
  value: |
    romeo:
      liveIn: VeronaCity  # ❌ ERROR: VeronaCity not defined
  description: Reference to undefined entity causes validation error

UnresolvedReferenceFix:
  type: ValidExample
  value: |
    # Option 1: Define it locally
    VeronaCity:
      type: City

    romeo:
      liveIn: VeronaCity  # ✅ Resolved

    # Option 2: Import package that has it
    imports:
      - publisher: geography.org
        packages:
          - package: cities
            match: ^
            version: 1.0.1
  description: Either define entity locally or import the package containing it

# ========================================
# NAMING AND STRUCTURE RULES
# ========================================

NamespacePrefixRule:
  type: ForbiddenRule
  text: Resource names MUST NOT use reserved prefixes like 'rdfs:', 'xsd:', 'owl:' - use imports and simple names instead
  rationale: Prefixed names (rdfs:Class) are RDF/Turtle syntax, not Canon YAML syntax. Canon uses imports with aliases for namespace qualification. Prefixes in resource names cause parser errors and violate Canon conventions.
  hasConventionExamples:
    - NamespacePrefixError
    - NamespacePrefixCorrect

NamespacePrefixError:
  type: InvalidExample
  value: Using RDF prefix syntax with colons in resource names is invalid
  description: Don't use RDF prefix syntax like rdfs:Character in Canon YAML - use simple names instead

NamespacePrefixCorrect:
  type: ValidExample
  value: "Character: (simple name) with type: rdfs.Class (qualified reference)"
  description: Use simple resource names with imports and qualified references like rdfs.Class, not prefix syntax

ResourceNamingRule:
  type: RecommendedRule
  text: >-
    Canon uses three naming conventions based on entity role:
    Classes use PascalCase (Person, OrderStatus, SigningKey),
    instances use kebab-case (romeo-montague, key-2026-03, commercial-use),
    and properties use camelCase (subClassOf, hasAddress, signingKeyId).
  rationale: >-
    Distinct casing per role makes it immediately obvious whether an entity is a
    type definition (PascalCase), a data instance (kebab-case), or a property
    (camelCase). This improves readability, prevents confusion, and aligns with
    code generation conventions in target languages.
  hasConventionExamples:
    - ClassNamingExample
    - InstanceNamingExample
    - PropertyNamingExample

ClassNamingExample:
  type: ValidExample
  value: Person, OrderStatus, SigningKey, BlogPost
  description: PascalCase - used for class (type) definitions

InstanceNamingExample:
  type: ValidExample
  value: romeo-montague, key-2026-03, commercial-use, alice-johnson
  description: kebab-case - used for instances (data entities)

PropertyNamingExample:
  type: ValidExample
  value: subClassOf, hasAddress, signingKeyId, characterName
  description: camelCase - used for property definitions

# ========================================
# TYPE SYSTEM RULES
# ========================================

TypeAmbiguityRule:
  type: RequiredRule
  text: When multiple imported packages define entities with the same name, references MUST use qualified syntax (alias.name) to disambiguate
  rationale: Ambiguous references make it impossible to determine which entity is intended. Qualified references (pkg.Entity) explicitly specify the source package, preventing confusion and ensuring correct type resolution.
  hasConventionExamples:
    - TypeAmbiguityError
    - TypeAmbiguityFix

TypeAmbiguityError:
  type: InvalidExample
  value: |
    imports:
      - publisher: pkg-a.com
        packages:
          - package: types
            match: ^
            version: 1.0.1
            alias: pkgA
      - publisher: pkg-b.com
        packages:
          - package: types
            match: ^
            version: 1.0.1
            alias: pkgB

    # Both packages define "Resource"
    myEntity:
      type: Resource  # ❌ ERROR: Ambiguous - which Resource?
  description: Two packages define Resource - ambiguous reference

TypeAmbiguityFix:
  type: ValidExample
  value: |
    myEntity:
      type: pkgA.Resource  # ✅ Explicitly from pkg-a
  description: Use qualified reference to specify which Resource

PropertyRangeRequiredRule:
  type: RequiredRule
  text: ObjectProperty and DatatypeProperty MUST declare a 'range' specifying the type of values
  rationale: The range defines what values are valid for this property. Without range, type checking is impossible and the property's purpose is unclear. Range is required for both datatype properties (e.g., string, integer) and object properties (e.g., Person, Address).
  hasConventionExamples:
    - PropertyRangeError
    - PropertyRangeCorrect

PropertyRangeError:
  type: InvalidExample
  value: |
    name:
      type: DatatypeProperty
      domain: Person
      # ❌ ERROR: Missing range!
  description: Properties must declare their value type

PropertyRangeCorrect:
  type: ValidExample
  value: |
    name:
      type: DatatypeProperty
      domain: Person
      range: string  # ✅ Range declared
  description: Range specifies that name values must be strings

PropertyTypeSpecificityRule:
  type: RecommendedRule
  text: Properties SHOULD use specific types (DatatypeProperty or ObjectProperty) instead of generic 'Property'
  rationale: Generic Property type provides no semantic information about whether the property holds literal values or entity references. Using specific types enables better validation, code generation, and tooling support.
  hasConventionExamples:
    - PropertyTypeGeneric
    - PropertyTypeSpecific

PropertyTypeGeneric:
  type: InvalidExample
  value: |
    name:
      type: Property  # ⚠️ WARNING: Too generic
      range: string
  description: Generic Property type - unclear if datatype or object property

PropertyTypeSpecific:
  type: ValidExample
  value: |
    name:
      type: DatatypeProperty  # ✅ Specific type
      range: string
  description: Clear that this property holds literal string values

# ========================================
# HIERARCHY RULES
# ========================================

ClassHierarchyCycleRule:
  type: RequiredRule
  text: Class inheritance (subClassOf) MUST NOT create circular chains
  rationale: Circular inheritance (A subClassOf B subClassOf A) is logically impossible and breaks reasoning systems. Class hierarchies must form directed acyclic graphs (DAGs) where every class has a finite path to root Resource class.
  hasConventionExamples:
    - HierarchyCycleError
    - HierarchyCorrect

HierarchyCycleError:
  type: InvalidExample
  value: |
    Character:
      type: Class
      subClassOf: Hero

    Hero:
      type: Class
      subClassOf: Character  # ❌ ERROR: Circular!
  description: Character → Hero → Character creates infinite loop

HierarchyCorrect:
  type: ValidExample
  value: |
    Character:
      type: Class
      subClassOf: Resource

    Hero:
      type: Class
      subClassOf: Character  # ✅ Linear hierarchy
  description: Proper hierarchy - no cycles

SubClassOfReferenceRule:
  type: RequiredRule
  text: The subClassOf property MUST reference an entity that is itself a Class
  rationale: subClassOf establishes inheritance between classes. Referencing a non-class entity (like a property or instance) is semantically invalid and breaks type system integrity.
  hasConventionExamples:
    - SubClassOfError
    - SubClassOfCorrect

SubClassOfError:
  type: InvalidExample
  value: |
    name:
      type: DatatypeProperty

    Character:
      type: Class
      subClassOf: name  # ❌ ERROR: name is a Property, not a Class!
  description: Cannot inherit from a property

SubClassOfCorrect:
  type: ValidExample
  value: |
    Person:
      type: Class

    Character:
      type: Class
      subClassOf: Person  # ✅ Inherits from Class
  description: Correct - inheriting from another class

# ========================================
# IMPORT RULES
# ========================================

ImportExistenceRule:
  type: RequiredRule
  text: All declared imports MUST resolve to existing packages in the repository or package cache
  rationale: Missing imports break transitive resolution and prevent entity lookup. All dependencies must be available either in local workspace or installed package cache (.canon/ directory).
  hasConventionExamples:
    - ImportExistenceError
    - ImportExistenceFix

ImportExistenceError:
  type: InvalidExample
  value: |
    imports:
      - publisher: nonexistent.org
        packages:
          - package: missing
            match: ^
            version: 1.0.1  # ❌ ERROR: Package not found!
  description: Import references package that doesn't exist

ImportExistenceFix:
  type: ValidExample
  value: |
    # Make sure package is installed or available
    # Check:
    # 1. Is it in .canon/ cache?
    # 2. Is it in local workspace?
    # 3. Need to install it?

    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-rdf
            match: ^
            version: 1.0.1  # ✅ Standard package, should exist
  description: Import packages that are available in repository

NamespaceImportCycleRule:
  type: RequiredRule
  text: Package imports MUST NOT create circular dependency chains
  rationale: Circular package dependencies (A imports B, B imports A) create unresolvable import cycles that prevent package managers (NPM, NuGet) from building dependency graphs. While Canon handles cycles gracefully at runtime, published packages cannot have circular dependencies.
  hasConventionExamples:
    - ImportCycleError
    - ImportCorrect

ImportCycleError:
  type: InvalidExample
  value: |
    # Package A:
    imports:
      - publisher: org.example
        packages:
          - package: package-b
            match: ^
            version: 1.0.1

    # Package B:
    imports:
      - publisher: org.example
        packages:
          - package: package-a
            match: ^
            version: 1.0.1  # ❌ ERROR: Circular!
  description: A imports B and B imports A - circular dependency

ImportCorrect:
  type: ValidExample
  value: |
    # Package A (base):
    # No imports

    # Package B:
    imports:
      - publisher: org.example
        packages:
          - package: package-a
            match: ^
            version: 1.0.1  # ✅ One-way dependency
  description: One-way dependency - no cycles

# ========================================
# DOCUMENT VALIDATION RULES
# ========================================

PackageRequiredRule:
  type: RequiredRule
  text: Every Canon document MUST contain exactly one Package declaration (a resource with type Package)
  rationale: The Package declaration provides essential metadata (publisher, version) needed for namespace resolution and dependency management. Without it, the document cannot participate in the Canon ecosystem.

PackagePropertiesRule:
  type: RequiredRule
  text: Package declarations MUST include 'publisher' and 'version' properties, and import entries must have valid publisher, package, match, and version fields
  rationale: Publisher and version are required to construct the namespace URI. Import entries must be well-formed to enable dependency resolution.

ResourceNamingDocRule:
  type: RecommendedRule
  text: Resource names SHOULD start with a letter and contain only letters, numbers, hyphens, and underscores
  rationale: Following naming conventions ensures compatibility with code generation targets and URI construction. Names that violate conventions generate warnings to encourage consistency.

# ========================================
# REPOSITORY VALIDATION RULES
# ========================================

XsdImportRule:
  type: RequiredRule
  text: When using XSD datatypes (string, integer, boolean, etc.) as property ranges, the core-xsd package MUST be imported
  rationale: XSD datatypes are defined in the core-xsd package. Without importing it, the type resolver cannot verify that range references point to valid datatypes.

ClassDefinitionRule:
  type: RequiredRule
  text: All classes referenced in 'type' properties MUST be defined in the current namespace or imported packages
  rationale: Using an undefined class as a type creates entities with unknown structure. The validator ensures every type reference resolves to an actual Class definition.

ObjectPropertyImportRule:
  type: RecommendedRule
  text: ObjectProperty range classes SHOULD be imported or defined in the current namespace
  rationale: When an ObjectProperty references a class in its range, that class should be accessible for full validation. Missing imports generate warnings.

PropertyRangeReferenceRule:
  type: RequiredRule
  text: Property range references MUST point to valid types - Classes for ObjectProperty, XSD datatypes or Literal for DatatypeProperty
  rationale: An invalid range makes it impossible to validate property values. ObjectProperty ranges must resolve to Classes, and DatatypeProperty ranges must resolve to XSD datatypes or rdfs.Literal.

PropertyValueTypeRule:
  type: RequiredRule
  text: DatatypeProperty values MUST be literal values (strings, numbers, booleans), not complex objects or entity references
  rationale: DatatypeProperties hold primitive values. If a complex object is provided where a literal is expected, it indicates a modeling error - the property should likely be an ObjectProperty instead.

ObjectPropertyValueValidationRule:
  type: RequiredRule
  text: ObjectProperty values MUST reference entities that exist and are type-compatible with the property's declared range
  rationale: Broken entity references create dangling pointers in the semantic graph. This rule ensures all ObjectProperty values point to real, type-compatible entities.

InstancePropertyReferenceRule:
  type: RequiredRule
  text: Properties used on entity instances MUST be defined as DatatypeProperty or ObjectProperty in the current namespace or imports
  rationale: Using undefined properties on instances means the property's semantics (domain, range, type) are unknown, preventing proper validation and code generation.

DefinitionPropertyReferenceRule:
  type: RequiredRule
  text: Properties used on Class or Property definitions (like label, comment, domain, range) MUST be recognized definition properties
  rationale: Class and property definitions use a specific set of metadata properties. Unrecognized properties on definitions may indicate typos or misunderstanding of the definition schema.

SubPropertyOfReferenceRule:
  type: RequiredRule
  text: The subPropertyOf property MUST reference an entity that is itself a Property
  rationale: subPropertyOf establishes inheritance between properties. Referencing a non-property entity (like a Class or instance) is semantically invalid.

PropertyHierarchyCycleRule:
  type: RequiredRule
  text: Property inheritance (subPropertyOf) MUST NOT create circular chains
  rationale: Circular property inheritance (A subPropertyOf B subPropertyOf A) is logically impossible. Property hierarchies must form directed acyclic graphs.

PropertyDomainRule:
  type: RequiredRule
  text: Properties SHOULD only be used on instances whose type matches or inherits from the property's declared domain
  rationale: The domain constraint specifies which classes a property applies to. Using a property outside its domain indicates a modeling error.

AmbiguousReferenceRule:
  type: RequiredRule
  text: When the same entity name is defined in multiple imported namespaces, references MUST use qualified syntax (alias.name) to disambiguate
  rationale: Ambiguous references where the same name exists in multiple imported packages make it impossible to determine which entity is intended. Qualified references explicitly specify the source.

# ========================================
# VALIDATION BEST PRACTICES
# ========================================

ValidationBestPractices:
  type: ConceptualModel
  title: Validation Best Practices
  difficulty: Beginner
  content: |
    # Best Practices for Clean Validation

    ## 1. Validate Early and Often

    ```bash
    # Run validation after every change
    canon validate --verbose

    # JSON output for CI/CD integration
    canon validate --json
    ```

    ## 2. Fix Errors in Order

    Fix validation errors in this order:
    1. **Missing imports** - Get all dependencies first
    2. **Unresolved references** - Fix broken links
    3. **Type errors** - Ensure proper type declarations
    4. **Naming issues** - Clean up conventions
    5. **Warnings** - Improve code quality

    ## 3. Use Qualified References for Clarity

    When in doubt, use qualified references:
    ```yaml
    type: rdfs.Class      # Clear - from rdf package
    range: xsd.string     # Clear - from xsd package
    ```

    ## 4. Understand Error Messages

    Canon error messages follow this format:
    ```
    {Entity} - Property '{property}' has range '{range}' which is not defined or imported
      → For ObjectProperty:
      1. Define '{range}' as a Class in this namespace, OR
      2. Import the namespace that contains '{range}', OR
      3. Use a qualified reference like 'alias.{range}' if already imported
    ```

    Read the suggested fixes - they usually point to the solution!

    ## 5. Keep Imports Minimal

    Only import what you actually use:
    - Reduces validation time
    - Clearer dependencies
    - Easier to understand

    ## 6. Version Appropriately

    - Breaking changes (errors introduced) → Major version bump
    - New entities (backward compatible) → Minor version bump
    - Documentation/labels only → Patch version bump

ValidationErrorGuide:
  type: ConceptualModel
  title: Common Validation Errors and Fixes
  difficulty: Beginner
  content: |
    # Troubleshooting Common Validation Errors

    ## Error: "Embedded objects cannot have explicit 'type' property"

    **Cause**: Added `type` to nested object
    **Fix**: Remove type property - it's inferred from parent property's range

    ## Error: "Property 'X' is not defined or imported"

    **Cause**: Using property that doesn't exist
    **Fix**: Define the property or import package that has it

    ## Error: "Type 'X' is ambiguous"

    **Cause**: Multiple packages define entity with same name
    **Fix**: Use qualified reference: `alias.X`

    ## Error: "Circular dependency detected"

    **Cause**: A imports B, B imports A
    **Fix**: Restructure packages to remove cycle

    ## Error: "subClassOf must reference a Class"

    **Cause**: subClassOf points to property or instance
    **Fix**: Reference a Class entity instead

    ## Error: "Import 'X' not found"

    **Cause**: Referenced package doesn't exist
    **Fix**: Check package name, version, install if missing

    ## Warning: "Property type too generic"

    **Cause**: Using `type: Property` instead of specific type
    **Fix**: Use `DatatypeProperty` or `ObjectProperty`
