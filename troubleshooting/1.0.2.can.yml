# ========================================
# TROUBLESHOOTING OVERVIEW
# ========================================

TroubleshootingOverview:
  type: ConceptualModel
  title: Canon Troubleshooting Guide
  difficulty: Intermediate
  content: |
    # Canon Troubleshooting Guide

    This guide helps you diagnose and fix common Canon Protocol issues.

    ## Troubleshooting Philosophy

    When something goes wrong:
    1. **Read the error message carefully** - Canon provides detailed errors
    2. **Isolate the problem** - Test parts of your ontology separately
    3. **Check the obvious** - Typos, missing imports, wrong versions
    4. **Use verbose mode** - Get detailed diagnostic output
    5. **Validate incrementally** - Don't add 100 entities before first validation

    ## Common Problem Categories

    1. **Validation Errors** - Semantic or structural issues
    2. **Import Resolution Failures** - Missing or circular dependencies
    3. **Type Errors** - Type mismatches or undeclared types
    4. **Reference Errors** - Broken entity references
    5. **Code Generation Failures** - Transpiler issues
    6. **Performance Problems** - Slow validation or large graphs

    ## Debugging Tools

    ```bash
    # Verbose validation
    canon validate --verbose

    # Verbose mode (even more detail)
    canon validate --verbose

    # JSON output for tooling
    canon validate --json

    # Validate single document
    canon package validate mycompany.com/mypackage@1.0.0
    ```

# ========================================
# VALIDATION ERRORS
# ========================================

ValidationErrorDiagnostics:
  type: TechnicalExplanation
  title: Diagnosing Validation Errors
  difficulty: Intermediate
  prerequisite: TroubleshootingOverview
  content: |
    # Diagnosing Validation Errors

    ## Reading Validation Output

    ```
    ✗ mycompany.com/myapp@1.0.0
      Error: Entity 'BlogPost' - Property 'author' has range 'Person' which is not defined or imported
        → For ObjectProperty:
        1. Define 'Person' as a Class in this namespace, OR
        2. Import the namespace that contains 'Person', OR
        3. Use a qualified reference like 'alias.Person' if already imported
    ```

    ### Error Message Structure

    1. **Package** - Which package has the error
    2. **Entity** - Which entity has the problem
    3. **Property** - Which property is problematic
    4. **Issue** - What's wrong
    5. **Suggestions** - How to fix it

    ## Validation Error Types

    ### 1. Entity Not Defined

    **Error:**
    ```
    Entity 'BlogPost' references 'Author' which is not defined
    ```

    **Cause:** Referenced entity doesn't exist

    **Fix:**
    ```yaml
    # Option 1: Define it
    Author:
      type: rdfs.Class

    # Option 2: Import package containing it
    imports:
      - publisher: mycompany.com
        packages:
          - package: people
            match: ^
            version: 1.0.1

    # Then use: people.Author
    ```

    ### 2. Property Not Defined

    **Error:**
    ```
    Property 'title' is not defined or imported
    ```

    **Cause:** Using undefined property

    **Fix:**
    ```yaml
    # Define the property
    title:
      type: DatatypeProperty
      domain: BlogPost
      range: string
    ```

    ### 3. Embedded Object Has Type

    **Error:**
    ```
    Embedded object cannot have explicit 'type' property
    ```

    **Cause:** Adding `type` to nested object

    **Fix:**
    ```yaml
    # WRONG
    person:
      hasAddress:
        type: Address  # ❌ Remove this!
        street: "123 Main"

    # RIGHT - use entity reference instead
    mainAddress:
      type: Address
      street: "123 Main"

    person:
      hasAddress: mainAddress  # Reference, not embedded
    ```

    ### 4. Missing Type on Top-Level Entity

    **Error:**
    ```
    Top-level entity 'alice' must have a 'type' property
    ```

    **Cause:** Forgot to declare type

    **Fix:**
    ```yaml
    alice:
      type: Person  # Add this!
      name: "Alice"
    ```

    ### 5. Circular Class Hierarchy

    **Error:**
    ```
    Circular class hierarchy detected: A → B → A
    ```

    **Cause:** Class inherits from itself (directly or indirectly)

    **Fix:**
    ```yaml
    # WRONG
    Character:
      type: rdfs.Class
      subClassOf: Hero

    Hero:
      type: rdfs.Class
      subClassOf: Character  # ❌ Circular!

    # RIGHT
    Character:
      type: rdfs.Class
      subClassOf: rdfs.Resource

    Hero:
      type: rdfs.Class
      subClassOf: Character  # ✅ Linear hierarchy
    ```

ImportResolutionProblems:
  type: TechnicalExplanation
  title: Import Resolution Failures
  difficulty: Intermediate
  prerequisite: ValidationErrorDiagnostics
  content: |
    # Import Resolution Failures

    ## Error: Import Not Found

    **Error:**
    ```
    Import 'mycompany.com/shared@1.0.0' not found
    ```

    **Diagnosis:**

    1. Check if package exists in workspace:
       ```bash
       find specs -name "shared@1.0.0.can.yml"
       ```

    2. Check if package is in cache:
       ```bash
       ls .canon/packages/mycompany.com/
       ```

    3. Verify package name and version:
       ```yaml
       imports:
         - publisher: mycompany.com
           packages:
             - package: shared
               match: ^
               version: 1.0.1  # Exact match required
       ```

    **Fix:**

    ```bash
    # Option 1: Create the package locally
    touch specs/mycompany.com/shared@1.0.0.can.yml

    # Option 2: Install from registry
    canon package install shared

    # Option 3: Fix typo in import
    # Check publisher, package name, version
    ```

    ## Error: Version Mismatch

    **Error:**
    ```
    No version of 'mycompany.com/shared' satisfies constraint '^ 2.0.0'
    Available versions: 1.0.0, 1.1.0, 1.2.0
    ```

    **Diagnosis:**

    You're requesting major version 2, but only version 1 is available.

    **Fix:**

    ```yaml
    # Option 1: Use available version
    imports:
      - publisher: mycompany.com
        packages:
          - package: shared
            match: ^
            version: 1.0.1  # Use v1 instead

    # Option 2: Install v2
    canon package install shared
    ```

    ## Error: Circular Import Dependency

    **Error:**
    ```
    Circular package dependency detected:
      mycompany.com/app@1.0.0
      → mycompany.com/users@1.0.0
      → mycompany.com/app@1.0.0
    ```

    **Diagnosis:**

    Package A imports B, B imports A. This creates unresolvable dependency cycle.

    **Fix:**

    Restructure packages to remove cycle:

    ```
    # WRONG
    app → users
    users → app  # Circular!

    # RIGHT - Extract shared types
    app → common
    users → common
    # common has no imports or only third-party imports
    ```

    Create `common@1.0.0.can.yml`:
    ```yaml
    # Shared types used by both app and users
    Person:
      type: rdfs.Class

    # Both app and users import common
    # Neither imports the other
    ```

    ## Error: Ambiguous Type Reference

    **Error:**
    ```
    Type 'Resource' is ambiguous:
      - mycompany.com/package-a/Resource@1.0.0
      - mycompany.com/package-b/Resource@1.0.0
    ```

    **Diagnosis:**

    Multiple imported packages define entity with same name.

    **Fix:**

    Use qualified references:

    ```yaml
    imports:
      - publisher: mycompany.com
        packages:
          - package: package-a
            match: ^
            version: 1.0.1
            alias: pkgA
          - package: package-b
            match: ^
            version: 1.0.1
            alias: pkgB

    # Use qualified reference
    myEntity:
      type: pkgA.Resource  # Explicitly from package-a
    ```

TypeResolutionProblems:
  type: TechnicalExplanation
  title: Type Resolution Issues
  difficulty: Intermediate
  prerequisite: ImportResolutionProblems
  content: |
    # Type Resolution Issues

    ## Error: Range Type Not Defined

    **Error:**
    ```
    Property 'author' has range 'Person' which is not defined or imported
    ```

    **Diagnosis:**

    Property declares range that doesn't exist.

    **Fix:**

    ```yaml
    # Option 1: Define the class
    Person:
      type: rdfs.Class

    # Option 2: Import it
    imports:
      - publisher: mycompany.com
        packages:
          - package: people
            match: ^
            version: 1.0.1

    # Then use qualified reference
    author:
      type: ObjectProperty
      range: people.Person
    ```

    ## Error: Domain Type Not Defined

    **Error:**
    ```
    Property 'title' has domain 'BlogPost' which is not defined
    ```

    **Diagnosis:**

    Property declares domain (owning class) that doesn't exist.

    **Fix:**

    ```yaml
    # Define the domain class first
    BlogPost:
      type: rdfs.Class

    # Then define property
    title:
      type: DatatypeProperty
      domain: BlogPost
      range: string
    ```

    ## Error: Type Mismatch

    **Error:**
    ```
    Property 'publishedDate' expects 'xsd.dateTime' but got 'string'
    ```

    **Diagnosis:**

    Value type doesn't match property range.

    **Fix:**

    ```yaml
    # WRONG
    myPost:
      publishedDate: "January 15, 2024"  # ❌ Not ISO 8601 format

    # RIGHT
    myPost:
      publishedDate: "2024-01-15T10:00:00Z"  # ✅ ISO 8601 dateTime
    ```

    ## Error: subClassOf References Non-Class

    **Error:**
    ```
    Class 'BlogPost' has subClassOf 'title' which is not a Class
    ```

    **Diagnosis:**

    subClassOf points to property or instance instead of class.

    **Fix:**

    ```yaml
    # WRONG
    title:
      type: DatatypeProperty

    BlogPost:
      type: rdfs.Class
      subClassOf: title  # ❌ title is a property!

    # RIGHT
    Content:
      type: rdfs.Class

    BlogPost:
      type: rdfs.Class
      subClassOf: Content  # ✅ Content is a class
    ```

    ## Error: Unknown XSD Datatype

    **Error:**
    ```
    Range 'xsd.unknown' is not a recognized XSD datatype
    ```

    **Diagnosis:**

    Using invalid XSD type.

    **Fix:**

    Use valid XSD datatypes:

    ```yaml
    # Common types:
    - xsd.string
    - xsd.integer
    - xsd.boolean
    - xsd.dateTime
    - xsd.decimal
    - xsd.float
    - xsd.double

    # Full list in type-system@1.0.0 docs
    ```

ReferenceResolutionProblems:
  type: TechnicalExplanation
  title: Entity Reference Errors
  difficulty: Intermediate
  prerequisite: TypeResolutionProblems
  content: |
    # Entity Reference Errors

    ## Error: Unresolved Reference

    **Error:**
    ```
    BlogPost 'my-post' references 'john-doe' which is not defined
    ```

    **Diagnosis:**

    ObjectProperty value points to entity that doesn't exist.

    **Fix:**

    ```yaml
    # Option 1: Define the entity
    john-doe:
      type: Person
      name: "John Doe"

    my-post:
      type: BlogPost
      author: john-doe  # Now resolves

    # Option 2: Fix typo
    my-post:
      author: alice-johnson  # Correct entity name
    ```

    ## Error: Reference in Wrong Namespace

    **Error:**
    ```
    Cannot resolve 'otherpackage.User' - package not imported
    ```

    **Diagnosis:**

    Trying to reference entity from package you haven't imported.

    **Fix:**

    ```yaml
    # Add import
    imports:
      - publisher: mycompany.com
        packages:
          - package: otherpackage
            match: ^
            version: 1.0.1
            alias: other

    # Use qualified reference
    myEntity:
      relatedUser: other.User
    ```

    ## Error: Self-Reference in Embedded Object

    **Error:**
    ```
    Embedded object creates circular reference
    ```

    **Diagnosis:**

    Trying to embed entity that references parent.

    **Fix:**

    Use separate top-level entities with references:

    ```yaml
    # WRONG - can't embed circular reference
    person:
      type: Person
      spouse:
        type: Person  # ❌ Embedded can't reference back
        spouse: person

    # RIGHT - use entity references
    alice:
      type: Person
      spouse: bob

    bob:
      type: Person
      spouse: alice
    ```

CodeGenerationProblems:
  type: TechnicalExplanation
  title: Code Generation Failures
  difficulty: Intermediate
  prerequisite: ReferenceResolutionProblems
  content: |
    # Code Generation Failures

    ## Error: Transpiler Failed

    **Error:**
    ```
    Failed to generate TypeScript: Template error at line 45
    ```

    **Diagnosis:**

    1. Check if ontology validates:
       ```bash
       canon validate
       ```
       Code generation requires valid ontology!

    2. Check for unsupported constructs

    **Fix:**

    ```bash
    # Always validate before generating
    canon validate && \
    canon generate --output generated
    ```

    ## Error: Generated Code Doesn't Compile

    **Error:**
    ```
    TypeScript compilation error:
      Property 'author' has type 'any'
    ```

    **Diagnosis:**

    Property range not recognized or imported.

    **Fix:**

    Check property definition:

    ```yaml
    # Make sure range is properly defined
    author:
      type: ObjectProperty
      domain: BlogPost
      range: Author  # Make sure Author class exists!
    ```

    ## Error: Naming Conflicts in Generated Code

    **Error:**
    ```
    TypeScript error: Duplicate identifier 'Person'
    ```

    **Diagnosis:**

    Multiple packages define same entity name, causing collision in generated code.

    **Fix:**

    Use qualified references or rename:

    ```yaml
    # Option 1: Use aliases in imports
    imports:
      - publisher: pkg-a.com
        packages:
          - package: types
            match: ^
            version: 1.0.1
            alias: pkgA
      - publisher: pkg-b.com
        packages:
          - package: types
            match: ^
            version: 1.0.1
            alias: pkgB

    # Generated code namespaces them:
    # pkgA.Person, pkgB.Person

    # Option 2: Rename entity in your package
    BlogAuthor:  # Renamed from Author to avoid conflict
      type: rdfs.Class
    ```

    ## Error: Missing Import in Generated Code

    **Error:**
    ```
    TypeScript error: Cannot find name 'Address'
    ```

    **Diagnosis:**

    Generated code references type from import but doesn't import it.

    **Fix:**

    Regenerate with correct import structure:

    ```bash
    # Validate imports first
    canon validate --verbose

    # Regenerate
    canon generate --output generated
    ```

PerformanceProblems:
  type: TechnicalExplanation
  title: Performance and Scalability Issues
  difficulty: Advanced
  prerequisite: CodeGenerationProblems
  content: |
    # Performance and Scalability Issues

    ## Problem: Slow Validation

    **Symptoms:**
    ```
    Validation taking > 30 seconds for repository
    ```

    **Diagnosis:**

    1. Check repository size:
       ```bash
       find specs -name "*.can.yml" | wc -l
       ```

    2. Check import depth:
       ```bash
       canon validate --verbose | grep "Import depth"
       ```

    3. Profile validation:
       ```bash
       time canon validate
       ```

    **Fixes:**

    ### 1. Reduce Import Depth

    ```yaml
    # SLOW - deep transitive imports
    A imports B
    B imports C
    C imports D
    D imports E  # 5 levels deep

    # FASTER - flatter structure
    A imports B, C, D, E  # Direct imports
    ```

    ### 2. Split Large Packages

    ```yaml
    # SLOW - monolithic package with 1000+ entities
    myapp@1.0.0.can.yml (5000 lines)

    # FASTER - split into logical packages
    myapp.core@1.0.0.can.yml (500 lines)
    myapp.users@1.0.0.can.yml (500 lines)
    myapp.products@1.0.0.can.yml (500 lines)
    ```

    ### 3. Cache Imports

    ```bash
    # Ensure .canon/ cache is being used
    ls -la .canon/packages/

    # Clear and rebuild cache if stale
    rm -rf .canon/
    canon validate
    ```

    ## Problem: High Memory Usage

    **Symptoms:**
    ```
    Validation using > 4GB RAM
    ```

    **Diagnosis:**

    Large entity graphs loaded into memory.

    **Fixes:**

    ### 1. Validate Individual Documents

    ```bash
    # Instead of entire repository
    canon validate

    # Validate one package at a time
    canon package validate mycompany.com/mypackage@1.0.0
    ```

    ### 2. Reduce Instance Data

    ```yaml
    # HEAVY - 10,000 instances in ontology file
    # Move instance data to separate files or database

    # LIGHTER - ontology only (classes & properties)
    # Load instances at runtime from database
    ```

    ## Problem: Long Code Generation Time

    **Symptoms:**
    ```
    Export taking > 5 minutes
    ```

    **Diagnosis:**

    Too many entities or complex relationships.

    **Fixes:**

    ### 1. Generate Only What You Need

    ```bash
    # Instead of all packages
    canon generate --output generated

    # Generate specific package
    canon generate --output generated
    ```

    ### 2. Incremental Generation

    ```bash
    # Only regenerate changed packages
    # Use build system to track changes
    ```

DiagnosticWorkflow:
  type: Tutorial
  title: Systematic Debugging Workflow
  difficulty: Intermediate
  prerequisite: PerformanceProblems
  content: |
    # Systematic Debugging Workflow

    When something goes wrong, follow this systematic approach:

    ## Step 1: Identify the Error

    Run validation with verbose output:

    ```bash
    canon validate --verbose
    ```

    Read the error message completely. Note:
    - Which package has the error
    - Which entity/property
    - What the error message says
    - Suggestions provided

    ## Step 2: Isolate the Problem

    ### 2a. Test Document in Isolation

    ```bash
    # Validate single document
    canon package validate mycompany.com/mypackage@1.0.0
    ```

    If error disappears: Problem is in imports/dependencies
    If error persists: Problem is in this document

    ### 2b. Binary Search

    Comment out half your entities:

    ```yaml
    # Entity1:
    #   type: rdfs.Class

    # Entity2:
    #   type: rdfs.Class

    Entity3:
      type: rdfs.Class

    Entity4:
      type: rdfs.Class
    ```

    Validate. If error gone: Problem in commented section.
    Repeat until you find the exact entity.

    ## Step 3: Check the Obvious

    ### 3a. Typos

    ```yaml
    # Did you misspell the class name?
    myEntity:
      type: BlogPOst  # Should be BlogPost

    # Did you misspell the property name?
    myPost:
      titel: "..."  # Should be title
    ```

    ### 3b. Missing Imports

    ```yaml
    # Are you using entities from packages you haven't imported?
    myEntity:
      type: xsd.string  # Did you import xsd?

    # Check imports section
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-xsd
            match: ^
            version: 1.0.1  # Make sure it's here
    ```

    ### 3c. Version Mismatches

    ```yaml
    imports:
      - publisher: mycompany.com
        packages:
          - package: shared
            match: "="
            version: 2.0.0  # Does version 2.0.0 exist?

    # Check available versions
    # ls specs/mycompany.com/shared@*.can.yml
    ```

    ## Step 4: Use Verbose Mode

    ```bash
    canon validate --verbose
    ```

    Verbose mode shows:
    - Import resolution steps
    - Entity lookup paths
    - Property resolution details
    - Type inference decisions

    Look for clues about where resolution fails.

    ## Step 5: Verify Dependencies

    ```bash
    # List all imports transitively
    canon package list-imports

    # Verify .canon cache
    ls -R .canon/packages/
    ```

    ## Step 6: Simplify

    Create minimal reproduction:

    ```yaml
    # minimal-repro@1.0.0.can.yml
    minimal-repro:
      type: Package
      publisher: test.com
      version: 1.0.0
      imports:
        - publisher: canon-protocol.org
          packages:
            - package: core-rdf
              match: ^
              version: 1.0.1
              alias: rdfs

    # Add ONLY enough to reproduce the error
    TestClass:
      type: rdfs.Class

    testProperty:
      type: DatatypeProperty
      domain: TestClass
      range: string

    testInstance:
      type: TestClass
      testProperty: "value"
    ```

    If error reproduces: You found the minimum case
    If error gone: You removed the cause - add back piece by piece

    ## Step 7: Check Documentation

    Search for error message in documentation:

    ```bash
    # Search validation rules
    grep -r "error text" specs/canon-protocol.org/validation@1.0.0.can.yml

    # Check troubleshooting guide
    # (this document!)
    ```

    ## Step 8: Ask for Help

    If still stuck, gather diagnostics:

    ```bash
    # Collect information
    canon validate --verbose > validation-output.txt
    canon --version > version.txt

    # Share:
    # - validation-output.txt
    # - Minimal reproduction .can.yml
    # - What you expected vs what happened
    ```

CommonQuickFixes:
  type: ConceptualModel
  title: Common Quick Fixes Checklist
  difficulty: Beginner
  content: |
    # Common Quick Fixes Checklist

    ## Validation Failures

    - [ ] Run `canon validate --verbose`
    - [ ] Check for typos in entity names
    - [ ] Verify all imports are present
    - [ ] Ensure property has domain and range
    - [ ] Confirm entity references exist
    - [ ] Remove `type` from embedded objects
    - [ ] Add `type` to top-level entities

    ## Import Problems

    - [ ] Check import syntax (publisher/package@version)
    - [ ] Verify package exists (`ls specs/publisher/package@version.can.yml`)
    - [ ] Check .canon cache (`ls .canon/packages/`)
    - [ ] Clear cache and rebuild (`rm -rf .canon/`)
    - [ ] Use qualified references (`alias.EntityName`)

    ## Type Errors

    - [ ] Define classes before using them
    - [ ] Define properties before using them
    - [ ] Check property range matches value type
    - [ ] Verify subClassOf references a class
    - [ ] Use valid XSD datatypes

    ## Reference Errors

    - [ ] Entity exists in same namespace
    - [ ] Entity imported if from other package
    - [ ] Reference uses correct name (check spelling)
    - [ ] Use qualified reference if ambiguous

    ## Code Generation

    - [ ] Validate before generating (`canon validate`)
    - [ ] Check generated code compiles
    - [ ] Regenerate after ontology changes
    - [ ] Verify imports in generated code

    ## Performance

    - [ ] Split large packages into smaller ones
    - [ ] Reduce import depth
    - [ ] Use .canon cache
    - [ ] Validate specific documents not entire repository
    - [ ] Move instance data out of ontology files

ErrorMessageIndex:
  type: ConceptualModel
  title: Error Message Quick Reference
  difficulty: Beginner
  content: |
    # Error Message Quick Reference

    ## "Entity not found"
    → Define entity or import package containing it

    ## "Property not defined"
    → Define property with domain and range

    ## "Embedded object cannot have type"
    → Remove type from nested object, use entity reference instead

    ## "Top-level entity must have type"
    → Add `type` property to entity

    ## "Circular class hierarchy"
    → Remove cycle from subClassOf chain

    ## "Import not found"
    → Create package or install from registry

    ## "Version mismatch"
    → Use available version or install required version

    ## "Circular import dependency"
    → Extract shared types to common package

    ## "Ambiguous type reference"
    → Use qualified reference (alias.EntityName)

    ## "Range type not defined"
    → Define range class or import it

    ## "Type mismatch"
    → Use value matching property range type

    ## "subClassOf references non-class"
    → Point subClassOf to a class, not property/instance

    ## "Unknown XSD datatype"
    → Use valid XSD type (string, integer, dateTime, etc.)

    ## "Unresolved reference"
    → Define referenced entity or fix typo

    ## "Transpiler failed"
    → Validate ontology first, ensure no semantic errors

    ## "Generated code doesn't compile"
    → Check property ranges are properly defined

    ## "Naming conflict in generated code"
    → Use qualified references or rename entities

    ## "Slow validation"
    → Split packages, reduce import depth, use cache

    ## "High memory usage"
    → Validate individual documents, reduce instance data
