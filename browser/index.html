<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canon Browser</title>
<meta name="description" content="Interactive ontology explorer for Canon Protocol">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --text: #e4e4e7;
  --text-secondary: #a1a1aa;
  --text-dim: #71717a;
  --bg: #0a0a0c;
  --bg-raised: #111114;
  --bg-surface: #18181b;
  --border: #27272a;
  --border-subtle: #1e1e21;
  --accent: #60a5fa;
  --accent-glow: rgba(96, 165, 250, 0.15);
  --class: #60a5fa;
  --object-prop: #34d399;
  --datatype-prop: #fb923c;
  --annotation-prop: #c084fc;
  --instance: #f472b6;
  --datatype: #94a3b8;
  --unknown: #6b7280;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  display: flex;
  flex-direction: column;
}

/* ── Top Bar ─────────────────── */
.topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 10;
}
.brand { display: flex; align-items: center; gap: 7px; text-decoration: none; color: var(--text); flex-shrink: 0; }
.brand-icon { width: 26px; height: 26px; background: var(--accent); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #0a0a0c; }
.brand-text { font-weight: 600; font-size: 13px; white-space: nowrap; }
.address-bar { flex: 1; display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; transition: border-color 0.15s; }
.address-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.address-prefix { padding: 0 0 0 10px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; user-select: none; }
.address-input { flex: 1; padding: 7px 8px; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: 12px; }
.address-input::placeholder { color: var(--text-dim); }
.go-btn, .add-btn { padding: 5px 12px; margin: 2px; background: var(--accent); color: #0a0a0c; border: none; border-radius: 4px; font-family: var(--font); font-weight: 600; font-size: 11px; cursor: pointer; transition: opacity 0.15s; }
.go-btn:hover, .add-btn:hover { opacity: 0.85; }
.add-btn { background: var(--bg-surface); color: var(--text-secondary); margin-left: 4px; }

/* ── Main Layout ─────────────── */
.main { flex: 1; display: flex; overflow: hidden; position: relative; }

/* ── Layer Panel ─────────────── */
.layer-panel {
  width: 220px; flex-shrink: 0;
  background: var(--bg-raised);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.layer-header {
  padding: 10px 12px 8px;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim);
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: space-between;
}
.layer-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.layer-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; cursor: pointer;
  transition: background 0.1s; font-size: 12px;
}
.layer-item:hover { background: var(--bg-surface); }
.layer-item.active { background: rgba(96, 165, 250, 0.08); }
.layer-check { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all 0.1s; font-size: 9px; }
.layer-check.checked { background: var(--accent); border-color: var(--accent); color: #0a0a0c; }
.layer-color { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-secondary); }
.layer-source { font-size: 9px; color: var(--text-dim); }
.layer-count { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.layer-remove { opacity: 0; font-size: 14px; color: var(--text-dim); cursor: pointer; padding: 0 2px; transition: opacity 0.1s; }
.layer-item:hover .layer-remove { opacity: 0.6; }
.layer-remove:hover { opacity: 1 !important; color: #f87171; }
.layer-group { border-bottom: 1px solid var(--border-subtle); }
.layer-group:last-child { border-bottom: none; }
.layer-group-header {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px 4px; cursor: pointer;
  font-size: 11px; color: var(--text-dim);
}
.layer-group-header:hover { background: rgba(255,255,255,0.02); }
.layer-group-arrow { font-size: 9px; flex-shrink: 0; color: var(--text-dim); width: 10px; text-align: center; }
.layer-group-badge { font-family: var(--mono); font-size: 9px; color: var(--text-dim); background: var(--bg-surface); padding: 0 4px; border-radius: 3px; }
.layer-group-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; color: var(--text-secondary); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
.layer-group-count { font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
.layer-check.partial { background: var(--accent); border-color: var(--accent); color: #0a0a0c; opacity: 0.6; }
.layer-item { padding-left: 28px; }
.layer-actions {
  padding: 8px 12px; border-top: 1px solid var(--border-subtle);
  display: flex; gap: 4px; flex-wrap: wrap;
}
.layer-action-btn {
  padding: 4px 8px; background: var(--bg-surface); color: var(--text-secondary);
  border: 1px solid var(--border); border-radius: 4px;
  font-family: var(--font); font-size: 10px; cursor: pointer; transition: all 0.1s;
}
.layer-action-btn:hover { border-color: var(--accent); color: var(--text); }
.missing-deps { padding: 8px 12px; border-top: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle); background: rgba(251, 146, 60, 0.05); }
.missing-deps-title { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #fb923c; margin-bottom: 4px; }
.missing-dep-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 11px; }
.missing-dep-name { font-family: var(--mono); color: var(--text-secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.missing-dep-load { padding: 1px 6px; background: var(--accent); color: #0a0a0c; border: none; border-radius: 3px; font-size: 9px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.missing-dep-load:hover { opacity: 0.85; }
.missing-dep-load-all { width: 100%; padding: 4px 8px; margin-top: 6px; background: var(--bg-surface); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 4px; font-size: 10px; cursor: pointer; }
.missing-dep-load-all:hover { border-color: var(--accent); color: var(--text); }

/* ── Graph Area ──────────────── */
.graph-area { flex: 1; position: relative; overflow: hidden; }
.graph-area svg { width: 100%; height: 100%; display: block; }
.graph-area svg text { font-family: var(--font); pointer-events: none; user-select: none; }
.edge-label { font-size: 9px; fill: var(--text-dim); font-family: var(--mono); }
.edge-label.clickable { cursor: pointer; pointer-events: all; fill: var(--accent); }
.edge-label.clickable:hover { fill: #93c5fd; text-decoration: underline; }
.node-label { font-size: 11px; fill: var(--text-secondary); font-weight: 500; }
.node circle { cursor: pointer; stroke-width: 2; transition: opacity 0.2s; }
.node circle:hover { filter: brightness(1.2); }
.link { stroke: #2a2a2f; stroke-width: 1; transition: opacity 0.2s; }
.link-arrow { fill: #2a2a2f; }
.dimmed { opacity: 0.12; }

/* ── Detail Panel ────────────── */
.detail-panel {
  width: 300px; flex-shrink: 0;
  background: var(--bg-raised);
  border-left: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
}
.detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; color: var(--text-dim); font-size: 12px; gap: 6px; }
.detail-header { padding: 16px 14px 12px; border-bottom: 1px solid var(--border-subtle); }
.detail-name { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; word-break: break-word; }
.detail-namespace { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 3px; }
.type-badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; margin-top: 6px; }
.detail-section { padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); }
.detail-section-title { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 6px; }
.detail-row { display: flex; gap: 8px; padding: 3px 0; font-size: 11px; line-height: 1.4; }
.detail-key { font-family: var(--mono); color: var(--text-dim); flex-shrink: 0; }
.detail-value { color: var(--text-secondary); word-break: break-word; }
.detail-link { color: var(--accent); cursor: pointer; text-decoration: none; }
.detail-link:hover { text-decoration: underline; }
.connection-item { display: flex; align-items: center; gap: 5px; padding: 4px 6px; margin: 1px 0; border-radius: 3px; font-size: 11px; cursor: pointer; transition: background 0.1s; }
.connection-item:hover { background: var(--bg-surface); }
.connection-type { font-family: var(--mono); font-size: 9px; color: var(--text-dim); flex-shrink: 0; }
.connection-name { color: var(--accent); }
.connection-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.connection-prop-link { color: var(--accent); cursor: pointer; }
.connection-prop-link:hover { text-decoration: underline; }

/* ── Legend ───────────────────── */
.legend { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 5px 12px; background: var(--bg-raised); border-top: 1px solid var(--border); flex-shrink: 0; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-dim); }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }
.color-mode-toggle { display: flex; background: var(--bg); border-radius: 4px; border: 1px solid var(--border); overflow: hidden; margin-right: 12px; flex-shrink: 0; }
.color-mode-btn { padding: 2px 10px; border: none; background: transparent; color: var(--text-dim); font-family: var(--font); font-size: 10px; cursor: pointer; transition: all 0.1s; }
.color-mode-btn.active { background: var(--accent); color: #0a0a0c; font-weight: 600; }
.color-mode-btn:hover:not(.active) { color: var(--text); }

/* ── Overlay ─────────────────── */
.overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(10,10,12,0.85); z-index: 5; flex-direction: column; gap: 10px; }
.overlay.hidden { display: none; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.overlay-text { font-size: 12px; color: var(--text-secondary); }
.error-text { font-size: 12px; color: #f87171; max-width: 360px; text-align: center; line-height: 1.5; }

/* ── Drop zone ───────────────── */
.drop-zone { position: absolute; inset: 0; background: rgba(96,165,250,0.08); border: 2px dashed var(--accent); border-radius: 8px; display: none; align-items: center; justify-content: center; z-index: 6; pointer-events: none; }
.drop-zone.active { display: flex; }
.drop-zone-text { font-size: 14px; color: var(--accent); font-weight: 600; }

/* ── Paste modal ─────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 20; display: none; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: var(--bg-raised); border: 1px solid var(--border); border-radius: 8px; padding: 20px; width: 500px; max-width: 90vw; }
.modal h3 { font-size: 14px; margin-bottom: 10px; }
.modal textarea { width: 100%; height: 200px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 10px; font-family: var(--mono); font-size: 12px; resize: vertical; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
.modal-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 4px; font-family: var(--font); font-size: 12px; cursor: pointer; background: var(--bg-surface); color: var(--text-secondary); }
.modal-btn.primary { background: var(--accent); color: #0a0a0c; border-color: var(--accent); font-weight: 600; }
.pub-pkg-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid var(--border-subtle); font-size: 12px; cursor: pointer; transition: background 0.1s; }
.pub-pkg-item:hover { background: var(--bg-surface); }
.pub-pkg-item:last-child { border-bottom: none; }
.pub-pkg-item input[type="checkbox"] { accent-color: var(--accent); }
.pub-pkg-name { font-family: var(--mono); color: var(--text-secondary); }
.pub-pkg-version { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-left: auto; }

/* ── Responsive ──────────────── */
@media (max-width: 900px) {
  .layer-panel { width: 180px; }
  .detail-panel { width: 240px; }
}
@media (max-width: 700px) {
  .main { flex-direction: column; }
  .layer-panel { width: 100%; max-height: 120px; flex-direction: row; border-right: none; border-bottom: 1px solid var(--border); }
  .detail-panel { width: 100%; max-height: 35vh; border-left: none; border-top: 1px solid var(--border); }
  .brand-text { display: none; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <a href="/browser/" class="brand">
    <div class="brand-icon">C</div>
    <span class="brand-text">Canon Browser</span>
  </a>
  <div class="address-bar">
    <span class="address-prefix">canon://</span>
    <input type="text" class="address-input" id="addressInput"
           placeholder="publisher/package" spellcheck="false" autocomplete="off">
    <button class="go-btn" id="goBtn">Add</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Layer Panel -->
  <div class="layer-panel">
    <div class="layer-header">
      <span>Layers</span>
      <span id="layerTotal" style="font-variant-numeric:tabular-nums;"></span>
    </div>
    <div style="padding:4px 8px;">
      <input type="text" id="layerSearch" placeholder="Filter layers..."
        style="width:100%;padding:4px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-family:var(--font);font-size:11px;outline:none;"
        spellcheck="false">
    </div>
    <div class="layer-list" id="layerList"></div>
    <div id="missingDeps" style="display:none;"></div>
    <div class="layer-actions">
      <button class="layer-action-btn" id="addFileBtn">+ File</button>
      <button class="layer-action-btn" id="addDirBtn">+ Directory</button>
      <button class="layer-action-btn" id="addPasteBtn">+ Paste</button>
    </div>
  </div>

  <!-- Graph -->
  <div class="graph-area" id="graphArea">
    <svg id="graphSvg"></svg>
    <div class="overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="overlay-text" id="loadingText">Loading...</div>
    </div>
    <div class="overlay hidden" id="errorOverlay">
      <div class="error-text" id="errorText"></div>
    </div>
    <div class="drop-zone" id="dropZone">
      <span class="drop-zone-text">Drop .can.yml files here</span>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty" id="detailEmpty">
      <div style="font-size:24px;opacity:0.3;">&#9673;</div>
      Click a node to inspect
    </div>
    <div id="detailContent" style="display:none;"></div>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--class)"></div>Class</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--object-prop)"></div>ObjProp</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--datatype-prop)"></div>DataProp</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--instance)"></div>Instance</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--datatype)"></div>Datatype</div>
  <div style="margin-left:auto;">
    <div class="color-mode-toggle">
      <button class="color-mode-btn active" data-mode="type">By Type</button>
      <button class="color-mode-btn" data-mode="package">By Package</button>
    </div>
  </div>
</div>

<!-- Paste Modal -->
<div class="modal-overlay" id="pasteModal">
  <div class="modal">
    <h3>Paste Canon YAML</h3>
    <textarea id="pasteArea" placeholder="Paste .can.yml content here..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn" id="pasteCancelBtn">Cancel</button>
      <button class="modal-btn primary" id="pasteLoadBtn">Load</button>
    </div>
  </div>
</div>

<!-- Publisher Picker Modal -->
<div class="modal-overlay" id="publisherModal">
  <div class="modal" style="width:420px;">
    <h3 id="publisherModalTitle">Packages on publisher</h3>
    <div style="margin-bottom:8px;font-size:11px;color:var(--text-dim);">Select packages to add as layers:</div>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <button class="modal-btn" id="pubSelectAll" style="font-size:10px;padding:3px 8px;">Select all</button>
      <button class="modal-btn" id="pubSelectNone" style="font-size:10px;padding:3px 8px;">Select none</button>
    </div>
    <div id="publisherPackageList" style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;background:var(--bg);"></div>
    <div class="modal-actions">
      <button class="modal-btn" id="pubCancelBtn">Cancel</button>
      <button class="modal-btn primary" id="pubLoadBtn">Load selected</button>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".can.yml,.yml,.yaml" multiple style="display:none">

<script type="module">
import * as d3 from 'https://cdn.jsdelivr.net/npm/d3@7/+esm';
import { CanonParser, GraphBuilder, InMemoryCanonDocumentRepository, PublisherConfigResolver }
  from 'https://esm.sh/@canon-protocol/sdk@8.7.5/browser';

// ── State ───────────────────────────────────────
const parser = new CanonParser();
const configResolver = new PublisherConfigResolver();
const LAYER_COLORS = ['#60a5fa','#34d399','#fb923c','#c084fc','#f472b6','#f59e0b','#14b8a6','#e879f9','#38bdf8','#a3e635'];
let layers = [];  // { id, name, source, visible, document, color, entityCount, availableVersions?, currentVersion? }
let simulation = null;
let selectedNode = null;
let colorIndex = 0;
const publisherIndexCache = new Map(); // publisher → Map<packageName, version[]>
const collapsedPublishers = new Set(); // publishers with collapsed layer lists
const localDocCache = new Map(); // name → Map<version, CanonDocument> for local version switching
let colorMode = 'type'; // 'type' or 'package'

const TYPE_COLORS = {
  Class:'#60a5fa', ObjectProperty:'#34d399', DatatypeProperty:'#fb923c',
  AnnotationProperty:'#c084fc', Instance:'#f472b6', Datatype:'#94a3b8', Unknown:'#6b7280'
};
function nodeColor(type) { return TYPE_COLORS[type] || TYPE_COLORS.Unknown; }
function getNodeFill(d) {
  return colorMode === 'package' ? (d.layerColor || '#6b7280') : nodeColor(d.type);
}
function nextLayerColor() { return LAYER_COLORS[colorIndex++ % LAYER_COLORS.length]; }

// ── DOM refs ────────────────────────────────────
const addressInput = document.getElementById('addressInput');
const goBtn = document.getElementById('goBtn');
const layerList = document.getElementById('layerList');
const layerTotal = document.getElementById('layerTotal');
const graphSvg = document.getElementById('graphSvg');
const graphArea = document.getElementById('graphArea');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingText = document.getElementById('loadingText');
const errorOverlay = document.getElementById('errorOverlay');
const errorText = document.getElementById('errorText');
const detailEmpty = document.getElementById('detailEmpty');
const detailContent = document.getElementById('detailContent');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const pasteModal = document.getElementById('pasteModal');
const pasteArea = document.getElementById('pasteArea');

// ── Publisher index (cached) ────────────────────
function sortVersionsDesc(versions) {
  return [...versions].sort((a, b) => {
    const pa = a.split('.').map(Number), pb = b.split('.').map(Number);
    return (pb[0]-pa[0]) || (pb[1]-pa[1]) || (pb[2]-pa[2]);
  });
}

async function getPublisherIndex(publisher) {
  if (publisherIndexCache.has(publisher)) return publisherIndexCache.get(publisher);

  // Use SDK's PublisherConfigResolver for proper discovery via .well-known/canon.json
  const config = await configResolver.getConfig(publisher);
  const indexUrl = configResolver.resolveIndexUrl(publisher, config);

  const res = await fetch(indexUrl);
  if (!res.ok) throw new Error(`Failed to fetch index from ${publisher} (HTTP ${res.status})\n  URL: ${indexUrl}`);
  const text = await res.text();

  const index = new Map();
  for (const line of text.split('\n')) {
    const t = line.trim();
    if (!t || t.startsWith('#')) continue;
    const s = t.indexOf('/');
    if (s === -1) continue;
    const pkg = t.substring(0, s);
    const ver = t.substring(s + 1);
    if (!index.has(pkg)) index.set(pkg, []);
    index.get(pkg).push(ver);
  }
  // Sort versions descending for each package
  for (const [pkg, versions] of index) {
    index.set(pkg, sortVersionsDesc(versions));
  }

  publisherIndexCache.set(publisher, index);
  return index;
}

// ── Package fetching ────────────────────────────
async function fetchPackageYaml(uri) {
  const slash = uri.indexOf('/');
  if (slash === -1) throw new Error(`Invalid URI: "${uri}"`);
  const publisher = uri.substring(0, slash);
  const packageName = uri.substring(slash + 1);

  const index = await getPublisherIndex(publisher);
  const versions = index.get(packageName);
  if (!versions || versions.length === 0) throw new Error(`Package "${packageName}" not found on ${publisher}`);

  const version = versions[0]; // highest (already sorted desc)

  const config = await configResolver.getConfig(publisher);
  const pkgUrl = configResolver.resolvePackageUrl(publisher, packageName, version, config);
  const pkgRes = await fetch(pkgUrl);
  if (!pkgRes.ok) throw new Error(`Failed to fetch ${packageName}@${version}\n  URL: ${pkgUrl}`);
  return { yaml: await pkgRes.text(), name: `${publisher}/${packageName}`, version, allVersions: versions };
}

// ── Layer management ────────────────────────────
function addLayer(name, source, document, options = {}) {
  const existing = layers.find(l => l.name === name);
  if (existing) {
    flashLayer(existing.id);
    return;
  }

  let entityCount = 0;
  for (const [, val] of Object.entries(document.body)) {
    if (val && typeof val === 'object' && val.type !== 'Package') entityCount++;
  }

  const layer = {
    id: 'layer-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
    name,
    source,
    visible: true,
    document,
    color: nextLayerColor(),
    entityCount,
    availableVersions: options.availableVersions || null,
    currentVersion: options.currentVersion || null,
  };
  layers.push(layer);
  renderLayers();
  rebuildGraph();
  updateHash();
}

function removeLayer(id) {
  layers = layers.filter(l => l.id !== id);
  renderLayers();
  rebuildGraph();
  updateHash();
}

function toggleLayer(id) {
  const layer = layers.find(l => l.id === id);
  if (layer) {
    layer.visible = !layer.visible;
    renderLayers();
    rebuildGraph();
  }
}

function togglePublisher(publisher) {
  const pubLayers = layers.filter(l => getPublisher(l.name) === publisher);
  const allVisible = pubLayers.every(l => l.visible);
  for (const l of pubLayers) l.visible = !allVisible;
  renderLayers();
  rebuildGraph();
}

function getPublisher(name) {
  const slash = name.indexOf('/');
  return slash !== -1 ? name.substring(0, slash) : name;
}

async function switchLayerVersion(layerId, newVersion) {
  const layer = layers.find(l => l.id === layerId);
  if (!layer || layer.currentVersion === newVersion) return;

  showLoading(`Switching ${layer.name} to v${newVersion}...`);
  try {
    let doc;

    // Check local cache first (for directory/file-loaded layers)
    const cached = localDocCache.get(layer.name)?.get(newVersion);
    if (cached) {
      doc = cached;
    } else {
      // Fetch from remote
      const publisher = getPublisher(layer.name);
      const packageName = layer.name.substring(publisher.length + 1);
      const config = await configResolver.getConfig(publisher);
      const pkgUrl = configResolver.resolvePackageUrl(publisher, packageName, newVersion, config);
      const res = await fetch(pkgUrl);
      if (!res.ok) throw new Error(`Failed to fetch ${layer.name}@${newVersion} (HTTP ${res.status})\n  URL: ${pkgUrl}`);
      const yaml = await res.text();
      doc = parser.parse(yaml);
    }

    layer.document = doc;
    layer.currentVersion = newVersion;
    let entityCount = 0;
    for (const [, val] of Object.entries(doc.body)) {
      if (val && typeof val === 'object' && val.type !== 'Package') entityCount++;
    }
    layer.entityCount = entityCount;

    hideLoading();
    renderLayers();
    rebuildGraph();
  } catch (err) {
    hideLoading();
    showError(err.message);
  }
}

function renderMissingDeps() {
  const container = document.getElementById('missingDeps');
  const loadedPackages = new Set(layers.map(l => l.name));

  // Collect all imports from all loaded layers
  const missing = [];
  for (const layer of layers) {
    const imports = layer.document.metadata?.imports;
    if (!imports) continue;
    for (const [publisher, importList] of Object.entries(imports)) {
      for (const imp of importList) {
        const pkgName = `${publisher}/${imp.packageName}`;
        if (!loadedPackages.has(pkgName) && !missing.some(m => m.name === pkgName)) {
          const ver = imp.version;
          missing.push({
            name: pkgName,
            version: `${ver.major}.${ver.minor}.${ver.patch}`,
            publisher,
            packageName: imp.packageName,
          });
        }
      }
    }
  }

  if (missing.length === 0) {
    container.style.display = 'none';
    return;
  }

  let html = '<div class="missing-deps"><div class="missing-deps-title">Missing dependencies</div>';
  for (const dep of missing) {
    html += `<div class="missing-dep-item">
      <span class="missing-dep-name" title="${esc(dep.name)}">${esc(dep.name)}</span>
      <button class="missing-dep-load" data-dep-uri="${esc(dep.name)}">Load</button>
    </div>`;
  }
  if (missing.length > 1) {
    html += `<button class="missing-dep-load-all" id="loadAllDeps">Load all ${missing.length} dependencies</button>`;
  }
  html += '</div>';

  container.innerHTML = html;
  container.style.display = 'block';

  // Bind load buttons
  container.querySelectorAll('.missing-dep-load').forEach(btn => {
    btn.addEventListener('click', () => loadRemoteLayer(btn.dataset.depUri));
  });
  const loadAllBtn = container.querySelector('#loadAllDeps');
  if (loadAllBtn) {
    loadAllBtn.addEventListener('click', async () => {
      for (const dep of missing) {
        await loadRemoteLayer(dep.name);
      }
    });
  }
}

function flashLayer(id) {
  const el = document.querySelector(`[data-layer-id="${id}"]`);
  if (el) {
    el.style.background = 'rgba(96,165,250,0.2)';
    setTimeout(() => { el.style.background = ''; }, 600);
  }
}

function renderLayers() {
  if (layers.length === 0) {
    layerList.innerHTML = '<div style="padding:20px 12px;text-align:center;color:var(--text-dim);font-size:11px;">No layers loaded.<br>Enter a URI above or drop files.</div>';
    layerTotal.textContent = '';
    return;
  }

  const searchTerm = (document.getElementById('layerSearch')?.value || '').toLowerCase().trim();

  // Group layers by publisher, filtered by search
  const groups = new Map();
  for (const l of layers) {
    if (searchTerm && !l.name.toLowerCase().includes(searchTerm)) continue;
    const pub = getPublisher(l.name);
    if (!groups.has(pub)) groups.set(pub, []);
    groups.get(pub).push(l);
  }

  let html = '';
  for (const [pub, pubLayers] of groups) {
    const allVisible = pubLayers.every(l => l.visible);
    const someVisible = pubLayers.some(l => l.visible);
    const checkState = allVisible ? 'checked' : (someVisible ? 'partial' : '');
    const checkIcon = allVisible ? '&#10003;' : (someVisible ? '&#8722;' : '');
    const entityCount = pubLayers.reduce((s, l) => s + (l.visible ? l.entityCount : 0), 0);
    const isLocal = pubLayers.some(l => l.source !== 'remote');
    const sourceIcon = isLocal ? '&#9670;' : '&#9679;';

    // Auto-collapse publishers with many packages on first render
    const isNew = !collapsedPublishers.has(pub) && !collapsedPublishers.has('_init_' + pub);
    if (isNew) {
      collapsedPublishers.add('_init_' + pub);
      if (pubLayers.length > 5) collapsedPublishers.add(pub);
    }
    // When searching, always expand to show results
    const collapsed = searchTerm ? false : collapsedPublishers.has(pub);
    const arrow = collapsed ? '&#9656;' : '&#9662;'; // ▸ or ▾

    html += `<div class="layer-group" data-publisher="${esc(pub)}">
      <div class="layer-group-header" data-pub-collapse="${esc(pub)}">
        <div class="layer-check ${checkState}" data-pub-toggle="${esc(pub)}">${checkIcon}</div>
        <span class="layer-group-arrow">${arrow}</span>
        <span class="layer-group-name" title="${esc(pub)}">${esc(pub)}</span>
        <span class="layer-group-badge">${pubLayers.length}</span>
        <span class="layer-group-count">${entityCount}</span>
      </div>`;
    if (!collapsed) {
      const sorted = [...pubLayers].sort((a, b) => a.name.localeCompare(b.name));
      for (const l of sorted) {
        html += layerItemHtml(l);
      }
    }
    html += '</div>';
  }

  if (groups.size === 0 && searchTerm) {
    html = `<div style="padding:16px 12px;text-align:center;color:var(--text-dim);font-size:11px;">No layers match "${esc(searchTerm)}"</div>`;
  }

  layerList.innerHTML = html;
  layerTotal.textContent = `${layers.reduce((s,l) => s + (l.visible ? l.entityCount : 0), 0)} entities`;

  // Bind layer toggle events
  layerList.querySelectorAll('.layer-check[data-layer-toggle]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); toggleLayer(el.dataset.layerToggle); });
  });
  // Bind publisher group toggle events
  layerList.querySelectorAll('.layer-check[data-pub-toggle]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); togglePublisher(el.dataset.pubToggle); });
  });
  // Bind remove events
  layerList.querySelectorAll('.layer-remove').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); removeLayer(el.dataset.layerRemove); });
  });
  // Bind version switch events
  layerList.querySelectorAll('.layer-version-select').forEach(el => {
    el.addEventListener('change', (e) => { e.stopPropagation(); switchLayerVersion(el.dataset.layerVersion, el.value); });
    el.addEventListener('click', (e) => e.stopPropagation());
  });
  // Bind collapse/expand events (click header, but not the checkbox)
  layerList.querySelectorAll('[data-pub-collapse]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.layer-check')) return; // let checkbox handle its own click
      const pub = el.dataset.pubCollapse;
      if (collapsedPublishers.has(pub)) collapsedPublishers.delete(pub);
      else collapsedPublishers.add(pub);
      renderLayers();
    });
  });
}

function layerItemHtml(l) {
  const shortName = l.name.includes('/') ? l.name.substring(l.name.indexOf('/') + 1) : l.name;

  let versionHtml = '';
  if (l.availableVersions && l.availableVersions.length > 1) {
    versionHtml = `<select class="layer-version-select" data-layer-version="${l.id}"
      style="background:var(--bg);color:var(--text-dim);border:1px solid var(--border);border-radius:3px;font-family:var(--mono);font-size:9px;padding:1px 2px;max-width:58px;">
      ${l.availableVersions.map(v => `<option value="${esc(v)}"${v === l.currentVersion ? ' selected' : ''}>${esc(v)}</option>`).join('')}
    </select>`;
  } else if (l.currentVersion) {
    versionHtml = `<span style="font-family:var(--mono);font-size:9px;color:var(--text-dim);">${esc(l.currentVersion)}</span>`;
  }

  return `<div class="layer-item" data-layer-id="${l.id}">
    <div class="layer-check ${l.visible ? 'checked' : ''}" data-layer-toggle="${l.id}">${l.visible ? '&#10003;' : ''}</div>
    <div class="layer-color" style="background:${l.color}"></div>
    <div class="layer-name" title="${esc(l.name)}">${esc(shortName)}</div>
    ${versionHtml}
    <div class="layer-remove" data-layer-remove="${l.id}" title="Remove layer">&times;</div>
  </div>`;
}

// ── Graph building (using SDK) ──────────────────
async function rebuildGraph() {
  const visible = layers.filter(l => l.visible);
  if (visible.length === 0) {
    clearGraph();
    renderMissingDeps();
    return;
  }

  const repo = new InMemoryCanonDocumentRepository(parser);
  for (const layer of visible) {
    const ns = layer.document.metadata?.namespace_;
    const id = ns ? `${ns.publisher}/${ns.package_}` : layer.name;
    await repo.saveDocumentAsync(layer.document, id);
  }

  const graph = await GraphBuilder.buildFromRepository(repo);

  // Attach layer color to each node based on namespace
  const namespaceToColor = new Map();
  for (const layer of visible) {
    const ns = layer.document.metadata?.namespace_;
    if (ns) namespaceToColor.set(`${ns.publisher}/${ns.package_}`, layer.color);
  }
  for (const node of graph.nodes) {
    node.layerColor = namespaceToColor.get(node.namespace) || '#6b7280';
  }

  renderGraph(graph);
  renderMissingDeps();
}

// ── D3 Graph rendering ──────────────────────────
function clearGraph() {
  if (simulation) simulation.stop();
  d3.select(graphSvg).selectAll('*').remove();
}

function renderGraph(graphData) {
  if (simulation) simulation.stop();
  const { nodes, edges } = graphData;
  const svg = d3.select(graphSvg);
  svg.selectAll('*').remove();

  const width = graphArea.clientWidth;
  const height = graphArea.clientHeight;
  svg.attr('viewBox', `0 0 ${width} ${height}`);

  svg.append('defs').append('marker')
    .attr('id', 'arrowhead').attr('viewBox', '0 0 10 6')
    .attr('refX', 22).attr('refY', 3).attr('markerWidth', 8).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,0 L10,3 L0,6').attr('class', 'link-arrow');

  const g = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.1, 5]).on('zoom', (e) => g.attr('transform', e.transform)));

  const nodeMap = new Map();
  const d3Nodes = nodes.map((n, i) => {
    const obj = { ...n, index: i, x: width/2 + (Math.random()-0.5)*300, y: height/2 + (Math.random()-0.5)*300 };
    nodeMap.set(n.id, obj);
    return obj;
  });

  const d3Links = [];
  for (const e of edges) {
    const source = nodeMap.get(e.source);
    const target = nodeMap.get(e.target);
    if (source && target) d3Links.push({ ...e, source, target });
  }

  const connCount = new Map();
  for (const l of d3Links) {
    connCount.set(l.source.id, (connCount.get(l.source.id)||0)+1);
    connCount.set(l.target.id, (connCount.get(l.target.id)||0)+1);
  }

  const linkG = g.append('g');
  const link = linkG.selectAll('line').data(d3Links).join('line')
    .attr('class', 'link').attr('marker-end', 'url(#arrowhead)');
  const edgeLabel = linkG.selectAll('text').data(d3Links).join('text')
    .attr('class', d => d.propertyId ? 'edge-label clickable' : 'edge-label')
    .attr('text-anchor', 'middle')
    .text(d => d.label);

  // Click edge label to inspect the property entity
  edgeLabel.filter(d => d.propertyId).on('click', (e, d) => {
    e.stopPropagation();
    const propNode = d3Nodes.find(n => n.id === d.propertyId);
    if (propNode) {
      selectNode(propNode, d3Nodes, d3Links, node, link, edgeLabel);
    }
  });

  const nodeG = g.append('g');
  const node = nodeG.selectAll('g').data(d3Nodes).join('g').attr('class', 'node')
    .call(d3.drag()
      .on('start', (e,d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end', (e,d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    );

  // Layer ring (outer circle showing which package)
  node.append('circle')
    .attr('r', d => 9 + Math.min((connCount.get(d.id)||0)*1.5, 12))
    .attr('fill', 'none')
    .attr('stroke', d => d.layerColor || '#333')
    .attr('stroke-width', 2)
    .attr('stroke-opacity', 0.4);

  // Type circle (inner, colored by entity type)
  node.append('circle')
    .attr('r', d => 6 + Math.min((connCount.get(d.id)||0)*1.5, 10))
    .attr('fill', d => getNodeFill(d))
    .attr('fill-opacity', 0.85)
    .attr('stroke', d => getNodeFill(d))
    .attr('stroke-opacity', 0.3);

  node.append('text').attr('class', 'node-label')
    .attr('dy', d => -(12 + Math.min((connCount.get(d.id)||0)*1.5, 12)))
    .attr('text-anchor', 'middle').text(d => d.label);

  node.on('click', (e, d) => { e.stopPropagation(); selectNode(d, d3Nodes, d3Links, node, link, edgeLabel); });
  svg.on('click', () => deselectAll(node, link, edgeLabel));

  simulation = d3.forceSimulation(d3Nodes)
    .force('link', d3.forceLink(d3Links).distance(90).strength(0.4))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collide', d3.forceCollide(25))
    .on('tick', () => {
      link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      edgeLabel.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2 - 4);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  window._graphState = { d3Nodes, d3Links, node, link, edgeLabel };
}

// ── Selection ───────────────────────────────────
function selectNode(d, d3Nodes, d3Links, nodeS, linkS, edgeLabelS) {
  selectedNode = d;
  const connIds = new Set([d.id]);
  const conns = [];
  for (const l of d3Links) {
    if (l.source.id === d.id) { connIds.add(l.target.id); conns.push({ type: l.label, name: l.target.label, id: l.target.id, nodeType: l.target.type, dir: 'out', propertyId: l.propertyId }); }
    if (l.target.id === d.id) { connIds.add(l.source.id); conns.push({ type: l.label, name: l.source.label, id: l.source.id, nodeType: l.source.type, dir: 'in', propertyId: l.propertyId }); }
  }
  nodeS.classed('dimmed', n => !connIds.has(n.id));
  linkS.classed('dimmed', l => l.source.id !== d.id && l.target.id !== d.id);
  edgeLabelS.classed('dimmed', l => l.source.id !== d.id && l.target.id !== d.id);
  showDetail(d, conns);
}

function deselectAll(nodeS, linkS, edgeLabelS) {
  selectedNode = null;
  nodeS.classed('dimmed', false); linkS.classed('dimmed', false); edgeLabelS.classed('dimmed', false);
  detailEmpty.style.display = 'flex'; detailContent.style.display = 'none';
}

// ── Detail panel ────────────────────────────────
function showDetail(d, connections) {
  detailEmpty.style.display = 'none';
  detailContent.style.display = 'block';
  const color = nodeColor(d.type);
  const props = d.properties || {};
  const propEntries = Object.entries(props).filter(([k]) => k !== 'label' && k !== 'comment');

  let html = `<div class="detail-header">
    <div class="detail-name">${esc(d.label)}</div>
    <div class="detail-namespace">${esc(d.id)}</div>
    <div class="type-badge" style="background:${color}20;color:${color}">${esc(d.type)}</div>
  </div>`;

  if (props.comment) {
    html += `<div class="detail-section"><div style="font-size:11px;color:var(--text-secondary);line-height:1.5;">${esc(String(props.comment))}</div></div>`;
  }

  if (propEntries.length > 0) {
    html += `<div class="detail-section"><div class="detail-section-title">Properties</div>`;
    for (const [key, value] of propEntries) {
      html += `<div class="detail-row"><span class="detail-key">${esc(key)}</span><span class="detail-value">${esc(String(value))}</span></div>`;
    }
    html += `</div>`;
  }

  if (connections.length > 0) {
    html += `<div class="detail-section"><div class="detail-section-title">Connections</div>`;
    for (const c of connections) {
      const dir = c.dir === 'out' ? '&rarr;' : '&larr;';
      const propLink = c.propertyId
        ? `<span class="connection-prop-link" data-prop-id="${esc(c.propertyId)}" title="Inspect property">${esc(c.type)}</span>`
        : esc(c.type);
      html += `<div class="connection-item" data-node-id="${esc(c.id)}">
        <div class="connection-dot" style="background:${nodeColor(c.nodeType)}"></div>
        <span class="connection-type">${dir} ${propLink}</span>
        <span class="connection-name">${esc(c.name)}</span>
      </div>`;
    }
    html += `</div>`;
  }

  detailContent.innerHTML = html;

  // Click connection item → navigate to connected node
  detailContent.querySelectorAll('.connection-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.connection-prop-link')) return; // handled below
      const s = window._graphState;
      if (!s) return;
      const t = s.d3Nodes.find(n => n.id === el.dataset.nodeId);
      if (t) selectNode(t, s.d3Nodes, s.d3Links, s.node, s.link, s.edgeLabel);
    });
  });

  // Click property link → navigate to the ObjectProperty node
  detailContent.querySelectorAll('.connection-prop-link').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const s = window._graphState;
      if (!s) return;
      const propNode = s.d3Nodes.find(n => n.id === el.dataset.propId);
      if (propNode) selectNode(propNode, s.d3Nodes, s.d3Links, s.node, s.link, s.edgeLabel);
    });
  });
}

// ── URL hash ────────────────────────────────────
function updateHash() {
  suppressHashChange = true;
  const remote = layers.filter(l => l.source === 'remote').map(l => l.name);
  if (remote.length <= 5) {
    window.location.hash = remote.join(',');
  } else {
    const publishers = [...new Set(remote.map(getPublisher))];
    window.location.hash = publishers.join(',');
  }
}

function loadFromHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return [];
  return hash.split(',').map(s => s.trim()).filter(Boolean);
}

// ── Load remote package ─────────────────────────
async function loadRemoteLayer(uri) {
  uri = uri.trim().replace(/^canon:\/\//, '');
  if (!uri) return;

  // If no slash, treat as a publisher domain → show package picker
  if (!uri.includes('/')) {
    await loadPublisher(uri);
    return;
  }

  if (layers.find(l => l.name === uri)) { flashLayer(layers.find(l => l.name === uri).id); return; }

  showLoading(`Loading ${uri}...`);
  hideError();
  try {
    const { yaml, name, version, allVersions } = await fetchPackageYaml(uri);
    const doc = parser.parse(yaml);
    addLayer(name, 'remote', doc, { availableVersions: allVersions, currentVersion: version });
    hideLoading();
  } catch (err) {
    hideLoading();
    showError(err.message);
  }
}

// ── Load publisher (show package picker) ────────
async function loadPublisher(publisher) {
  publisher = publisher.trim();
  showLoading(`Discovering packages on ${publisher}...`);
  hideError();

  try {
    // Use cached publisher index (already uses SDK's PublisherConfigResolver for discovery)
    const index = await getPublisherIndex(publisher);

    if (index.size === 0) throw new Error(`No packages found on ${publisher}`);

    // Build package list (versions already sorted desc by getPublisherIndex)
    const packages = [];
    for (const [pkg, versions] of index) {
      const already = layers.some(l => l.name === `${publisher}/${pkg}`);
      packages.push({ name: pkg, versions, latest: versions[0], already });
    }
    packages.sort((a, b) => a.name.localeCompare(b.name));

    hideLoading();
    showPublisherPicker(publisher, packages);
  } catch (err) {
    hideLoading();
    showError(err.message);
  }
}

function showPublisherPicker(publisher, packages) {
  const modal = document.getElementById('publisherModal');
  const title = document.getElementById('publisherModalTitle');
  const list = document.getElementById('publisherPackageList');

  title.textContent = `Packages on ${publisher} (${packages.length})`;

  let html = '';
  for (const pkg of packages) {
    const checked = !pkg.already ? 'checked' : '';
    const dimStyle = pkg.already ? 'opacity:0.5;' : '';
    const versionDropdown = pkg.versions.length > 1
      ? `<select class="pub-pkg-version-select" data-pkg="${esc(pkg.name)}" ${pkg.already ? 'disabled' : ''}
          style="background:var(--bg);color:var(--text-dim);border:1px solid var(--border);border-radius:3px;font-family:var(--mono);font-size:10px;padding:1px 4px;margin-left:auto;">
          ${pkg.versions.map(v => `<option value="${esc(v)}"${v === pkg.latest ? ' selected' : ''}>${esc(v)}</option>`).join('')}
        </select>`
      : `<span class="pub-pkg-version">${esc(pkg.latest)}</span>`;

    html += `<div class="pub-pkg-item" style="${dimStyle}">
      <input type="checkbox" ${checked} data-pkg="${esc(pkg.name)}" ${pkg.already ? 'disabled' : ''}>
      <span class="pub-pkg-name">${esc(pkg.name)}</span>
      ${pkg.already ? '<span style="font-size:9px;color:var(--text-dim);">loaded</span>' : ''}
      ${versionDropdown}
    </div>`;
  }
  list.innerHTML = html;

  // Prevent checkbox toggle when clicking version dropdown
  list.querySelectorAll('.pub-pkg-version-select').forEach(sel => {
    sel.addEventListener('click', (e) => e.stopPropagation());
  });

  // Select all / none buttons
  document.getElementById('pubSelectAll').onclick = () => {
    list.querySelectorAll('input[type="checkbox"]:not(:disabled)').forEach(cb => cb.checked = true);
  };
  document.getElementById('pubSelectNone').onclick = () => {
    list.querySelectorAll('input[type="checkbox"]:not(:disabled)').forEach(cb => cb.checked = false);
  };

  // Cancel
  document.getElementById('pubCancelBtn').onclick = () => modal.classList.remove('active');

  // Load selected with chosen versions
  document.getElementById('pubLoadBtn').onclick = async () => {
    const selected = [];
    list.querySelectorAll('input[type="checkbox"]:checked:not(:disabled)').forEach(cb => {
      const pkgName = cb.dataset.pkg;
      // Check if there's a version dropdown for this package
      const versionSelect = list.querySelector(`.pub-pkg-version-select[data-pkg="${pkgName}"]`);
      const version = versionSelect ? versionSelect.value : null;
      selected.push({ name: pkgName, version });
    });
    modal.classList.remove('active');

    if (selected.length === 0) return;

    for (const pkg of selected) {
      await loadRemoteLayerWithVersion(publisher, pkg.name, pkg.version);
    }
  };

  modal.classList.add('active');
}

// ── Load remote package with specific version ───
async function loadRemoteLayerWithVersion(publisher, packageName, version) {
  const layerName = `${publisher}/${packageName}`;
  if (layers.find(l => l.name === layerName)) { flashLayer(layers.find(l => l.name === layerName).id); return; }

  showLoading(`Loading ${layerName}@${version}...`);
  hideError();
  try {
    const index = await getPublisherIndex(publisher);
    const allVersions = index.get(packageName) || [];

    // If no version specified, resolve latest via index
    if (!version) {
      const { yaml, name, version: resolved, allVersions: av } = await fetchPackageYaml(`${publisher}/${packageName}`);
      const doc = parser.parse(yaml);
      addLayer(name, 'remote', doc, { availableVersions: av, currentVersion: resolved });
      hideLoading();
      return;
    }

    const config = await configResolver.getConfig(publisher);
    const pkgUrl = configResolver.resolvePackageUrl(publisher, packageName, version, config);
    const res = await fetch(pkgUrl);
    if (!res.ok) throw new Error(`Failed to fetch ${layerName}@${version} (HTTP ${res.status})\n  URL: ${pkgUrl}`);
    const yaml = await res.text();
    const doc = parser.parse(yaml);
    addLayer(layerName, 'remote', doc, { availableVersions: allVersions, currentVersion: version });
    hideLoading();
  } catch (err) {
    hideLoading();
    showError(err.message);
  }
}

// ── Load local files ────────────────────────────
async function loadLocalFiles(files) {
  // Parse all files using the Canon SDK and group by package identity from metadata
  const packageMap = new Map(); // name → { versions: Map<version, doc> }

  for (const file of files) {
    if (!file.name.endsWith('.can.yml') && !file.name.endsWith('.yml') && !file.name.endsWith('.yaml')) continue;
    try {
      const yaml = await file.text();
      const doc = parser.parse(yaml);
      const ns = doc.metadata?.namespace_;

      if (!ns || !ns.publisher || !ns.package_ || !ns.version) {
        console.warn(`Skipping ${file.name}: missing Canon Package metadata (publisher, package, or version).`);
        continue;
      }

      // Identity comes exclusively from the SDK's parsed Package metadata
      const name = `${ns.publisher}/${ns.package_}`;
      const version = `${ns.version.major}.${ns.version.minor}.${ns.version.patch}`;

      if (!packageMap.has(name)) packageMap.set(name, { versions: new Map() });
      packageMap.get(name).versions.set(version, doc);
    } catch (err) {
      console.error(`Failed to parse ${file.name}:`, err.message);
    }
  }

  // Add one layer per package with version info
  for (const [name, pkg] of packageMap) {
    const allVersions = sortVersionsDesc([...pkg.versions.keys()]);
    const latestVersion = allVersions[0];
    const doc = pkg.versions.get(latestVersion);

    // Store all parsed docs so version switching doesn't need HTTP
    const layer = addLayer(name, 'local', doc, {
      availableVersions: allVersions,
      currentVersion: latestVersion,
    });

    // Cache local docs for version switching
    if (!localDocCache.has(name)) localDocCache.set(name, new Map());
    for (const [ver, d] of pkg.versions) {
      localDocCache.get(name).set(ver, d);
    }
  }
}

// ── Load from paste ─────────────────────────────
function loadFromPaste(yaml) {
  try {
    const doc = parser.parse(yaml);
    const ns = doc.metadata?.namespace_;
    if (!ns || !ns.publisher || !ns.package_ || !ns.version) {
      showError('Pasted content is missing Canon Package metadata (publisher, package, or version).');
      return;
    }
    const name = `${ns.publisher}/${ns.package_}`;
    const version = `${ns.version.major}.${ns.version.minor}.${ns.version.patch}`;
    addLayer(name, 'paste', doc, { currentVersion: version });
  } catch (err) {
    showError(`YAML parse error: ${err.message}`);
  }
}

// ── Load directory (File System Access API) ─────
async function loadDirectory() {
  if (!('showDirectoryPicker' in window)) {
    showError('Directory picker is not supported in this browser. Try dragging files instead.');
    return;
  }
  try {
    const dirHandle = await window.showDirectoryPicker();
    await scanDirectory(dirHandle);
  } catch (err) {
    if (err.name !== 'AbortError') showError(err.message);
  }
}

async function scanDirectory(dirHandle) {
  for await (const entry of dirHandle.values()) {
    if (entry.kind === 'file' && entry.name.endsWith('.can.yml')) {
      const file = await entry.getFile();
      await loadLocalFiles([file]);
    } else if (entry.kind === 'directory' && entry.name !== 'node_modules' && entry.name !== '.canon' && !entry.name.startsWith('.')) {
      await scanDirectory(entry);
    }
  }
}

// ── UI helpers ──────────────────────────────────
function showLoading(text) { loadingText.textContent = text; loadingOverlay.classList.remove('hidden'); }
function hideLoading() { loadingOverlay.classList.add('hidden'); }
function showError(msg) { errorText.textContent = msg; errorOverlay.classList.remove('hidden'); setTimeout(() => hideError(), 8000); }
function hideError() { errorOverlay.classList.add('hidden'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Event handlers ──────────────────────────────
goBtn.addEventListener('click', () => loadRemoteLayer(addressInput.value));
addressInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadRemoteLayer(addressInput.value); });

// Layer search filter
document.getElementById('layerSearch').addEventListener('input', () => renderLayers());

// Color mode toggle
document.querySelectorAll('.color-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    colorMode = btn.dataset.mode;
    document.querySelectorAll('.color-mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Update existing node colors without full rebuild
    if (window._graphState) {
      const { node } = window._graphState;
      node.selectAll('circle:nth-child(2)')
        .transition().duration(300)
        .attr('fill', d => getNodeFill(d))
        .attr('stroke', d => getNodeFill(d));
    }
  });
});


// File input
document.getElementById('addFileBtn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { loadLocalFiles(fileInput.files); fileInput.value = ''; });

// Directory
document.getElementById('addDirBtn').addEventListener('click', loadDirectory);

// Paste modal
document.getElementById('addPasteBtn').addEventListener('click', () => { pasteModal.classList.add('active'); pasteArea.value = ''; pasteArea.focus(); });
document.getElementById('pasteCancelBtn').addEventListener('click', () => pasteModal.classList.remove('active'));
document.getElementById('pasteLoadBtn').addEventListener('click', () => { pasteModal.classList.remove('active'); if (pasteArea.value.trim()) loadFromPaste(pasteArea.value); });

// Drag and drop
graphArea.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('active'); });
graphArea.addEventListener('dragleave', () => dropZone.classList.remove('active'));
graphArea.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('active');
  const files = Array.from(e.dataTransfer.files);
  if (files.length > 0) loadLocalFiles(files);
});

// Hash change
let suppressHashChange = false;
window.addEventListener('hashchange', () => {
  if (suppressHashChange) { suppressHashChange = false; return; }
  const uris = loadFromHash();
  const current = new Set(layers.filter(l => l.source === 'remote').map(l => l.name));
  for (const uri of uris) {
    // Only auto-load package URIs (with slash), not publisher-only entries
    if (uri.includes('/') && !current.has(uri)) loadRemoteLayer(uri);
  }
});

// ── Init ────────────────────────────────────────
const initialUris = loadFromHash();
if (initialUris.length === 0) initialUris.push('canon-protocol.org/core-rdf');

renderLayers();
hideLoading();
for (const uri of initialUris) {
  addressInput.value = uri;
  await loadRemoteLayer(uri);
}
addressInput.value = '';
</script>
