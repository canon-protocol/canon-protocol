<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canon Browser — Auth Callback</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0c;
    color: #e4e4e7;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  .msg { text-align: center; font-size: 14px; color: #a1a1aa; }
</style>
</head>
<body>
<div class="msg">Completing authentication...</div>
<script>
  // Relay the OAuth callback parameters to the opener window via postMessage.
  // This page is loaded in a popup after the IDP redirects back with an auth code.
  const params = new URLSearchParams(window.location.search);
  const message = {
    type: 'canon-auth-callback',
    code: params.get('code'),
    state: params.get('state'),
    error: params.get('error') || params.get('error_description'),
  };

  if (window.opener) {
    // Send to opener with strict origin check
    window.opener.postMessage(message, window.location.origin);
    // Close after a brief delay so the user sees the message
    setTimeout(() => window.close(), 500);
  } else {
    document.querySelector('.msg').textContent =
      'Authentication complete. You can close this window.';
  }
</script>
</body>
</html>
