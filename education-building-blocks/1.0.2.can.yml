# Package declaration
education-building-blocks:
  type: Package
  publisher: canon-protocol.org
  version: 1.0.2
  imports:
    - publisher: canon-protocol.org
      packages:
        - package: education
          match: ^
          version: 1.0.1
        - package: core-rdf
          match: ^
          version: 1.0.1
          alias: rdfs

# ========================================
# THREE BUILDING BLOCKS TUTORIAL
# ========================================

ThreeBuildingBlocksTutorial:
  type: Tutorial
  title: Canon's Three Building Blocks
  difficulty: Beginner
  content: |
    Every Canon ontology is built from just three fundamental concepts:

    1. **Classes** - Define types of entities
    2. **Properties** - Define attributes and relationships
    3. **Instances** - Define concrete data

    Understanding these three building blocks is essential to working with Canon effectively.
  hasSteps:
    - Step1Classes
    - Step2Properties
    - Step3Instances
    - Step4PuttingItTogether

# ========================================
# STEP 1: CLASSES
# ========================================

Step1Classes:
  type: TutorialStep
  stepNumber: 1
  title: Building Block 1 - Classes
  content: |
    # Classes: Defining Entity Types

    A **Class** is a category or type of thing. Think of it as a template or blueprint
    that defines what properties instances of that class can have.

    ## Examples of Classes:
    - Person (a human being)
    - City (a geographic location)
    - Product (something for sale)
    - Organization (a company or institution)

    ## Key Points:
    - Classes define **what something IS**
    - Every class should have a `label` (human-readable name)
    - Every class should have a `comment` (description)
    - Classes can inherit from other classes using `subClassOf`

    ## All Classes Inherit from Resource

    In Canon, everything is a Resource. When you create a class, it automatically
    inherits from `rdfs.Resource` (the base class for all entities).
  hasExample: ClassExample

ClassExample:
  type: CodeExample
  language: yaml
  codeSnippet: |
    # Define a Person class
    Person:
      type: rdfs.Class
      label: Person
      comment: A human being
      subClassOf: rdfs.Resource

    # Define a more specific class
    Employee:
      type: rdfs.Class
      label: Employee
      comment: A person who works for an organization
      subClassOf: Person

# ========================================
# STEP 2: PROPERTIES
# ========================================

Step2Properties:
  type: TutorialStep
  stepNumber: 2
  title: Building Block 2 - Properties
  content: |
    # Properties: Defining Attributes and Relationships

    A **Property** describes an attribute or relationship that entities can have.
    Properties have two critical characteristics:

    - **domain** - What class does this property apply to?
    - **range** - What type of value does this property hold?

    ## Two Types of Properties

    ### 1. DatatypeProperty (Points to Literal Values)

    Use when the property holds a primitive value like text, number, or boolean.

    **Examples:**
    - name → string
    - age → integer
    - price → decimal
    - isActive → boolean

    ### 2. ObjectProperty (Points to Other Entities)

    Use when the property references another entity/resource.

    **Examples:**
    - friendOf → Person
    - locatedIn → City
    - employedBy → Organization
    - hasAddress → Address

    ## How to Choose?

    **Ask:** Does this property point to **data** or to **another entity**?
    - Data (string, number, boolean) → DatatypeProperty
    - Entity (Person, City, Product) → ObjectProperty
  hasExample: PropertyExample

PropertyExample:
  type: CodeExample
  language: yaml
  codeSnippet: |
    # DatatypeProperty example (entity → data)
    name:
      type: DatatypeProperty
      label: Name
      comment: The name of a person
      domain: Person
      range: string

    age:
      type: DatatypeProperty
      label: Age
      comment: The age of a person in years
      domain: Person
      range: integer

    # ObjectProperty example (entity → entity)
    friendOf:
      type: ObjectProperty
      label: Friend Of
      comment: Indicates that a person is friends with another person
      domain: Person
      range: Person

    worksFor:
      type: ObjectProperty
      label: Works For
      comment: The organization that employs this person
      domain: Person
      range: Organization

# ========================================
# STEP 3: INSTANCES
# ========================================

Step3Instances:
  type: TutorialStep
  stepNumber: 3
  title: Building Block 3 - Instances
  content: |
    # Instances: Concrete Data

    An **Instance** is actual data conforming to a class definition. If a Class is
    the blueprint, an Instance is the actual building.

    ## Key Points:
    - Every instance must have a `type` property declaring its class
    - Instances use properties defined in their class (or parent classes)
    - Instance names should be descriptive and unique

    ## Naming Convention

    Instances use kebab-case, optionally suffixed with their class name:
    - `alice-person` (instance of Person)
    - `portland-city` (instance of City)
    - `acme-organization` (instance of Organization)

    This makes it clear what each entity represents.
  hasExample: InstanceExample

InstanceExample:
  type: CodeExample
  language: yaml
  codeSnippet: |
    # Instance of Person class
    alice-person:
      type: Person
      name: Alice Smith
      age: 30
      friendOf: bob-person

    bob-person:
      type: Person
      name: Bob Jones
      age: 28
      friendOf: alice-person

    # Instance of Organization class
    acme-organization:
      type: Organization
      name: Acme Corporation

    # Employee instance (uses inherited properties from Person)
    charlie-employee:
      type: Employee
      name: Charlie Brown
      age: 35
      worksFor: acme-organization

# ========================================
# STEP 4: PUTTING IT ALL TOGETHER
# ========================================

Step4PuttingItTogether:
  type: TutorialStep
  stepNumber: 4
  title: Putting It All Together
  content: |
    # Complete Example: A Simple Ontology

    Let's build a complete ontology using all three building blocks.

    We'll create:
    1. **Classes** for Person and Organization
    2. **Properties** for their attributes and relationships
    3. **Instances** representing actual people and organizations

    ## The Pattern

    ```
    1. Import foundation vocabularies
    2. Define your classes
    3. Define your properties
    4. Create instances
    ```

    This is the basic workflow for every Canon ontology.
  hasExample: CompleteExample

CompleteExample:
  type: CodeExample
  language: yaml
  codeSnippet: |
    people:
      type: Package
      publisher: mycompany.com
      version: 1.0.0
      imports:
        - publisher: canon-protocol.org
          packages:
            - package: core-rdf
              match: ^
              version: 1.0.1
              alias: rdfs
            - package: core-xsd
              match: ^
              version: 1.0.1
            - package: core-owl
              match: ^
              version: 2.0.1

    # ========================================
    # BUILDING BLOCK 1: CLASSES
    # ========================================

    Person:
      type: rdfs.Class
      label: Person
      comment: A human being

    Organization:
      type: rdfs.Class
      label: Organization
      comment: A company or institution

    # ========================================
    # BUILDING BLOCK 2: PROPERTIES
    # ========================================

    # DatatypeProperties (entity → data)
    name:
      type: DatatypeProperty
      label: Name
      comment: The name of an entity
      domain: rdfs.Resource
      range: string

    age:
      type: DatatypeProperty
      label: Age
      comment: Age in years
      domain: Person
      range: integer

    # ObjectProperties (entity → entity)
    worksFor:
      type: ObjectProperty
      label: Works For
      comment: The organization this person works for
      domain: Person
      range: Organization

    # ========================================
    # BUILDING BLOCK 3: INSTANCES
    # ========================================

    alice-person:
      type: Person
      name: Alice Smith
      age: 30
      worksFor: acme-organization

    bob-person:
      type: Person
      name: Bob Jones
      age: 28
      worksFor: acme-organization

    acme-organization:
      type: Organization
      name: Acme Corporation
