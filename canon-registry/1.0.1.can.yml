# Package declaration
canon-registry:
  type: Package
  publisher: canon-protocol.org
  version: 1.0.1
  imports:
    - publisher: canon-protocol.org
      packages:
        - package: common
          match: ^
          version: 1.0.1
        - package: core-rdf
          match: ^
          version: 1.0.1
          alias: rdfs

# Core Classes

RegistryInfo:
  type: rdfs.Class
  label: Registry Info
  comment: Base class for registry connection information (hostname, namespace, scheme, TTL)
  subClassOf: rdfs.Resource

RegistryMetadata:
  type: rdfs.Class
  label: Registry Metadata
  comment: Publisher's registry information exposed via .well-known/canon-registry.can.yml for automatic discovery
  subClassOf: RegistryInfo

RegistryConfiguration:
  type: rdfs.Class
  label: Registry Configuration
  comment: Local configuration file structure for overriding registry discovery (stored in ~/.canon/config.can.yml or system config)
  subClassOf: rdfs.Resource

RegistryOverride:
  type: rdfs.Class
  label: Registry Override
  comment: Domain-to-registry mapping entry that overrides discovery for specific domain patterns (supports wildcards)
  subClassOf: RegistryInfo

DiscoverySettings:
  type: rdfs.Class
  label: Discovery Settings
  comment: Configuration for the .well-known discovery service (enable/disable, timeout)
  subClassOf: rdfs.Resource

# RegistryInfo Properties (shared by RegistryMetadata and RegistryOverride)

registry:
  type: DatatypeProperty
  label: Registry
  comment: OCI registry hostname where packages are hosted (e.g., ghcr.io, docker.io, harbor.company.com)
  domain: RegistryInfo
  range: string

namespace:
  type: DatatypeProperty
  label: Namespace
  comment: OCI namespace or path on the registry (can contain slashes for nested paths, or be empty for some registries)
  domain: RegistryInfo
  range: string

scheme:
  type: DatatypeProperty
  label: Scheme
  comment: URI scheme for registry connection (http or https, defaults to https)
  domain: RegistryInfo
  range: string

ttl:
  type: DatatypeProperty
  label: Time To Live
  comment: Cache duration in seconds for this metadata (defaults to 3600 = 1 hour)
  domain: RegistryInfo
  range: integer

# RegistryMetadata-specific Properties

description:
  type: DatatypeProperty
  label: Description
  comment: Human-readable description of the publisher's package registry
  domain: RegistryMetadata
  range: string

contactUrl:
  type: DatatypeProperty
  label: Contact URL
  comment: URL for contacting the publisher about registry issues (e.g., contact form, GitHub issues, support page)
  domain: RegistryMetadata
  range: string

# RegistryConfiguration Properties

hasOverride:
  type: ObjectProperty
  label: Has Override
  comment: Registry override entries that map domain patterns to specific registries
  domain: RegistryConfiguration
  range: RegistryOverride

hasDiscoverySettings:
  type: ObjectProperty
  label: Has Discovery Settings
  comment: Configuration for the discovery service behavior
  domain: RegistryConfiguration
  range: DiscoverySettings

# RegistryOverride Properties

domainPattern:
  type: DatatypeProperty
  label: Domain Pattern
  comment: Domain or wildcard pattern to match (e.g., canon-protocol.org, *.acme.internal, or * for all domains)
  domain: RegistryOverride
  range: string

skipDiscovery:
  type: DatatypeProperty
  label: Skip Discovery
  comment: If true, skip .well-known discovery and use this override directly; if false, try .well-known first and fall back to override
  domain: RegistryOverride
  range: boolean

# DiscoverySettings Properties

enabled:
  type: DatatypeProperty
  label: Enabled
  comment: Enable or disable .well-known discovery globally (set to false for air-gapped environments)
  domain: DiscoverySettings
  range: boolean

timeout:
  type: DatatypeProperty
  label: Timeout
  comment: Timeout for .well-known HTTP requests in seconds (defaults to 10)
  domain: DiscoverySettings
  range: integer
