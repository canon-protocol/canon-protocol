# Package declaration
resolution:
  type: Package
  publisher: canon-protocol.org
  version: 1.0.1
  imports:
    - publisher: canon-protocol.org
      packages:
        - package: education
          match: ^
          version: 1.0.1
        - package: core-rdf
          match: ^
          version: 1.0.1
          alias: rdfs

# ========================================
# ENTITY RESOLUTION OVERVIEW
# ========================================

EntityResolutionOverview:
  type: ConceptualModel
  title: Entity Resolution in Canon
  difficulty: Intermediate
  content: |
    # Entity Resolution: Finding Entities Across Namespaces

    Entity resolution is the process of finding and loading entity definitions
    when they're referenced by name or URI. This is critical for:

    - Type checking (resolving `type: Character`)
    - Property resolution (resolving `characterName` property)
    - Cross-namespace references (using imported types)
    - Validation (checking if references exist)

    ## The Challenge

    Entities can be defined in:
    - Current namespace
    - Directly imported namespaces
    - Transitively imported namespaces (imports of imports)

    Example:
    ```
    A imports B
    B imports C
    → A can use entities from C (transitive)
    ```

    ## The Solution

    Canon uses the **ResourceResolver** component with:
    - **Transitive import traversal** - Recursively follows import chains
    - **Resource index caching** - Builds complete resource map per namespace
    - **Local shadowing** - Current namespace entities override imported ones
    - **Cycle prevention** - Handles circular imports gracefully

# ========================================
# TRANSITIVE IMPORT RESOLUTION
# ========================================

TransitiveImportResolution:
  type: TechnicalExplanation
  title: Transitive Import Resolution Algorithm
  difficulty: Advanced
  prerequisite: EntityResolutionOverview
  content: |
    # How Canon Resolves Entities Across Import Chains

    ## The Algorithm: BuildResourceIndexAsync

    When Canon resolves entity "Character" in document A, it builds a complete
    resource index using this recursive algorithm:

    ### Pseudocode

    ```
    BuildResourceIndexAsync(document, visitedNamespaces, importPath):
      1. Get current namespace
      2. If namespace already visited → RETURN (cycle prevention)
      3. Mark namespace as visited
      4. Index all entities in current document
      5. FOR EACH import in current document:
         a. Resolve import to highest compatible version
         b. Load imported document
         c. RECURSIVELY call BuildResourceIndexAsync(importedDoc)
         d. Merge results (current namespace shadows imports)
      6. Return complete resource index
    ```

    ### Example Walkthrough

    ```yaml
    # Document A (myapp.com/app@1.0.0):
    imports:
      - publisher: stories.org
        packages:
          - package: characters
            match: ^
            version: 1.0.1

    scene1:
      type: Scene
      hasCharacter: Romeo  # ← How is Romeo resolved?
    ```

    **Resolution Steps:**

    1. **Check A's entities**: No "Romeo" defined locally
    2. **Check A's imports**: stories.org/characters@1.0.0
    3. **Load characters package**: Find "Romeo" entity
    4. **RECURSIVE: Check characters' imports** (might import base types)
    5. **Merge all entities**: Build complete index
    6. **Resolve "Romeo"**: Found in stories.org/characters@1.0.0

    ## Transitive Import Example

    ```
    App (myapp.com/app)
     └─ imports Characters (stories.org/characters)
         └─ imports Classes (stories.org/classes)
             └─ imports RDF (canon-protocol.org/core-rdf)

    App can use:
    - Entities from Characters (direct import)
    - Entities from Classes (transitive via Characters)
    - Entities from RDF (transitive via Classes)
    ```

    All entities from the entire transitive closure are available!

# ========================================
# SHADOWING RULES
# ========================================

ShadowingRules:
  type: TechnicalExplanation
  title: Local Shadowing and Import Precedence
  difficulty: Intermediate
  prerequisite: TransitiveImportResolution
  content: |
    # Import Shadowing: Local Entities Win

    When multiple packages define entities with the same name, Canon uses
    **local shadowing** rules to determine which entity wins.

    ## The Rule

    **Local entities ALWAYS shadow (override) imported entities.**
    **First match wins (current namespace → imports → transitive imports).**

    ## Resolution Order

    1. **Current namespace** - Check entities defined locally
    2. **Direct imports** - Check directly imported packages
    3. **Transitive imports** - Check imports of imports

    First match stops the search.

    ## Example: Name Collision

    ```yaml
    # canon-protocol.org/core-rdf@1.0.0 defines "Resource"
    Resource:
      type: Class
      label: RDF Resource

    # myapp.com/app@1.0.0 also defines "Resource"
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-rdf
            match: ^
            version: 1.0.1

    Resource:  # ← This shadows canon-protocol.org/core-rdf/Resource
      type: Class
      label: My Custom Resource

    myEntity:
      type: Resource  # ← Resolves to myapp.com/app/Resource
                      #    NOT canon-protocol.org/core-rdf/Resource
    ```

    **Local definition wins!**

    ## No Ambiguity Warnings

    Canon does NOT warn when local entities shadow imports. This is by design:
    - Allows intentional overriding
    - Enables namespace-specific customizations
    - Prevents breaking changes when dependencies add new entities

    ## Diamond Dependencies

    ```
    App imports B and C
    B imports D
    C imports D

    App → B → D
    App → C → D
    ```

    Entity from D appears in both paths. First path wins, no duplication.

# ========================================
# ALIASED REFERENCE RESOLUTION
# ========================================

AliasedReferenceResolution:
  type: TechnicalExplanation
  title: Aliased References and Qualified Names
  difficulty: Intermediate
  prerequisite: TransitiveImportResolution
  content: |
    # Resolving Aliased References (e.g., "xsd.string")

    Canon supports qualified references using aliases: `{alias}.{name}`

    ## Format

    - **Alias**: Short name for imported package (explicit or implicit)
    - **Name**: Entity name within that package

    Example: `xsd.string` = "string" entity from package aliased as "xsd"

    ## Alias Types

    ### 1. Explicit Alias

    ```yaml
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-xsd
            match: ^
            version: 1.0.1
            alias: datatypes  # Explicit alias

    myProperty:
      range: datatypes.string  # Uses explicit alias
    ```

    ### 2. Implicit Alias (Package Name)

    ```yaml
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-xsd
            match: ^
            version: 1.0.1  # No alias

    myProperty:
      range: xsd.string  # Package name used as alias
    ```

    ## Resolution Algorithm

    When resolving `xsd.string`:

    1. **Split on dot**: alias = "xsd", name = "string"
    2. **Find import** with matching alias:
       - Check explicit aliases first (import.Alias == "xsd")
       - Then check implicit (import.PackageName == "xsd" && Alias is null)
    3. **Load that document**: Get canon-protocol.org/core-xsd@1.0.0
    4. **RECURSIVELY resolve "string"** from loaded document's perspective
    5. **Return resolved entity**: canon-protocol.org/core-xsd/string@1.0.0

    ## Transitive Aliased References

    Aliases work transitively!

    ```yaml
    # Document A:
    imports:
      - publisher: stories.org
        packages:
          - package: characters
            match: ^
            version: 1.0.1
            alias: chars

    # characters package imports:
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-rdf
            match: ^
            version: 1.0.1

    # In Document A, this works:
    myScene:
      hasCharacter: chars.Romeo  # Alias to characters package
    ```

    Even though "chars" is defined in A, the resolution happens recursively,
    so characters' imports are also available through the alias path.

    ## Why Aliases Matter

    1. **Avoid naming conflicts**: `myapp.name` vs `w3.name`
    2. **Shorter references**: `xsd.string` instead of full URI
    3. **Explicit dependencies**: Shows which package entity comes from
    4. **Rename on import**: `as datatypes` for clearer intent

# ========================================
# CYCLE PREVENTION
# ========================================

CyclePrevention:
  type: TechnicalExplanation
  title: Circular Import Detection and Prevention
  difficulty: Advanced
  prerequisite: TransitiveImportResolution
  content: |
    # Handling Circular Imports

    Circular imports occur when packages import each other:

    ```
    A imports B
    B imports A  # Circular!
    ```

    Or transitively:

    ```
    A imports B
    B imports C
    C imports A  # Circular chain!
    ```

    ## The Problem

    Without cycle prevention, transitive resolution would infinite loop:
    - Resolve A → load B → load A → load B → ...

    ## The Solution: Visited Set

    Canon tracks visited namespaces using a `HashSet<string>`:

    ```csharp
    BuildResourceIndexAsync(document, visitedNamespaces, importPath):
      currentNamespace = document.Metadata.Namespace.ToString()

      // Cycle detection
      if (!visitedNamespaces.Add(currentNamespace))
        return  // Already visited, stop here

      // Continue processing...
    ```

    ## How It Works

    1. Before processing a namespace, add it to `visitedNamespaces`
    2. If `Add()` returns false → already visited → STOP (don't process again)
    3. Continue traversing unvisited imports

    ## Example

    ```
    A imports B
    B imports C
    C imports A  # Circular!

    Resolution from A:
    1. Visit A (add to set)
    2. Process A's imports → Visit B (add to set)
    3. Process B's imports → Visit C (add to set)
    4. Process C's imports → Try to visit A
       → ALREADY IN SET → Skip (prevents loop)
    5. Return complete index from A, B, C (no duplicates)
    ```

    ## Diamond Dependencies

    Same mechanism handles diamond dependencies:

    ```
    A imports B and C
    B imports D
    C imports D

    Resolution from A:
    1. Visit A
    2. Visit B → Visit D
    3. Visit C → Try D → Already visited → Skip
    4. Result: A, B, C, D (no duplication)
    ```

# ========================================
# PROPERTY METADATA AND SOURCE CONTEXT
# ========================================

PropertyMetadataSourceContext:
  type: TechnicalExplanation
  title: PropertyMetadata and Source Document Context
  difficulty: Advanced
  prerequisite: AliasedReferenceResolution
  content: |
    # PropertyMetadata: Resolving Ranges Across Namespaces

    When Canon resolves a property's range or domain, it must handle aliases
    correctly even when the property is imported from another namespace.

    ## The Problem

    ```yaml
    # stories.org/properties@1.0.0:
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-xsd
            match: ^
            version: 1.0.1  # ← xsd alias defined here

    characterName:
      type: DatatypeProperty
      range: xsd.string  # ← Uses xsd alias

    # myapp.com/app@1.0.0:
    imports:
      - publisher: stories.org
        packages:
          - package: properties
            match: ^
            version: 1.0.1
      # NOTE: No xsd import here!

    romeo:
      characterName: "Romeo"  # ← How is xsd.string resolved?
    ```

    **Challenge**: When resolving `characterName.range` in the app namespace,
    the "xsd" alias is not defined in app's imports! It's only in properties'
    imports.

    ## The Solution: Source Document Context

    PropertyMetadata includes **SourceDocument** - the document where the
    property was originally defined:

    ```csharp
    PropertyMetadata {
      PropertyUri: CanonUri           // Fully resolved property URI
      RangeUri: CanonUri?            // Fully resolved range URI
      DomainUri: CanonUri?           // Fully resolved domain URI
      Range: string?                 // Original string (backward compat)
      Domain: string?                // Original string (backward compat)
      SourceDocument: CanonDocument  // WHERE property was defined!
    }
    ```

    ## How It Works

    1. **Resolve property** "characterName" → stories.org/properties@1.0.0
    2. **Get source document**: stories.org/properties@1.0.0 (not current doc)
    3. **Resolve range "xsd.string"** in context of SOURCE document
    4. **Source document has "xsd" alias** → resolves to canon-protocol.org/core-xsd/string@1.0.0
    5. **Cache result** with fully resolved URIs

    ## Why This Matters

    Without SourceDocument context:
    - Range "xsd.string" would fail to resolve in app namespace
    - Users would need to re-import all transitive dependencies
    - Properties couldn't use aliases from their own imports

    With SourceDocument context:
    - Ranges resolve correctly regardless of current namespace
    - Properties are self-contained with their dependencies
    - No need to duplicate imports

    ## Caching Strategy

    PropertyMetadata is cached by **resolved URI** (not name):

    ```csharp
    _propertyCache[propertyUri.ToString()] = metadata;
    ```

    **Why URI as key?**
    - Handles namespace collisions (two "name" properties)
    - Ensures correct metadata for each property version
    - Prevents cross-namespace confusion

# ========================================
# ENTITY INDEX STRUCTURE
# ========================================

ResourceIndexStructure:
  type: TechnicalExplanation
  title: Resource Index Structure and Caching
  difficulty: Advanced
  prerequisite: TransitiveImportResolution
  content: |
    # The Resource Index: Fast Lookups

    Canon builds a resource index for each namespace to enable fast lookups
    without re-parsing documents.

    ## Structure

    ```csharp
    Dictionary<string, ResourceResolutionResult>
    // Key: Entity name (e.g., "Character")
    // Value: Resolution result with metadata
    ```

    ## ResourceResolutionResult

    Each resolved entity includes:

    ```csharp
    ResourceResolutionResult {
      ResourceName: string              // "Character"
      Uri: CanonUri                    // Full URI
      Entity: Dictionary<object, object>  // The raw YAML dict
      DefinedInNamespace: string       // Where it's actually defined
      IsImported: bool                 // true if from import
      ImportPath: string               // Human-readable import chain
    }
    ```

    ## Caching Layers

    Canon uses multiple caching strategies:

    ### 1. ResourceResolver Cache (by namespace)

    ```csharp
    Dictionary<string, Dictionary<string, ResourceResolutionResult>>
    // Outer key: Namespace string
    // Inner key: Resource name
    // Value: Resolution result
    ```

    **Cleared when:** Document changes

    ### 2. PropertyMetadata Cache (by URI)

    ```csharp
    Dictionary<string, PropertyMetadata>
    // Key: Property URI string
    // Value: Resolved metadata
    ```

    **Cleared when:** Parser instance disposed

    ### 3. Document Repository Cache

    FileSystemCanonDocumentRepository caches:
    - Documents by namespace
    - Documents by file path
    - Documents by relative path

    **Cleared when:** Repository recreated

    ## Cache Invalidation

    ```csharp
    resourceResolver.ClearCache();                    // All namespaces
    resourceResolver.ClearCache("myapp.com/app@1.0.0");  // Specific namespace
    ```

    Call after modifying documents to ensure fresh resolution.

# ========================================
# RESOLUTION EXAMPLES
# ========================================

ResolutionExample1:
  type: CodeExample
  title: Simple Entity Resolution
  language: yaml
  codeSnippet: |
    # stories.org/characters@1.0.0:
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-rdf
            match: ^
            version: 1.0.1

    Romeo:
      type: Character  # How is "Character" resolved?

    # Resolution steps:
    # 1. Check stories.org/characters@1.0.0 entities → Not found
    # 2. Check imports (canon-protocol.org/core-rdf) → Not found
    # 3. ERROR: "Character not defined or imported"
    #
    # Fix: Either define Character locally or import package that has it

ResolutionExample2:
  type: CodeExample
  title: Transitive Resolution
  language: yaml
  codeSnippet: |
    # stories.org/classes@1.0.0:
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-rdf
            match: ^
            version: 1.0.1

    Character:
      type: Class

    # stories.org/characters@1.0.0:
    imports:
      - publisher: stories.org
        packages:
          - package: classes
            match: ^
            version: 1.0.1

    Romeo:
      type: Character  # ← Resolved transitively!

    # Resolution steps:
    # 1. Check stories.org/characters → Not found
    # 2. Check direct imports (classes) → Found!
    # 3. Returns: stories.org/classes/Character@1.0.0

ResolutionExample3:
  type: CodeExample
  title: Aliased Resolution with Shadowing
  language: yaml
  codeSnippet: |
    # canon-protocol.org/core-rdf@1.0.0:
    Property:
      type: Class

    # myapp.com/app@1.0.0:
    imports:
      - publisher: canon-protocol.org
        packages:
          - package: core-rdf
            match: ^
            version: 1.0.1

    Property:  # ← Shadows canon-protocol.org/core-rdf/Property
      type: Class
      comment: My custom property class

    myEntity:
      type: Property        # → Resolves to myapp.com/app/Property (local)
      otherField: rdf.Property  # → Resolves to canon-protocol.org/core-rdf/Property (qualified)

    # Key insight:
    # - Unqualified "Property" → Local entity (shadowing)
    # - Qualified "rdf.Property" → Bypasses shadowing, explicit reference
