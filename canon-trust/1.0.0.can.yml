# Canon Trust Protocol Ontology
#
# Models all trust protocol artifacts as formal Canon classes:
# signing keys, package signatures, resolution locks, and import leases.
# Every runtime artifact is a valid Canon instance, parseable and validatable.

canon-trust:
  type: Package
  publisher: canon-protocol.org
  version: 1.0.0
  imports:
    - publisher: canon-protocol.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.1
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.1
        - package: core-xsd
          match: ^
          version: 1.0.1
        - package: protocol
          alias: proto
          match: ^
          version: 1.0.1

# =============================================================================
# Signing Keys
# =============================================================================

SigningKey:
  type: rdfs.Class
  label: Signing Key
  comment: >-
    An Ed25519 signing key published in a publisher's well-known package.
    Keys have a validity window defined by notBefore and notAfter.
    Multiple keys may be active simultaneously during key rotation.
    The active key is the one without a notAfter value.

kid:
  type: DatatypeProperty
  domain: SigningKey
  range: string
  label: Key ID
  comment: Unique key identifier for rotation tracking (e.g., "2026-03").

keyType:
  type: DatatypeProperty
  domain: SigningKey
  range: string
  label: Key Type
  comment: JWK key type. Always "OKP" for Ed25519.

curve:
  type: DatatypeProperty
  domain: SigningKey
  range: string
  label: Curve
  comment: JWK curve. Always "Ed25519".

publicKey:
  type: DatatypeProperty
  domain: SigningKey
  range: base64Binary
  label: Public Key
  comment: Base64url-encoded Ed25519 public key (JWK "x" parameter).

use:
  type: DatatypeProperty
  domain: SigningKey
  range: string
  label: Key Use
  comment: JWK key use. Always "sig" for signing.

notBefore:
  type: DatatypeProperty
  domain: SigningKey
  range: long
  label: Not Before
  comment: Key validity start as Unix epoch seconds.

notAfter:
  type: DatatypeProperty
  domain: SigningKey
  range: long
  label: Not After
  comment: >-
    Key validity end as Unix epoch seconds. Absent if currently active.
    Set to compromise time if key is revoked.

# =============================================================================
# Package Signatures
# =============================================================================

PackageSignature:
  type: rdfs.Class
  label: Package Signature
  comment: >-
    Ed25519 signature over SHA-256(content + ":" + dependencyRootHash).
    Provides authenticity and provenance for a published package version.

value:
  type: DatatypeProperty
  domain: PackageSignature
  range: string
  label: Signature Value
  comment: Base64-encoded Ed25519 signature bytes.

contentHash:
  type: DatatypeProperty
  domain: PackageSignature
  range: hexBinary
  label: Content Hash
  comment: Hex-encoded SHA-256 hash of the package YAML content.

dependencyRootHash:
  type: DatatypeProperty
  domain: PackageSignature
  range: hexBinary
  label: Dependency Root Hash
  comment: >-
    Merkle root hash of the resolved dependency tree at sign time.
    SHA-256 of empty string if the package has no imports.

signingKeyId:
  type: DatatypeProperty
  domain: PackageSignature
  range: string
  label: Signing Key ID
  comment: Key ID of the signing key used, for key rotation tracking.

timestamp:
  type: DatatypeProperty
  domain: PackageSignature
  range: long
  label: Signature Timestamp
  comment: Unix epoch milliseconds when the signature was created.

# =============================================================================
# Resolution Lock (Lock File)
# =============================================================================

ResolutionLock:
  type: rdfs.Class
  label: Resolution Lock
  comment: >-
    A Merkle tree snapshot of a resolved dependency graph. Captures exact
    versions, content hashes, and signatures of every dependency at a point
    in time. Used in canon.lock files, on version records at publish time,
    and embedded in build artifacts.

formatVersion:
  type: DatatypeProperty
  domain: ResolutionLock
  range: string
  label: Format Version
  comment: Lock file format version. Currently "2".

rootHash:
  type: DatatypeProperty
  domain: ResolutionLock
  range: hexBinary
  label: Root Hash
  comment: >-
    Merkle root hash computed deterministically: sort packages alphabetically,
    hash each as SHA-256(publisher/package@version:contentHash), sort hashes,
    then SHA-256(concat(all sorted hashes)).

lastUpdated:
  type: DatatypeProperty
  domain: ResolutionLock
  range: dateTime
  label: Last Updated
  comment: ISO 8601 timestamp when the lock was last computed.

entries:
  type: ObjectProperty
  domain: ResolutionLock
  range: LockEntry
  label: Entries
  comment: Per-package resolution entries in the lock.

LockEntry:
  type: rdfs.Class
  label: Lock Entry
  comment: >-
    A single resolved package in the dependency tree. Contains the exact
    version, content hash, publisher signature, and dependency references.

publisher:
  type: DatatypeProperty
  domain: LockEntry
  range: string
  label: Publisher
  comment: Publisher domain of the locked package.

packageName:
  type: DatatypeProperty
  domain: LockEntry
  range: string
  label: Package Name
  comment: Package name of the locked package.

version:
  type: DatatypeProperty
  domain: LockEntry
  range: string
  label: Version
  comment: Exact resolved version (e.g., "1.0.1").

resolved:
  type: DatatypeProperty
  domain: LockEntry
  range: anyURI
  label: Resolved URI
  comment: OCI registry reference where the content is stored.

integrity:
  type: DatatypeProperty
  domain: LockEntry
  range: hexBinary
  label: Integrity Hash
  comment: SHA-256 content hash for integrity verification.

signature:
  type: DatatypeProperty
  domain: LockEntry
  range: base64Binary
  label: Signature
  comment: Ed25519 signature from the publisher.

# Note: signingKeyId is already defined above with domain PackageSignature.
# LockEntry reuses it (Canon properties can have multiple domains).

installedAt:
  type: DatatypeProperty
  domain: LockEntry
  range: dateTime
  label: Installed At
  comment: ISO 8601 timestamp when this entry was resolved/installed.

dependencies:
  type: ObjectProperty
  domain: LockEntry
  range: LockEntry
  label: Dependencies
  comment: Direct dependencies of this lock entry.

# =============================================================================
# Import Leases
# =============================================================================

ImportLease:
  type: rdfs.Class
  label: Import Lease
  comment: >-
    A time-bound access credential for importing private packages.
    Issued by a publisher to an authorized consumer. Designed for
    eventual payment/subscription support (software leases).

leasePublisher:
  type: DatatypeProperty
  domain: ImportLease
  range: string
  label: Publisher
  comment: Publisher domain that issued the lease.

packagePattern:
  type: DatatypeProperty
  domain: ImportLease
  range: string
  label: Package Pattern
  comment: Package scope — exact name or wildcard pattern.

issuedTo:
  type: DatatypeProperty
  domain: ImportLease
  range: string
  label: Issued To
  comment: Label or identifier for the consumer.

token:
  type: DatatypeProperty
  domain: ImportLease
  range: string
  label: Token
  comment: >-
    Bearer token for content fetches. This value is a secret and must be
    transmitted securely and stored encrypted at rest.

status:
  type: ObjectProperty
  domain: ImportLease
  range: LeaseStatus
  label: Status
  comment: Current lifecycle status of the lease.

expiresAt:
  type: DatatypeProperty
  domain: ImportLease
  range: long
  label: Expires At
  comment: Unix epoch milliseconds when the lease expires.

createdAt:
  type: DatatypeProperty
  domain: ImportLease
  range: long
  label: Created At
  comment: Unix epoch milliseconds when the lease was created.

renewedAt:
  type: DatatypeProperty
  domain: ImportLease
  range: long
  label: Renewed At
  comment: Unix epoch milliseconds when the lease was last renewed.

# =============================================================================
# Enumerations
# =============================================================================

LeaseStatus:
  type: rdfs.Class
  label: Lease Status
  comment: Lifecycle status of an import lease.
  oneOf:
    - active
    - expired
    - revoked

active:
  type: LeaseStatus
  label: Active
  comment: Lease is valid and can be used for imports.

expired:
  type: LeaseStatus
  label: Expired
  comment: Lease has expired and must be renewed.

revoked:
  type: LeaseStatus
  label: Revoked
  comment: Lease has been revoked by the publisher.

Visibility:
  type: rdfs.Class
  label: Visibility
  comment: Package access level.
  oneOf:
    - public
    - private

public:
  type: Visibility
  label: Public
  comment: Anyone can import this package. No lease required.

private:
  type: Visibility
  label: Private
  comment: Import lease required to access this package.

# =============================================================================
# Protocol Rules
# =============================================================================

SignatureCoversDepTree:
  type: proto.RequiredRule
  proto.text: >-
    Package signatures MUST cover both the content hash and the dependency
    root hash: signature = Ed25519_Sign(key, SHA-256(content + ":" + rootHash)).
  proto.rationale: >-
    Including the dependency root hash in the signature proves not just the
    package content but the entire validated dependency tree.

SignatureKeyValidity:
  type: proto.RequiredRule
  proto.text: >-
    A package signature MUST be verified by checking that the timestamp
    falls within the signing key's [notBefore, notAfter] validity window.
  proto.rationale: >-
    Key validity windows enable compromise handling. Signatures made after
    a key's notAfter timestamp are invalid, even if cryptographically correct.

KeyIdImmutability:
  type: proto.ForbiddenRule
  proto.text: >-
    A signing key's public key value MUST NOT change for a given key ID.
    If a key ID's public key changes, consumers MUST reject the key.
  proto.rationale: >-
    Key ID immutability prevents silent key substitution attacks. Key pinning
    relies on the invariant that a kid always maps to the same public key.

LockRootHashDeterminism:
  type: proto.RequiredRule
  proto.text: >-
    The root hash of a resolution lock MUST be computed deterministically:
    sort packages alphabetically, hash each entry, sort hashes, then compute
    SHA-256 of the concatenation.
  proto.rationale: >-
    Deterministic root hashes ensure the same dependency graph always produces
    the same root hash, enabling reproducible builds and tamper detection.

KeyPinningRecommended:
  type: proto.RecommendedRule
  proto.text: >-
    Consumers SHOULD implement key pinning (trust-on-first-use) by storing
    known keys locally and warning on unexpected changes.
  proto.rationale: >-
    Key pinning detects supply chain attacks where an attacker modifies a
    publisher's well-known package after compromising their account. Lock
    files naturally support pinning via the signingKeyId field.

PrivateKeySecureStorage:
  type: proto.RequiredRule
  proto.text: >-
    Ed25519 private signing keys MUST be stored in a secure key management
    system, separate from the content server.
  proto.rationale: >-
    Separating key storage from the content server limits the blast radius
    of a compromise. The attacker gets the public key but not the signing key.

WellKnownPackagePublic:
  type: proto.RecommendedRule
  proto.text: >-
    Publisher well-known packages SHOULD be public (allowed_importers: ["*"])
    so that any consumer can discover the publisher's signing keys.
  proto.rationale: >-
    Public well-known packages enable decentralized key discovery. Consumers
    fetch the well-known package to verify signatures without out-of-band
    key exchange.

LeaseExpiry:
  type: proto.RequiredRule
  proto.text: >-
    Import leases MUST have a finite expiry. Permanent access tokens are
    not permitted by the protocol.
  proto.rationale: >-
    Time-bound leases ensure publishers retain control over access. Expired
    leases must be renewed, allowing publishers to revoke access, update
    terms, or require payment for continued use.

LeaseTokenSecrecy:
  type: proto.RequiredRule
  proto.text: >-
    Lease tokens MUST be transmitted securely (over HTTPS or equivalent)
    and stored encrypted at rest.
  proto.rationale: >-
    Lease tokens are bearer credentials. Compromised tokens grant unauthorized
    package access until the lease expires or is revoked.
