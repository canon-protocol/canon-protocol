name: Deploy Publisher Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  repository_dispatch:
    types: [canons-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout canons source
        uses: actions/checkout@v4
        with:
          repository: canon-protocol/canons
          path: _canons

      - name: Transform specs to site structure
        shell: bash
        run: |
          # For each .can.yml file in _canons, extract package name and version,
          # then place it at {package-name}/{version}.can.yml for static serving.
          SITE_DIR="."
          COUNT=0

          while IFS= read -r file; do
            pkg_name=""
            pkg_version=""
            current_key=""

            while IFS= read -r line; do
              line="${line//$'\r'/}"

              if [[ "$line" =~ ^([a-zA-Z0-9_-]+):\ *$ ]] || [[ "$line" =~ ^([a-zA-Z0-9_-]+):$ ]]; then
                current_key="${BASH_REMATCH[1]}"
              fi

              if [[ "$line" =~ ^[[:space:]]+type:[[:space:]]*Package$ ]]; then
                pkg_name="$current_key"
              fi

              if [[ -n "$pkg_name" && "$current_key" == "$pkg_name" && "$line" =~ ^[[:space:]]+version:[[:space:]]*(.+)$ ]]; then
                pkg_version="${BASH_REMATCH[1]}"
              fi

              if [[ -n "$pkg_name" && -n "$pkg_version" ]]; then
                break
              fi
            done < "$file"

            if [[ -n "$pkg_name" && -n "$pkg_version" ]]; then
              mkdir -p "$SITE_DIR/$pkg_name"
              cp "$file" "$SITE_DIR/$pkg_name/$pkg_version.can.yml"
              echo "  $pkg_name/$pkg_version"
              COUNT=$((COUNT + 1))
            else
              echo "  Skipped: $file (no Package metadata)"
            fi
          done < <(find _canons -name '*.can.yml' -type f | sort)

          echo ""
          echo "Placed $COUNT package(s) into site structure."

      - name: Generate index.txt
        shell: bash
        run: |
          # Build index.txt from the generated package directories
          INDEX=""
          for dir in */; do
            dir_name="${dir%/}"
            # Skip non-package directories
            [[ "$dir_name" == "_canons" || "$dir_name" == "_site" || "$dir_name" == "static" || "$dir_name" == ".github" ]] && continue
            for file in "$dir"*.can.yml; do
              [[ -f "$file" ]] || continue
              version="$(basename "$file" .can.yml)"
              INDEX="${INDEX}${dir_name}/${version}\n"
            done
          done

          echo -e "$INDEX" | sort | sed '/^$/d' > index.txt
          echo "Generated index.txt:"
          cat index.txt

      - name: Clean up canons checkout
        run: rm -rf _canons

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
