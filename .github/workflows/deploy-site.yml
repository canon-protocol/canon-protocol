name: Deploy Publisher Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  repository_dispatch:
    types: [canons-updated]

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout canons source
        uses: actions/checkout@v4
        with:
          repository: canon-protocol/canons
          path: _canons

      - name: Transform specs to site structure
        shell: bash
        run: |
          # For each .can.yml file in _canons, extract package name and version,
          # then place it at {package-name}/{version}.can.yml for static serving.
          SITE_DIR="."
          COUNT=0

          while IFS= read -r file; do
            pkg_name=""
            pkg_version=""
            current_key=""

            while IFS= read -r line; do
              line="${line//$'\r'/}"

              if [[ "$line" =~ ^([a-zA-Z0-9_-]+):\ *$ ]] || [[ "$line" =~ ^([a-zA-Z0-9_-]+):$ ]]; then
                current_key="${BASH_REMATCH[1]}"
              fi

              if [[ "$line" =~ ^[[:space:]]+type:[[:space:]]*Package$ ]]; then
                pkg_name="$current_key"
              fi

              if [[ -n "$pkg_name" && "$current_key" == "$pkg_name" && "$line" =~ ^[[:space:]]+version:[[:space:]]*(.+)$ ]]; then
                pkg_version="${BASH_REMATCH[1]}"
              fi

              if [[ -n "$pkg_name" && -n "$pkg_version" ]]; then
                break
              fi
            done < "$file"

            if [[ -n "$pkg_name" && -n "$pkg_version" ]]; then
              mkdir -p "$SITE_DIR/$pkg_name"
              cp "$file" "$SITE_DIR/$pkg_name/$pkg_version.can.yml"
              echo "  $pkg_name/$pkg_version"
              COUNT=$((COUNT + 1))
            else
              echo "  Skipped: $file (no Package metadata)"
            fi
          done < <(find _canons -name '*.can.yml' -type f | sort)

          echo ""
          echo "Placed $COUNT package(s) into site structure."

      - name: Generate index.txt
        shell: bash
        run: |
          # Build index.txt from the generated package directories
          INDEX=""
          for dir in */; do
            dir_name="${dir%/}"
            # Skip non-package directories
            [[ "$dir_name" == "_canons" || "$dir_name" == "_site" || "$dir_name" == "static" || "$dir_name" == ".github" || "$dir_name" == "npm" || "$dir_name" == "packages" ]] && continue
            for file in "$dir"*.can.yml; do
              [[ -f "$file" ]] || continue
              version="$(basename "$file" .can.yml)"
              INDEX="${INDEX}${dir_name}/${version}\n"
            done
          done

          echo -e "$INDEX" | sort | sed '/^$/d' > index.txt
          echo "Generated index.txt:"
          cat index.txt

      - name: Clean up canons checkout
        run: rm -rf _canons

      - name: Setup Node.js and npm auth
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build npm registry from GitHub Packages
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGES="cli sdk types"
          SCOPE="@canon-protocol"
          SITE_URL="https://canon-protocol.org"

          mkdir -p "npm/$SCOPE"

          for PKG in $PACKAGES; do
            echo "=== Processing $SCOPE/$PKG ==="

            # Discover all versions from GitHub Packages npm registry
            VERSIONS=$(npm view "$SCOPE/$PKG" versions --json --registry=https://npm.pkg.github.com 2>/dev/null \
              | node -e "const v=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); (Array.isArray(v)?v:[v]).forEach(x=>console.log(x))" 2>/dev/null || true)

            if [ -z "$VERSIONS" ]; then
              echo "  WARNING: No versions found for $SCOPE/$PKG, skipping"
              continue
            fi

            TARBALL_DIR="packages/$SCOPE/$PKG"
            mkdir -p "$TARBALL_DIR"

            # Start building packument JSON
            LATEST=""
            VERSION_ENTRIES=""

            for VER in $VERSIONS; do
              echo "  Downloading $SCOPE/$PKG@$VER..."

              # Download tarball via npm pack
              TGZ_FILE=$(cd /tmp && npm pack "$SCOPE/$PKG@$VER" --registry=https://npm.pkg.github.com 2>/dev/null | tail -1)
              if [ ! -f "/tmp/$TGZ_FILE" ]; then
                echo "  WARNING: Failed to download $VER, skipping"
                continue
              fi

              DEST="$PKG-$VER.tgz"
              cp "/tmp/$TGZ_FILE" "$TARBALL_DIR/$DEST"
              rm -f "/tmp/$TGZ_FILE"

              # Compute hashes
              SHASUM=$(sha1sum "$TARBALL_DIR/$DEST" | cut -d' ' -f1)
              INTEGRITY="sha512-$(openssl dgst -sha512 -binary "$TARBALL_DIR/$DEST" | openssl base64 -A)"

              # Extract package.json from tarball
              TMPDIR=$(mktemp -d)
              tar xzf "$TARBALL_DIR/$DEST" -C "$TMPDIR" package/package.json
              PKG_JSON="$TMPDIR/package/package.json"

              # Build version entry using node
              ENTRY=$(node -e "
                const pkg = require('$PKG_JSON');
                const entry = {
                  name: pkg.name,
                  version: pkg.version,
                  description: pkg.description || '',
                  dependencies: pkg.dependencies || {},
                  engines: pkg.engines || {},
                  dist: {
                    shasum: '$SHASUM',
                    integrity: '$INTEGRITY',
                    tarball: '$SITE_URL/packages/$SCOPE/$PKG/$DEST'
                  }
                };
                if (pkg.bin) entry.bin = pkg.bin;
                console.log(JSON.stringify(entry));
              ")

              rm -rf "$TMPDIR"

              LATEST="$VER"
              if [ -n "$VERSION_ENTRIES" ]; then
                VERSION_ENTRIES="$VERSION_ENTRIES,"
              fi
              VERSION_ENTRIES="$VERSION_ENTRIES\"$VER\":$ENTRY"

              echo "  Done: $VER"
            done

            # Write packument JSON
            if [ -n "$LATEST" ]; then
              echo "{\"name\":\"$SCOPE/$PKG\",\"dist-tags\":{\"latest\":\"$LATEST\"},\"versions\":{$VERSION_ENTRIES}}" \
                | node -e "process.stdout.write(JSON.stringify(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')),null,2))" \
                > "npm/$SCOPE/$PKG"
              echo "  Wrote packument with latest=$LATEST"
            fi
          done

          echo ""
          echo "npm registry build complete."

      - name: Upload tarballs for npmjs publish
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs
          path: packages/@canon-protocol/
          retention-days: 1
          if-no-files-found: warn

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ── Publish to npmjs.com (provenance from public repo) ───
  publish-npmjs:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: tarballs

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@canon-protocol'

      - name: Publish new versions to npmjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          SCOPE="@canon-protocol"

          for PKG_DIR in tarballs/*/; do
            PKG=$(basename "$PKG_DIR")
            echo "=== Checking $SCOPE/$PKG ==="

            # Get the latest version already on npmjs (if any)
            PUBLISHED=$(npm view "$SCOPE/$PKG" version 2>/dev/null || echo "")

            # Find all tarballs for this package, sorted by version
            for TGZ in "$PKG_DIR"*.tgz; do
              [ -f "$TGZ" ] || continue
              FILENAME=$(basename "$TGZ")
              # Extract version from filename: cli-8.2.0.tgz -> 8.2.0
              VER=$(echo "$FILENAME" | sed "s/^${PKG}-//; s/\.tgz$//")

              if [ "$VER" = "$PUBLISHED" ]; then
                echo "  $VER already published, skipping"
                continue
              fi

              echo "  Publishing $SCOPE/$PKG@$VER..."
              npm publish "$TGZ" --access public --provenance || {
                echo "  WARNING: Failed to publish $SCOPE/$PKG@$VER"
              }
            done
          done

          echo ""
          echo "npmjs publish complete."
